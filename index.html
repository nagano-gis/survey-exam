 c:OX,a:2, exp:"誤り。UTMの座標軸(X=北・Y=東)の正負の説明が誤り。\n💡 平面直角/UTMは“X=北向き・Y=東向き”。X・Yを逆に説明する肢に注意。",
 fig:"projection"},
{y:"R4",no:22,sub:"e",field:"地図投影法",type:"○×",
 q:"地理院地図(ウェブ)は、国土地理院刊行の1/25,000地形図と同様、UTM図法を採用している。",
 c:OX,a:2, exp:"誤り。地理院地図(ウェブ)は“ウェブメルカトル図法”。UTMは紙の1/25,000地形図。\n⚠️ ウェブ地図＝ウェブメルカトル、紙の地形図＝UTM、と対で覚える。",
 fig:"projection"},

/* --- No.24 基盤地図情報（誤りはどれか・5択） --- */
{y:"R4",no:24,field:"基盤地図情報",type:"5択(誤り)",
 q:"地理空間情報活用推進基本法における基盤地図情報について、明らかに間違っているものはどれか。",
 c:["国が保有する基盤地図情報は、原則インターネットで無償提供される。",
    "基盤地図情報の項目は省令で、基準点・海岸線・道路縁・建築物の外周線など13項目が定められている。",
    "整備更新時に、対象地域と隣接地域の境界部でシームレスに接合される。",
    "数値標高モデルとジオイド・モデルを利用すると、数値表層モデルを作成できる。",
    "都市計画区域外の平面位置の誤差は25m以内、高さの誤差は5.0m以内である。"], a:4,
 exp:"誤りは4。DEM＋ジオイド・モデルから作れるのは標高情報。建物・樹木を含むDSM(数値表層モデル)は別途表層計測が必要で作れない。\n⚠️ DEM(地表)とDSM(表層＝建物・樹木含む)の違いが狙われる。",
 fig:"gnss-height"},

/* --- No.26 用地測量（○×） --- */
{y:"R4",no:26,sub:"a",field:"用地測量",type:"○×",
 q:"公図等転写連続図の作成において、隣接する公図間の境界線が整合しない部分があったため、接合部が合致するように境界線を編集した。",
 c:OX,a:2, exp:"誤り。公図の境界線は勝手に編集不可。記載どおり“そのまま転写”する。\n⚠️ 「合致するよう編集した」は誤りの典型。公図は改変しない。"},
{y:"R4",no:26,sub:"b",field:"用地測量",type:"○×",
 q:"権利者確認調査において、測量計画機関から貸与された資料などに基づき権利者調査表を作成した。",
 c:OX,a:1, exp:"正しい。測量計画機関から貸与された資料等に基づき権利者調査表を作成する。"},
{y:"R4",no:26,sub:"c",field:"用地測量",type:"○×",
 q:"境界測量において、家屋の密集により基準点からの視通を確保できなかったため、補助基準点を設置して作業を行った。",
 c:OX,a:1, exp:"正しい。視通が確保できない場合は補助基準点を設置して境界測量を行える。"},
{y:"R4",no:26,sub:"d",field:"用地測量",type:"○×",
 q:"ネットワーク型RTK法による境界測量で、再初期化して2セット観測し、座標値には1セット目の観測値を採用、2セット目は点検値とした。",
 c:OX,a:2, exp:"誤り。単点観測法は2セット観測し“両セットの平均値”を採用する。\n⚠️ 「1セット目を採用・2セット目は点検」は誤り。2セット平均が原則。"},
{y:"R4",no:26,sub:"e",field:"用地測量",type:"○×",
 q:"境界点間の距離を計算した際に、0.001mの次の位を切り捨てた。",
 c:OX,a:1, exp:"正しい。距離計算は所定の位で丸める(この処理は適切)。"},

/* --- No.28 河川測量（語句・5択） --- */
{y:"R4",no:28,field:"河川測量",type:"5択(語句)",
 q:"公共測量における河川測量について、ア〜オに入る語句・数値の組合せとして最も適当なものはどれか。\n\nア：距離標は近傍の( ア )等から放射法等で設置する。\nイ：定期縦断測量の縦断面図の横縮尺は1,000分の1から( イ )分の1まで。\nウ：定期横断測量の横断面図の横縮尺は100分の1から( ウ )分の1まで。\nエ：水準基標測量で使う機器は1〜2級レベル及び( エ )。\nオ：水深の測定は( オ )を用いて行う。",
 c:["ア:3級基準点 イ:100,000 ウ:1,000 エ:1級標尺 オ:音響測深機",
    "ア:3級基準点 イ:10,000 ウ:10,000 エ:2級標尺 オ:音響測深機",
    "ア:水準基標 イ:10,000 ウ:10,000 エ:2級標尺 オ:電波式水位計",
    "ア:水準基標 イ:100,000 ウ:1,000 エ:2級標尺 オ:音響測深機",
    "ア:3級基準点 イ:100,000 ウ:10,000 エ:1級標尺 オ:電波式水位計"], a:1,
 exp:"正しい組合せは1（ア:3級基準点／イ:100,000／ウ:1,000／エ:1級標尺／オ:音響測深機）。\n💡 縦断は横縮尺1,000〜100,000、横断は100〜1,000（縦断のほうが広範囲＝大きい数字）。水深は音響測深機、基標は1級標尺。\n⚠️ 「電波式水位計」「2級標尺」へ差し替える肢に注意。"},
/* ===== 令和8年 午前 ===== */
{y:"R8",no:1,sub:"a",field:"測量法",type:"○×",q:"「測量」とは土地の測量をいい、地図の調製及び測量用写真の撮影を含む。",c:["正しい","誤り"],a:1,exp:"正しい。測量法の「測量」の定義そのもの。地図の調製・測量用写真の撮影も含む。"},
{y:"R8",no:1,sub:"b",field:"測量法",type:"○×",q:"「公共測量」とは費用の全部又は一部を国又は公共団体が負担して行う測量をいい、国又は公共団体が費用を補助して行う測量は含まない。",c:["正しい","誤り"],a:2,exp:"誤り。公共測量は費用を「負担し、又は補助して」行う測量。補助して行う測量も含む。\n⚠️「補助は含まない」と限定する肢はひっかけ。"},
{y:"R8",no:1,sub:"c",field:"測量法",type:"○×",q:"公共測量は、基本測量又は公共測量の測量成果に基いて実施しなければならない。",c:["正しい","誤り"],a:1,exp:"正しい。公共測量は基本測量等の成果に基づいて行う。"},
{y:"R8",no:1,sub:"d",field:"測量法",type:"○×",q:"「基本測量及び公共測量以外の測量」とは、基本測量及び公共測量の測量成果を使用せずに実施する測量をいう。",c:["正しい","誤り"],a:2,exp:"誤り。定義は成果を「使用して」実施する測量。\n⚠️「使用せず」と逆にするひっかけ。R4でも同型が出題。"},
{y:"R8",no:1,sub:"e",field:"測量法",type:"○×",q:"何人も、国土地理院の長の承諾を得ないで、基本測量の測量標を移転し、汚損し、その他その効用を害する行為をしてはならない。",c:["正しい","誤り"],a:1,exp:"正しい。測量標の保護に関する規定どおり。"},
{y:"R8",no:2,sub:"a",field:"ITRF・座標系",type:"○×",q:"我が国の測地系であるJGD2024は、ITRFに基づいている。",c:["正しい","誤り"],a:1,exp:"正しい。日本の測地系はITRF（国際地球基準座標系）に基づく。"},
{y:"R8",no:2,sub:"b",field:"ITRF・座標系",type:"○×",q:"測量法において測量の基準として規定する回転楕円体は、WGS84である。",c:["正しい","誤り"],a:2,exp:"誤り。規定する回転楕円体は「GRS80」。\n⚠️ GRS80とWGS84の取り違えが定番。測量法はGRS80。"},
{y:"R8",no:2,sub:"c",field:"ITRF・座標系",type:"○×",q:"北海道と九州の位置をITRFで表すと、Y座標の値は北海道の方が大きい。",c:["正しい","誤り"],a:2,exp:"誤り。ITRFのY軸は東経90°方向。経度の小さい九州の方がY座標は大きくなる。\n💡 Y∝cos(緯度)×sin(経度)で比較すると九州＞北海道。"},
{y:"R8",no:2,sub:"d",field:"ITRF・座標系",type:"○×",q:"我が国の位置をITRFで表すと、X座標の符号は正である。",c:["正しい","誤り"],a:2,exp:"誤り。X軸は経度0°(グリニッジ)方向。東経約135°の日本ではX座標は負。\n💡 cos(135°)<0 → Xは負。"},
{y:"R8",no:2,sub:"e",field:"ITRF・座標系",type:"○×",q:"ITRFのX,Y,Zの座標値が全て0になる点は、地球の重心である。",c:["正しい","誤り"],a:1,exp:"正しい。ITRFは地心座標系で、原点は地球の重心。"},
{y:"R8",no:3,sub:"a",field:"測量計画・作業機関",type:"○×",q:"測量作業機関は、精度管理を行わなければならず、作業終了後速やかに点検測量を行わなければならない。",c:["正しい","誤り"],a:1,exp:"正しい。精度確保のため点検測量を行う。"},
{y:"R8",no:3,sub:"b",field:"測量計画・作業機関",type:"○×",q:"1級基準点測量の点検測量を、作業規程の準則に定められた標準の点検測量率10%で実施した。",c:["正しい","誤り"],a:1,exp:"正しい。点検測量率の標準は10%。"},
{y:"R8",no:3,sub:"c",field:"測量計画・作業機関",type:"○×",q:"「作業規程の準則」を準用した作業規程に従う場合、JPGISに準拠した製品仕様書を定めることを省略できる。",c:["正しい","誤り"],a:2,exp:"誤り。製品仕様書の作成は省略できない。\n⚠️「省略できる」は誤りを疑うキーワード。"},
{y:"R8",no:3,sub:"d",field:"測量計画・作業機関",type:"○×",q:"検定を受けるよう指定された測量成果について、自社で当該測量を担当していない測量士により検定を行い、検定証明書等を作成して提出した。",c:["正しい","誤り"],a:2,exp:"誤り。検定は第三者(検定機関)が行うもので、自社内の測量士による検定は認められない。"},
{y:"R8",no:3,sub:"e",field:"測量計画・作業機関",type:"○×",q:"主任技術者は、測量士でなくとも高度な技術と十分な実務経験を有する者であれば良い。",c:["正しい","誤り"],a:2,exp:"誤り。主任技術者は「測量士」でなければならない。\n⚠️「測量士でなくてもよい」は典型の誤り。"},
{y:"R8",no:4,sub:"a",field:"測量作業機関の対応",type:"○×",q:"社用車で現場に向かうに当たり、目視とアルコール検知器で出発前に酒気帯びでないことを確認し、運転終了時にも同様の確認を行った。",c:["正しい","誤り"],a:1,exp:"正しい。運転前後のアルコールチェックは適切な対応。"},
{y:"R8",no:4,sub:"b",field:"測量作業機関の対応",type:"○×",q:"私有地の樹木が観測の支障になり、占有者に連絡がつかなかったため作業員の判断で伐採し、後日連絡した。",c:["正しい","誤り"],a:2,exp:"誤り。他人の土地の樹木を無断で伐採してはならない。占有者の承諾が必要。"},
{y:"R8",no:4,sub:"c",field:"測量作業機関の対応",type:"○×",q:"UAVレーザ測量で飛行中に機体が制御不能で墜落したため、航空法に基づき事態の詳細を国土交通大臣へ速やかに報告した。",c:["正しい","誤り"],a:1,exp:"正しい。事故は航空法に基づき報告する。"},
{y:"R8",no:4,sub:"d",field:"測量作業機関の対応",type:"○×",q:"私有地への立入りが必要なため、占有者への事前通知と、測量計画機関が発行する身分証明書の携帯を作業員に指示した。",c:["正しい","誤り"],a:1,exp:"正しい。立入りには事前通知と身分証明書の携帯が必要。"},
{y:"R8",no:4,sub:"e",field:"測量作業機関の対応",type:"○×",q:"屋外作業中に大雨特別警報が発表されたが、ハザードマップで浸水想定区域外と確認できていたため作業を継続した。",c:["正しい","誤り"],a:2,exp:"誤り。大雨特別警報など重大な警報時は安全確保のため作業を中止すべき。"},
{y:"R8",no:5,field:"回転移動(計算)",type:"計算",q:"二次元座標で、点P(1.08, 0.91)を原点Oを中心に反時計回りに30°回転させたときの点P'(x',y')の座標値はどれか。\n（x'=x cosθ−y sinθ, y'=x sinθ+y cosθ）",c:["x'=0.43, y'=1.33","x'=0.43, y'=1.34","x'=0.48, y'=1.33","x'=0.48, y'=1.73","x'=1.39, y'=0.25"],a:3,exp:"x'=1.08×cos30°−0.91×sin30°=1.08×0.866−0.91×0.5=0.935−0.455≒0.48。\ny'=1.08×sin30°+0.91×cos30°=0.54+0.788≒1.33。\n⚠️ 符号ミス注意：x'は「−y sinθ」。cos30°=0.866, sin30°=0.5を正確に。"},
{y:"R8",no:6,field:"測量の基準",type:"5択(誤り)",q:"測量法における測量の基準について、明らかに間違っているものはどれか。",c:["世界測地系では、回転楕円体の短軸は地球の自転軸と一致している。","距離及び面積は、測量法で規定する回転楕円体の表面上の値で表示する。","位置は、地理学的経緯度及び平均海面からの高さで表示する（場合により直角座標等も可）。","国土地理院は、基本測量で設置された基準点の標高成果を令和7年4月1日に改定した。","ジオイドは、重力の大きさが常に等しい面である。"],a:5,exp:"誤りは5。ジオイドは重力の「ポテンシャルが等しい面（等ポテンシャル面）」であり、重力の“大きさ”が等しい面ではない。\n⚠️「重力の大きさが等しい」は典型のひっかけ。正しくは“ポテンシャル”。",fig:"gnss-height"},
{y:"R8",no:8,field:"基準点測量",type:"5択(語句)",q:"公共測量におけるトータルステーションを用いた基準点測量について、ア〜エに入る組合せはどれか。\nア：偏心点を設置する場合、偏心距離は測点間距離の（ ア ）分の1以下を標準\nイ：水平角観測の対回内の観測方向数は（ イ ）以下\nウ：厳密水平網平均計算による新点水平位置の標準偏差の許容範囲（ ウ ）\nエ：厳密高低網平均計算による新点標高の標準偏差の許容範囲（ エ ）",c:["ア:6 イ:6方向 ウ:100mm エ:200mm","ア:4 イ:5方向 ウ:100mm エ:100mm","ア:4 イ:6方向 ウ:200mm エ:100mm","ア:6 イ:6方向 ウ:200mm エ:200mm","ア:6 イ:5方向 ウ:100mm エ:200mm"],a:5,exp:"正しい組合せは5（ア:6／イ:5方向／ウ:100mm／エ:200mm）。\n💡 対回内の観測方向数は5方向以下。水平位置100mm・標高200mmの許容範囲はセットで覚える。"},
{y:"R8",no:9,sub:"a",field:"GNSS測量",type:"○×",q:"GNSS観測において、準天頂衛星はGPS衛星と同等の衛星として扱うことができる。",c:["正しい","誤り"],a:1,exp:"正しい。準天頂衛星はGPSと同等に扱える。"},
{y:"R8",no:9,sub:"b",field:"GNSS測量",type:"○×",q:"スタティック法で観測距離10km以上の観測でGLONASS衛星も用いる場合、これらの衛星を5衛星以上使用する。",c:["正しい","誤り"],a:2,exp:"誤り。GLONASSを併用する場合はGPS・準天頂で5衛星以上に加え、GLONASSを2衛星以上使用する等の条件がある。“合計5衛星”では不足。"},
{y:"R8",no:9,sub:"c",field:"GNSS測量",type:"○×",q:"対流圏における電波の伝搬遅延に起因する誤差は、2周波の観測により軽減することができる。",c:["正しい","誤り"],a:2,exp:"誤り。2周波で軽減できるのは「電離層」遅延。対流圏遅延は2周波では消去できない。\n⚠️ 電離層⇔対流圏の取り違えが超頻出。2周波＝電離層。"},
{y:"R8",no:9,sub:"d",field:"GNSS測量",type:"○×",q:"GNSS観測の基線解析では、GNSS衛星の軌道情報は放送暦を標準とする。",c:["正しい","誤り"],a:1,exp:"正しい。基線解析の軌道情報は放送暦が標準。"},
{y:"R8",no:9,sub:"e",field:"GNSS測量",type:"○×",q:"アンテナ位相特性が異なるアンテナ間のGNSS測量では、PCV補正を適用することにより異機種間観測での精度が向上する。",c:["正しい","誤り"],a:1,exp:"正しい。PCV補正で異機種間の精度を確保できる。"},
{y:"R8",no:10,field:"GNSS標高計算",type:"計算",q:"GNSS基準点測量で、既知点A〜新点Bの基準面上の距離6,000.00m、新点Bの楕円体高105.98mを得た。新点Bの標高は幾らか。\n・既知点Aの標高135.66m、楕円体高176.75m\n・ジオイドは楕円体面に対しA→B方向へ基準面上1,000mあたり−0.02mの一様な傾斜",c:["64.77m","64.89m","64.91m","65.01m","65.13m"],a:4,exp:"標高H＝楕円体高h−ジオイド高N。\nA点でN=176.75−135.66=41.09m、ジオイド傾斜−0.02×6=−0.12m→N_B=40.97m。\nH_B=105.98−40.97=65.01m。\n⚠️ Nは“引く”。傾斜は距離に比例配分(×6km)。",fig:"gnss-height"},
{y:"R8",no:11,field:"水準測量",type:"5択(誤り)",q:"公共測量における水準測量について、明らかに間違っているものはどれか。",c:["観測方程式で水準網の平均計算を行う場合、求点の仮定標高は任意の値でよい。","直接水準測量の平均計算で、重量は観測距離の逆数とする。","1級水準測量で標尺目盛を後視・前視・前視・後視の順に読定するのは、鉛直軸誤差を小さくすることが目的である。","1級水準測量では標尺補正計算及び正規正標高補正計算を行う。","新点の観測は、永久標識の設置後24時間以上経過してから行う。"],a:3,exp:"誤りは3。後視・前視・前視・後視の読定順は、観測中の“レベルの沈下”等の影響を軽減するためで、目的が違う（鉛直軸誤差の軽減ではない）。\n💡 読定順＝時間経過に伴う沈下対策、と覚える。"},
{y:"R8",no:12,field:"GNSS標高測量",type:"5択(誤り)",q:"公共測量におけるGNSS標高測量について、明らかに間違っているものはどれか。",c:["GNSS標高測量とは、GNSS測量機で新設水準点の標高を定める作業をいい、2級水準測量に区分される。","基線解析の固定点の楕円体高は、ジオイド高及び成果表の標高から求めた値とする。","令和7年4月時点の最新ジオイド・モデルは「ジオイド2024日本とその周辺」である。","ジオイド高は国土地理院提供の最新ジオイド・モデルから求めた値とする。","既知点とする電子基準点と新点間の距離は6,000m以上を標準とする。"],a:1,exp:"誤りは1。GNSS標高測量の精度区分の記述が誤り（2級水準測量に区分されるという記述が不適当）。他は正しい規定。\n⚠️ 精度区分（何級相当か）の数値すり替えに注意。"},
{y:"R8",no:14,field:"現地測量",type:"5択(誤り)",q:"公共測量における現地測量について、明らかに間違っているものはどれか。",c:["使用する測量機は2級GNSS測量機又はこれと同等以上を標準とする。","ネットワーク型RTK法によるTS点設置で単点観測法を用いた場合、1点の既知点を使用し整合確認を行う。","観測値を点検する場合のセット間較差の許容範囲は、水平面の南北・東西成分20mm、高さ成分30mm。","TSを用いる地形・地物の測定における標高測定は、必要に応じて水準測量により行うことができる。","キネマティック法・RTK法ではGPS・準天頂・GLONASS衛星を組み合わせて使用できる。"],a:2,exp:"誤りは2。単点観測法の点検方法の記述が誤り（1点の既知点による整合確認ではなく、2回の観測較差等で点検する）。\n⚠️ 「単点観測法＝既知点1点で整合確認」というもっともらしい記述に注意。"},
{y:"R8",no:16,field:"地上レーザ測量",type:"5択(語句)",q:"公共測量における地上レーザ測量について、ア〜ウに入る組合せはどれか。\nア：距離計測方法は、タイム・オブ・フライト方式又は（ ア ）方式\nイ：平面直角座標系で計測する場合の計測方法は（ イ ）を原則\nウ：同一箇所から複数回計測する場合、器械高は（ ウ ）ことを原則",c:["ア:位相差 イ:器械点・後視点法 ウ:変える","ア:結合多角 イ:相似変換法又は後方交会法 ウ:変えない","ア:結合多角 イ:器械点・後視点法 ウ:変える","ア:位相差 イ:相似変換法又は後方交会法 ウ:変えない","ア:位相差 イ:相似変換法又は後方交会法 ウ:変える"],a:1,exp:"正しい組合せは1（ア:位相差／イ:器械点・後視点法／ウ:変える）。\n💡 距離計測はTOF方式か“位相差”方式。複数回計測は器械高を“変える”のが原則。"},
{y:"R8",no:17,field:"空中写真の重複度(計算)",type:"計算",q:"標高300〜700mの土地を、デジタル航空カメラ鉛直下で撮影。全体で隣接コースの重複度が最小35%となるよう計画。撮影基準面300mでの隣接コース重複度は最大で何%か。\n・画面距離10cm、素子寸法10μm、画面26,000×17,000画素、画面短辺が撮影基線と平行\n・等高度・コース間隔一定、撮影基準面の地上画素寸法20cm",c:["44%","48%","52%","56%","58%"],a:2,exp:"重複度が最小35%になるのは地表が最も高い700m。そこでのコース間隔をもとに、基準面(300m)では地上カバーが広くなり重複度は最大に。計算すると約48%。\n⚠️ 最小重複度は“最も高い地表”で発生。基準面(低い側)では重複度が大きくなる。",fig:"overlap"},
{y:"R8",no:18,sub:"a",field:"写真地図",type:"○×",q:"峡谷をまたぐ道路の高架橋部分でひずみが生じた場合、ブレークライン法で取得した橋桁直下の地形標高を用いて正射変換すれば、ひずみを修正できる。",c:["正しい","誤り"],a:2,exp:"誤り。高架橋のような“地物”の倒れ込みは、地形(地表)の標高では補正できない。"},
{y:"R8",no:18,sub:"b",field:"写真地図",type:"○×",q:"数値地形モデル作成で、河川や小規模な湖沼などの湛水面には、標高値に−9999m等の現実に存在しない値を与える。",c:["正しい","誤り"],a:2,exp:"誤り。水面には適切な標高値を与える。−9999等は無効値の扱いで、湛水面の標高には用いない。"},
{y:"R8",no:18,sub:"c",field:"写真地図",type:"○×",q:"既存の数値地形モデルを用いる場合、データの品質や経年変化などの点検を行う必要がある。",c:["正しい","誤り"],a:1,exp:"正しい。既存DEM利用時は品質・経年変化の点検が必要。"},
{y:"R8",no:18,sub:"d",field:"写真地図",type:"○×",q:"地上画素寸法8cmの数値写真を用いて、地上画素寸法10cmの写真地図を作成できる。",c:["正しい","誤り"],a:1,exp:"正しい。より細かい写真から粗い写真地図を作るのは可能。"},
{y:"R8",no:18,sub:"e",field:"写真地図",type:"○×",q:"数値地形モデルファイルの点検は、デジタルステレオ図化機等で計測した標高点とDEMから抽出した標高点を比較して行う。",c:["正しい","誤り"],a:1,exp:"正しい。実測標高点との比較で点検する。"},
{y:"R8",no:19,field:"航空レーザ測量(計算)",type:"計算",q:"航空レーザ測量で数値地形モデルを作成する。飛行方向の標準的な取得点間距離は幾らか。\n・パルスレート 毎秒500,000回、スキャンレート 毎秒100往復、スキャン角度±30°\n・対地高度2,000m、対地飛行速度 秒速80m",c:["0.2m","0.4m","0.8m","1.8m","2.5m"],a:2,exp:"飛行方向の点間距離＝対地飛行速度÷(1秒間の走査線数)。1往復で往路・復路の2走査線→毎秒200走査線。80÷200=0.4m。\n💡 飛行方向＝速度÷走査線数、走査方向＝別途スキャン範囲÷1走査の点数で考える。"},
{y:"R8",no:20,field:"UAVレーザ測量",type:"5択(語句)",q:"公共測量におけるUAVレーザ測量について、ア〜エに入る組合せはどれか。\nア：GNSSは（ ア ）の間隔で観測データを取得\nイ：（ イ ）で搬送波位相を観測\nウ：レーザ光の入射角は（ ウ ）\nエ：隣接コースの重複部でコースごとの（ エ ）を比較して点検・調整",c:["ア:30秒以下 イ:2周波 ウ:30°以上 エ:標高値","ア:30秒以下 イ:1周波 ウ:45°以上 エ:数値写真","ア:1秒以下 イ:2周波 ウ:45°以上 エ:標高値","ア:1秒以下 イ:1周波 ウ:30°以上 エ:標高値","ア:1秒以下 イ:2周波 ウ:30°以上 エ:数値写真"],a:3,exp:"正しい組合せは3（ア:1秒以下／イ:2周波／ウ:45°以上／エ:標高値）。\n💡 GNSSは1秒以下の高頻度、2周波で観測。点検は隣接コースの“標高値”を比較。"},
{y:"R8",no:22,field:"地図投影法",type:"5択(誤り)",q:"地図投影法について、明らかに間違っているものはどれか。",c:["平面の地図で正積と正角の性質を同時に満たすことは理論上不可能である。","球面上の図形の面積比が地図上で正しく表示される投影法を正積図法という。","正積図法は、世界全体のような広範囲の植生分布・人口密度などを示すのに適している。","正角図法は、ごく狭い範囲での形状が地球上と地図上で相似となる図法である。","メルカトル図法は正角円筒図法の一種であり、任意の2地点間の最短経路は直線で表される。"],a:5,exp:"誤りは5。メルカトル図法で直線として表されるのは「等角航路」。最短経路（大圏コース）は曲線になる。\n⚠️ メルカトルの直線＝等角航路であって最短経路ではない、が定番。",fig:"projection"},
{y:"R8",no:23,sub:"a",field:"DTMの活用",type:"○×",q:"DTMで段彩図を作成する際、同じ色で表現する標高値の範囲を狭く設定すると、地形の微細な起伏を表せる。",c:["正しい","誤り"],a:1,exp:"正しい。色分けの標高幅を狭くすると細かい起伏を表現できる。"},
{y:"R8",no:23,sub:"b",field:"DTMの活用",type:"○×",q:"DTMと基盤地図情報の建築物外周線データを用いて、地表面からの高さが10m以上の建築物を抽出できる。",c:["正しい","誤り"],a:2,exp:"誤り。DTMは“地表面のみ”で建物の高さ情報を持たない。建物高さの抽出にはDSMが必要。\n⚠️ DTM(地表)とDSM(建物・樹木含む表層)の違いが狙われる。"},
{y:"R8",no:23,sub:"c",field:"DTMの活用",type:"○×",q:"DTMから傾斜の急な地域を抽出し、土砂災害などの危険箇所の推定に活用できる。",c:["正しい","誤り"],a:1,exp:"正しい。傾斜解析で危険箇所推定に使える。"},
{y:"R8",no:23,sub:"d",field:"DTMの活用",type:"○×",q:"同じグラウンドデータからDTMを作成する場合、格子間隔を大きくする方が地形をより詳細に表現できる。",c:["正しい","誤り"],a:2,exp:"誤り。格子間隔は“小さくする”ほど詳細に表現できる。\n⚠️ 大小の逆転ひっかけ。細かく＝格子間隔小。"},
{y:"R8",no:23,sub:"e",field:"DTMの活用",type:"○×",q:"中心投影の数値写真から正射投影画像を作成する際、DTMを用いることで土地の起伏に起因するひずみを取り除ける。",c:["正しい","誤り"],a:1,exp:"正しい。正射変換でDTMを用いて起伏によるひずみを補正する。"},
{y:"R8",no:24,field:"地図編集の作業順序",type:"5択(順序)",q:"公共測量における地図編集の標準的な作業順序として最も適当なものはどれか。\n（a:編集原稿データの作成／b:資料収集及び整理／c:成果等の整理／d:数値地形図データファイルの作成／e:数値編集／f:品質評価／g:作業計画）",c:["b→g→a→e→d→f→c","b→g→a→d→e→f→c","g→b→a→e→d→f→c","g→b→e→a→d→f→c","g→b→e→d→a→f→c"],a:3,exp:"正しい順序は3：g作業計画→b資料収集整理→a編集原稿データ作成→e数値編集→d数値地形図データファイル作成→f品質評価→c成果等の整理。\n💡 どの測量も“作業計画→資料収集→…→品質評価→成果整理”の骨格は共通。"},
{y:"R8",no:25,field:"クロソイド(計算)",type:"計算",q:"基本型クロソイド(対称型)の道路で、円曲線部の半径R=270m、交角τ=60°、クロソイドパラメータA=150m、π=3.142とするとき、始点P〜終点Qの路線長は幾らか。",c:["167m","199m","283m","366m","408m"],a:4,exp:"クロソイド長 L=A²/R=150²/270≒83.33m(片側)。クロソイドの接線角 τ0=L/2R=83.33/540≒0.154rad。\n円曲線の中心角=60°(1.047rad)−2×0.154=0.738rad → 円弧長=270×0.738≒199m。\n路線長=83.33×2+199≒366m。"},
{y:"R8",no:26,field:"用地測量",type:"5択(誤り)",q:"公共測量における用地測量について、明らかに間違っているものはどれか。",c:["登記記録の調査のため、登記事項証明書等に基づき土地調査表を作成する。","権利者確認調査のため、測量計画機関から貸与された資料等を基に権利者調査表を作成する。","復元測量で仮杭を設置する場合は関係権利者へ事前説明を行うが、仮杭設置作業時には原則として立会いは行わない。","用地境界仮杭設置は、交点計算等で求めた座標値に基づき、4級基準点以上の基準点から放射法で行える。","境界点に既設の標識がある場合は、関係権利者の同意を得ることなく、それを境界点とすることができる。"],a:5,exp:"誤りは5。既設の標識をそのまま境界点とするには、関係権利者の確認・同意が必要。\n⚠️「同意を得ることなく」は誤りのサイン。"},
{y:"R8",no:28,field:"河川測量",type:"5択(誤り)",q:"公共測量における河川測量について、明らかに間違っているものはどれか。",c:["法線測量とは、築造物の新設・改修などで現地の法線上に杭を設置し線形図データファイルを作成する作業をいう。","距離標は、河心線の接線に対して直角方向の右岸又は左岸のいずれかの堤防法肩に設置することを標準とする。","定期縦断測量は、観測の基準を水準基標とし、水準基標から出発して他の水準基標に結合する。","定期縦断測量は、平地では3級水準測量、山地では原則として4級水準測量により行う。","定期横断測量では、航空レーザ測深で得た水底・陸上の三次元点群データを用いて横断面図データを作成できる。"],a:2,exp:"誤りは2。距離標は右岸・左岸の“両岸”に設置するのが標準で、「いずれか一方」は誤り。\n⚠️「いずれか」「一方のみ」は誤りを疑う。"},
/* ===== 令和7年 午前 ===== */
{y:"R7",no:1,sub:"a",field:"測量法",type:"○×",q:"「基本測量」とは、全ての測量の基礎となる測量で、国が計画する全ての測量が含まれる。",c:["正しい","誤り"],a:2,exp:"誤り。基本測量は「国（国土地理院）が行う測量」で、全ての測量の基礎となる測量。国が計画する全ての測量ではない。\n⚠️「全ての〜が含まれる」は言い過ぎで誤りのサイン。"},
{y:"R7",no:1,sub:"b",field:"測量法",type:"○×",q:"「測量成果」とは当該測量で最終目的として得た結果をいい、「測量記録」とは成果を得る過程で得た作業記録をいう。",c:["正しい","誤り"],a:1,exp:"正しい。成果＝最終結果、記録＝過程の作業記録。"},
{y:"R7",no:1,sub:"c",field:"測量法",type:"○×",q:"公共測量を実施する者は、関係市町村長に対し、測量に必要な情報の提供を求めることができる。",c:["正しい","誤り"],a:1,exp:"正しい。必要な情報提供を求めることができる。"},
{y:"R7",no:1,sub:"d",field:"測量法",type:"○×",q:"測量計画機関は、自ら測量作業機関となることはできない。",c:["正しい","誤り"],a:2,exp:"誤り。測量計画機関は自ら測量作業機関を兼ねることができる。\n⚠️「〜できない」の断定は誤りを疑う。"},
{y:"R7",no:1,sub:"e",field:"測量法",type:"○×",q:"「測量業」とは、基本測量・公共測量又はそれ以外の測量を請け負う営業をいう。",c:["正しい","誤り"],a:1,exp:"正しい。測量業の定義どおり。"},
{y:"R7",no:2,sub:"a",field:"ITRF・座標系",type:"○×",q:"ITRFにおける地球上の位置は、地球の重心を原点とした三次元直交座標で表される。",c:["正しい","誤り"],a:1,exp:"正しい。ITRFは地心座標系。"},
{y:"R7",no:2,sub:"b",field:"ITRF・座標系",type:"○×",q:"ITRFのX軸は経度0°の子午線と赤道の交点方向を正とし、Y軸は西経90°の子午線と赤道の交点方向を正とする。",c:["正しい","誤り"],a:2,exp:"誤り。Y軸は「東経90°」方向が正。\n⚠️ 西経90°⇔東経90°の取り違え。X=経度0°(グリニッジ)、Y=東経90°。"},
{y:"R7",no:2,sub:"c",field:"ITRF・座標系",type:"○×",q:"日本国内の座標をITRFで表すと、X座標の符号は常に負である。",c:["正しい","誤り"],a:1,exp:"正しい。東経約135°ではcosが負→X負。"},
{y:"R7",no:2,sub:"d",field:"ITRF・座標系",type:"○×",q:"日本は回転楕円体としてGRS80を採用しており、その短軸はITRFのZ軸と一致している。",c:["正しい","誤り"],a:1,exp:"正しい。GRS80の短軸＝Z軸(自転軸)方向。"},
{y:"R7",no:2,sub:"e",field:"ITRF・座標系",type:"○×",q:"日本の測地成果は、ITRFが更新されると連動して自動的に更新される。",c:["正しい","誤り"],a:2,exp:"誤り。測地成果はITRFの更新で自動連動はせず、必要に応じ改定される。"},
{y:"R7",no:3,field:"測量計画・作業機関",type:"5択(誤り)",q:"公共測量における測量計画機関又は測量作業機関の対応について、明らかに間違っているものはどれか。",c:["測量計画機関Aが、計画書について国土地理院の長への提出を省略した。","測量作業機関Bが、財産権・労働安全・個人情報保護などの法令を遵守して作業を行った。","測量計画機関Cが、得ようとする測量成果の種類・内容・品質などを示す製品仕様書を定めた。","測量計画機関Dが、JPGISに準拠して製品仕様書を定めた。","測量作業機関Eが、作業計画を立案し測量計画機関に提出して承認を得た。"],a:1,exp:"誤りは1。公共測量を行う者は事前に計画書を国土地理院の長へ提出し、技術的助言を求める必要があり、省略できない。\n⚠️「省略した」は誤りのサイン。"},
{y:"R7",no:4,sub:"a",field:"測量作業機関の対応",type:"○×",q:"貸与された個人情報を含むデータのUSBメモリを紛失したが、バックアップがあり作業に影響がなかったので、作業終了時に紛失もまとめて報告した。",c:["正しい","誤り"],a:2,exp:"誤り。個人情報の紛失は重大事故で、直ちに報告すべき。終了時にまとめて報告は不適切。"},
{y:"R7",no:4,sub:"b",field:"測量作業機関の対応",type:"○×",q:"現地作業前に、危険予知活動(KY活動)を行い安全意識を高めた。",c:["正しい","誤り"],a:1,exp:"正しい。KY活動は適切な安全対策。"},
{y:"R7",no:4,sub:"c",field:"測量作業機関の対応",type:"○×",q:"作業計画の技術者が病気で対応できなくなったため、交代を調整し、作業計画の変更について測量計画機関の承認を得た。",c:["正しい","誤り"],a:1,exp:"正しい。計画変更は承認を得る。"},
{y:"R7",no:4,sub:"d",field:"測量作業機関の対応",type:"○×",q:"現地作業で伐採した枝葉と未使用の資材を作業地付近の草地で焼却し、灰などのゴミを残さないよう清掃した。",c:["正しい","誤り"],a:2,exp:"誤り。野外での焼却は法令上原則禁止。廃棄物は適正に処理する。"},
{y:"R7",no:4,sub:"e",field:"測量作業機関の対応",type:"○×",q:"駐車場で標尺を接触させ第三者の自動車を損傷させたため、警察に連絡するとともに直ちに測量計画機関へも報告した。",c:["正しい","誤り"],a:1,exp:"正しい。事故は直ちに報告する。"},
{y:"R7",no:5,field:"正規分布(計算)",type:"5択(語句)",q:"正規分布について、ア〜エに入る数値の組合せはどれか。\nア：平均μが（ア）、σ²が1のとき標準正規分布\nイ：μ±2σの範囲に入る割合は約（イ）%\nウ：μ±3σの範囲に入る割合は約（ウ）%\nエ：平均60点・標準偏差10点で、80〜90点の間に入る受験者数は約（エ）人（1,000人中）",c:["ア:0 イ:95.5 ウ:97.7 エ:10","ア:0 イ:95.5 ウ:99.7 エ:21","ア:1 イ:93.5 ウ:97.7 エ:34","ア:1 イ:95.5 ウ:99.7 エ:42","ア:1 イ:97.5 ウ:99.7 エ:21"],a:2,exp:"正しい組合せは2。標準正規分布は平均0・分散1。μ±2σ≒95.5%、μ±3σ≒99.7%。\n80点=μ+2σ、90点=μ+3σの間の割合＝(99.7−95.5)/2≒2.1%→1,000×0.021≒21人。\n💡 ±1σ68%/±2σ95%/±3σ99.7% を暗記。",fig:"normal"},
{y:"R7",no:6,field:"測量の基準",type:"5択(誤り)",q:"測量法における測量の基準について、明らかに間違っているものはどれか。",c:["位置は地理学的経緯度及び平均海面からの高さで表示する（場合により直角座標等も可）。","面積は、ジオイド上の値で表示する。","回転楕円体は、中心が地球の重心と一致し、短軸が地球の自転軸と一致する。","地理学的経緯度は、世界測地系に従って測定しなければならない。","測量の原点は、日本経緯度原点及び日本水準原点とする（離島等で承認を得たときを除く）。"],a:2,exp:"誤りは2。距離及び面積は「回転楕円体の表面上」の値で表示する。ジオイド上ではない。\n⚠️ 楕円体面⇔ジオイド面の取り違え。距離・面積＝楕円体面上。",fig:"gnss-height"},
{y:"R7",no:7,field:"基準点測量",type:"5択(語句)",q:"トータルステーションを用いた基準点測量について、ア〜ウに入る組合せはどれか。\nア：気温上昇で大気密度が小さくなると屈折率が小さくなり、観測距離は見かけ上（ア）なる\nイ：偏心距離は（イ）の6分の1以下を標準\nウ：角観測の良否判定で、鉛直角観測では高度定数の（ウ）を点検",c:["ア:長く イ:既知点間距離 ウ:較差","ア:長く イ:測点間距離 ウ:標準偏差","ア:短く イ:測点間距離 ウ:較差","ア:短く イ:既知点間距離 ウ:標準偏差","ア:短く イ:測点間距離 ウ:標準偏差"],a:3,exp:"正しい組合せは3（ア:短く／イ:測点間距離／ウ:較差）。\n💡 高度定数は「較差」を点検（標準偏差ではない）。偏心距離は“測点間距離”の1/6以下。"},
{y:"R7",no:9,field:"準天頂衛星",type:"5択(誤り)",q:"準天頂衛星などについて、明らかに間違っているものはどれか。",c:["準天頂衛星は日本で高仰角に位置する時間が長く、測位可能なエリアや時間帯を広げる。","準天頂衛星は約24時間ごとにほぼ同じ配置を取る。","少なくとも1機が天頂方向に見え、他衛星と組み合わせ良好な配置を維持しやすい。","地表に投影すると8の字を描く衛星と、ほぼ同じ位置に留まる衛星がある。","スタティック法10km以上の観測で必要な衛星数は、GPSと準天頂を合わせて最小で4衛星である。"],a:5,exp:"誤りは5。長距離(10km以上)のスタティック観測では衛星数は5衛星以上が必要。4衛星では不足。\n⚠️ 衛星数の数値すり替え（4⇔5）に注意。"},
{y:"R7",no:10,field:"GNSS測量",type:"5択(誤り)",q:"GNSS測量機を用いた基準点測量について、明らかに間違っているものはどれか。",c:["異なる機種のアンテナを組み合わせる場合、原則としてPCV補正が必要である。","GNSS衛星・受信機の時計のずれに起因する誤差は、二重位相差の解析で消去できる。","スタティック法は複数点に測量機を整置し、同時受信・基線解析で基線ベクトルを求める。","スタティック法では、GNSS衛星の軌道情報に精密暦を用いなければならない。","ネットワーク型RTK法は、補正データを通信回線で移動局が受信し即時に位置を求める。"],a:4,exp:"誤りは4。基線解析の軌道情報は「放送暦」を標準とする。精密暦は必須ではない。\n⚠️ 放送暦(標準)⇔精密暦(必須ではない)の区別。"},
{y:"R7",no:12,sub:"a",field:"水準測量",type:"○×",q:"1級・2級水準測量におけるレベルの点検調整は、観測着手前及び観測期間中おおむね10日ごとに行う。",c:["正しい","誤り"],a:1,exp:"正しい。点検調整は着手前と期間中おおむね10日ごと。"},
{y:"R7",no:12,sub:"b",field:"水準測量",type:"○×",q:"1級水準測量では、観測の開始時・終了時・固定点到着時ごとに1℃単位で気温を測定する。",c:["正しい","誤り"],a:1,exp:"正しい。標尺補正のため気温を測定する。"},
{y:"R7",no:12,sub:"c",field:"水準測量",type:"○×",q:"直接水準測量の最大視準距離は、水準測量の等級区分によらず、機器の性能によって定められている。",c:["正しい","誤り"],a:2,exp:"誤り。最大視準距離は「等級区分ごと」に定められている。機器性能のみで決まるのではない。"},
{y:"R7",no:12,sub:"d",field:"水準測量",type:"○×",q:"標尺は2本1組とし往復で標尺を交換するが、これはレベルの視準軸の傾きに起因する誤差を消去する目的が含まれる。",c:["正しい","誤り"],a:2,exp:"誤り。標尺の交換は「標尺のゼロ点(零目盛)誤差」を消去する目的。視準軸の傾きの誤差ではない。"},
{y:"R7",no:12,sub:"e",field:"水準測量",type:"○×",q:"1級水準測量では標尺の下方20cm以下を読定しないが、これは地面付近の大気の屈折による誤差を小さくするため。",c:["正しい","誤り"],a:1,exp:"正しい。地面付近の大気屈折(かげろう)の影響を避けるため。"},
{y:"R7",no:14,field:"現地測量",type:"5択(誤り)",q:"公共測量における現地測量について、明らかに間違っているものはどれか。",c:["現地測量で使用する基準点は、4級基準点・簡易水準点又はこれと同等以上とする。","使用する機器は、3級トータルステーション又は2級GNSS測量機と同等以上を標準とする。","基準点又はTS点から地形を測定する場合、地性線及びジオイド高を測定し、等高線描画を行う。","作成する数値地形図データの地図情報レベルは、原則として1000以下とする。","測定した座標値等には、属性を表すため原則として分類コードを付す。"],a:3,exp:"誤りは3。地形測定では地性線及び「標高」を測定する。ジオイド高を測定するのではない。\n⚠️ ジオイド高⇔標高の取り違え。"},
{y:"R7",no:15,field:"GNSS現地測量",type:"5択(誤り)",q:"GNSS測量機を用いた現地測量について、明らかに間違っているものはどれか。",c:["ネットワーク型RTK法では、GPS・準天頂・GLONASSを用いることができる。","ネットワーク型RTK法の測定は、ある1点から基準方向と各細部点との交角及び距離を測定する手法で行える。","単点観測法で周辺の既知点と整合しない場合、ヘルマート変換などで水平の整合処理を行う。","RTK法では初期化を行う観測点で、1セット目終了後に再初期化し2セット目を観測する。","キネマティック法・RTK法によるTS点設置の較差許容範囲は、南北・東西20mm、高さ30mm。"],a:2,exp:"誤りは2。基準方向と各点との交角・距離で測る手法は「TS(器械点)による測定」で、ネットワーク型RTK法の方法ではない。\n⚠️ 手法の取り違え（RTK⇔TS）。"},
{y:"R7",no:16,field:"地上レーザ測量",type:"5択(誤り)",q:"公共測量における地上レーザ測量について、明らかに間違っているものはどれか。",c:["地上レーザスキャナによる計測の方向は、地形の高い方から低い方への向きを原則とする。","標準的な地形・地物等が入射角1.5°以上で計測できる性能のものを使用する。","器械点から遠くなるほど、放射方向の計測点間隔及びスポット径は広がる。","数値図化の対象地物を計測する場合、放射方向の計測点間隔又はスポット長径のいずれかの条件を満たす。","オリジナルデータ作成時、内挿処理による点群データの細密化は行ってはならない。"],a:1,exp:"誤りは1。計測の方向は「低い方から高い方」への向きを原則とする（死角を減らすため）。\n💡 レーザ・写真とも“下から上へ”。"},
{y:"R7",no:17,field:"空中写真の重複度(計算)",type:"計算",q:"UAV写真点群測量でデジタルカメラを鉛直下に向け撮影。標高20〜40mの土地全体で同一コース内の隣接写真の重複度が最小80%となるよう計画。撮影基準面20mでの重複度は何%か。\n・焦点距離21mm、画面5,040×3,860画素、素子寸法7μm、画面短辺が撮影基線と平行\n・等高度・撮影基線長一定、撮影基準面の地上画素寸法2cm",c:["80%","84%","87%","90%","92%"],a:3,exp:"重複度が最小80%になるのは地表が最も高い40m。そこでの基線長Bを求め、基準面(20m)で換算すると約87%。\n⚠️ 最小重複度は“最も高い地表”で発生。基準面(低い側)では重複度が大きくなる。",fig:"overlap"},
{y:"R7",no:18,field:"リモートセンシング",type:"5択(誤り)",q:"人工衛星からのリモートセンシングについて、明らかに間違っているものはどれか。",c:["近赤外線は、可視光に比べ植物からの反射率が高い。","マイクロ波センサは光学センサより波長が長く、雲の影響を受けにくい。","合成開口レーダ(SAR)は、対象物が自ら放射する電磁波を受信する受動型センサである。","プッシュブルーム走査方式の光学ラインセンサでは、投影中心がスキャンラインごとに1点となる。","地上分解能が50cmより細かい画像を取得できる光学センサ搭載衛星が実用化されている。"],a:3,exp:"誤りは3。SARは自らマイクロ波を発射し反射波を受信する「能動型(アクティブ)」センサ。\n⚠️ 能動型⇔受動型の取り違え。SAR＝能動型。"},
{y:"R7",no:19,field:"UAV測量",type:"5択(誤り)",q:"公共測量におけるUAVを用いた測量について、明らかに間違っているものはどれか。",c:["UAV写真測量で高低差が大きい地域を撮影する場合、撮影基準面を数コース単位に設定できる。","UAV写真点群測量では、数値写真から三次元形状復元計算で三次元点群データを作成する。","水平位置・標高の基準となる標定点を検証点としても利用し、点群データの位置精度評価を行う。","UAVレーザ測量で、画像による地物確認のためレーザ計測と同時期に数値写真を撮影する。","UAVレーザ測量のオリジナルデータの点検は、検証点の設置や横断測量による点検などで行える。"],a:3,exp:"誤りは3。検証点は標定点とは「別に」設置する。標定点を検証点に兼用すると精度評価にならない。\n⚠️ 標定点と検証点の兼用は不可。"},
{y:"R7",no:20,sub:"a",field:"三次元点群データ",type:"○×",q:"地上レーザ測量で同一箇所から複数回計測する場合は、それぞれ地上レーザスキャナの器械高を変えて行う。",c:["正しい","誤り"],a:1,exp:"正しい。器械高を変えて計測する。"},
{y:"R7",no:20,sub:"b",field:"三次元点群データ",type:"○×",q:"車載写真レーザ測量では、計測した距離と角度から三次元形状復元計算により三次元点群データの座標を求めている。",c:["正しい","誤り"],a:2,exp:"誤り。「三次元形状復元計算」は写真測量の用語。車載レーザはレーザの距離・角度とGNSS/IMUの位置から直接座標を求める。"},
{y:"R7",no:20,sub:"c",field:"三次元点群データ",type:"○×",q:"UAV写真点群測量には、性能等が作業規程の条件を満たせば市販のデジタルカメラを使用できる。",c:["正しい","誤り"],a:1,exp:"正しい。条件を満たせば市販カメラ可。"},
{y:"R7",no:20,sub:"d",field:"三次元点群データ",type:"○×",q:"三次元形状復元計算に必要な標定点を、作業地域を囲むように配置し、最も標高の低い地点・高い地点にも設置した。",c:["正しい","誤り"],a:1,exp:"正しい。標定点は周囲を囲み、標高の最低・最高地点にも配置する。"},
{y:"R7",no:20,sub:"e",field:"三次元点群データ",type:"○×",q:"UAV写真点群測量で、隣接コースの数値写真との重複度が40%以上となるよう撮影計画を立てた。",c:["正しい","誤り"],a:2,exp:"誤り。UAV写真点群は高い重複度が必要で、隣接コース(サイドラップ)40%以上では不足。\n⚠️ 写真点群は通常の空中写真より高い重複度が必要。"},
{y:"R7",no:22,sub:"a",field:"地図投影法",type:"○×",q:"平面の地図上で、正角図法と正積図法の性質を同時に満足させることは、理論上は可能である。",c:["正しい","誤り"],a:2,exp:"誤り。正角と正積は両立不可能。",fig:"projection"},
{y:"R7",no:22,sub:"b",field:"地図投影法",type:"○×",q:"地球上のあらゆる地点間の距離を同一の縮尺で1枚の平面地図に正確に表示することは、理論上は可能である。",c:["正しい","誤り"],a:2,exp:"誤り。全ての距離を正確に表す平面地図は作れない（必ずひずむ）。"},
{y:"R7",no:22,sub:"c",field:"地図投影法",type:"○×",q:"平面直角座標系の一つの系で、原点より南かつ西に位置する地点のX座標・Y座標はともに正(＋)である。",c:["正しい","誤り"],a:2,exp:"誤り。平面直角座標系はX＝北向き・Y＝東向き。南はX負、西はY負となる。\n💡 X=北、Y=東。"},
{y:"R7",no:22,sub:"d",field:"地図投影法",type:"○×",q:"UTM座標系は、必ず地球全体を経度差10°の南北に長い座標帯に分割している。",c:["正しい","誤り"],a:2,exp:"誤り。UTMの座標帯は経度差「6°」ごと。\n⚠️ 6°⇔10°の数値ひっかけ。"},
{y:"R7",no:22,sub:"e",field:"地図投影法",type:"○×",q:"UTMの原点から東西±100km以内と、平面直角座標系の原点からY軸方向±100km以内では、どちらも縮尺係数が1未満である。",c:["正しい","誤り"],a:2,exp:"誤り。平面直角座標系は原点で0.9999だがY方向に離れると1を超える。両方とも1未満とは言えない。"},
{y:"R7",no:23,field:"GIS",type:"5択(誤り)",q:"防災分野におけるGIS及び地理空間情報の活用について、明らかに間違っているものはどれか。",c:["GISで浸水シミュレーション結果や被害分布を可視化でき、防災・復興計画の検討に役立つ。","道路ネットワークデータでGISのネットワーク解析を行い、避難経路の検討に活用できる。","DEMと写真等から判断した浸水箇所の位置情報で、おおよその浸水域を推定し地図表現できる。","斜面崩壊の土砂量を、発災前DSMと発災直後のDEMの差分に崩壊範囲の面積を乗じて正確に求められる。","地盤隆起で陸化した場合、隆起前後の海岸線データから陸化した範囲の面積を算出できる。"],a:4,exp:"誤りは4。土砂量(体積)は高さの差分×面積では正確には求まらない（差分を面積で積分する必要がある）。\n⚠️「正確に求められる」と断定する肢に注意。"},
{y:"R7",no:24,field:"基盤地図情報",type:"5択(誤り)",q:"地理空間情報活用推進基本法等に規定する基盤地図情報について、明らかに間違っているものはどれか。",c:["基盤地図情報には、海岸線・軌道の中心線・道路縁・建築物の外周線などの13項目がある。","平面位置及び高さの精度は、都市計画区域内と都市計画区域外で同一である。","都市計画区域内の基盤地図情報を基図として、地図情報レベル5000のハザードマップを作成できる。","国が保有する基盤地図情報は、原則インターネットで無償提供される。","整備には都市計画基図・道路台帳図・河川基盤地図などが活用される。"],a:2,exp:"誤りは2。基盤地図情報の精度は都市計画区域内と区域外で「異なる」。\n⚠️「同一である」は誤りのサイン。区域内の方が高精度。"},
{y:"R7",no:25,field:"クロソイド(計算)",type:"計算",q:"基本型クロソイド(対称型)の道路で、点A・Dをクロソイド始点、点B・Cをクロソイド終点、曲線B〜Cを円曲線とする。クロソイドパラメータA=120m、円曲線の半径R=200m、円曲線の中心角=45°、π=3.142のとき、交角τは幾らか。",c:["55°","66°","72°","79°","86°"],a:2,exp:"交角τ＝2×クロソイドの接線角τ0＋円曲線の中心角。\nτ0＝A²/(2R²)＝120²/(2×200²)＝0.18rad≒10.3°。\nτ＝2×10.3＋45≒66°。\n💡 クロソイド接線角 τ0＝A²/2R²(rad)、交角＝2τ0＋中心角。"},
{y:"R7",no:26,field:"用地測量",type:"5択(誤り)",q:"公共測量における用地測量について、明らかに間違っているものはどれか。",c:["公図等転写連続図で字界の線形に相違がある場合も調整せず、公図どおり転写する。","復元測量で仮杭を設置する場合は事前説明を行うが、原則として関係権利者の立会いは行わない。","ネットワーク型RTK法の境界測量で、1セット目後に再初期化し2セット目を観測、座標値は両セットの平均値とする。","用地境界仮杭設置は、視通が確保できる場合、視通法により道路計画中心線と境界線の交点に設置できる。","面積計算は境界測量の成果に基づき、原則として座標法により行う。"],a:4,exp:"誤りは4。用地境界仮杭は交点計算等で求めた座標値に基づき「放射法」で設置するのが原則で、記述の設置方法が不適当。"},
/* ===== 令和6年 午前 ===== */
{y:"R6",no:2,field:"ITRF・座標系",type:"5択(誤り)",q:"国際地球基準座標系(ITRF)について、明らかに間違っているものはどれか。",c:["ITRFは、GNSSやVLBIなどの宇宙測地技術による国際協力の観測に基づき構築・維持されている。","X軸は、回転楕円体の中心から経度0°の子午線と赤道の交点に向かう方向を正とする。","Y軸は、回転楕円体の中心から西経90°の子午線と赤道の交点に向かう方向を正とする。","Z軸は回転楕円体の短軸と一致し、中心から北に向かう値が正である。","日本経緯度原点をITRFで表すと、X・Y・Zの符号はそれぞれ X:−、Y:＋、Z:＋ である。"],a:3,exp:"誤りは3。Y軸は「東経90°」方向が正。西経90°ではない。\n⚠️ 西経90°⇔東経90°の取り違えが定番。X=経度0°、Y=東経90°、Z=北。"},
{y:"R6",no:3,field:"JPGIS",type:"5択(誤り)",q:"地理情報標準プロファイル(JPGIS)について、明らかに間違っているものはどれか。",c:["JPGISは、地理空間データの取得・処理・表現・転送等に最低限必要な基本要素を整理したものである。","地理空間データを作成する場合、XML形式やGML形式で符号化することを推奨している。","画像データは特定形式を指定せず、一般的に使用される形式を使用できる。","JPGISは、地球上の位置と直接的に関連付けられたオブジェクトのみに関する実用標準である。","JMP2.0仕様書(日本版メタデータプロファイル)を使用してメタデータを作成する。"],a:4,exp:"誤りは4。JPGISは位置と直接・間接に関連付けられた地理空間情報を広く扱う。「〜のみ」と限定するのが誤り。\n⚠️「〜のみ」は誤りを疑うキーワード。"},
{y:"R6",no:5,field:"正規分布(計算)",type:"計算",q:"偶然誤差だけを含む測定値群で、平均80.000m・標準偏差0.010m。測定値が80.005mと80.010mの間になる確率はいくらか。\n（上側確率：u=0.5→0.30854、u=1.0→0.15866）",c:["15.0%","15.9%","22.7%","30.9%","46.7%"],a:1,exp:"標準化：z1=(80.005−80.000)/0.010=0.5、z2=(80.010−80.000)/0.010=1.0。\nP(0.5<z<1.0)=上側(0.5)−上側(1.0)=0.30854−0.15866≒0.150→15.0%。\n💡 確率は「上側確率の差」で求める。まずzに標準化。",fig:"normal"},
{y:"R6",no:6,field:"測量の基準",type:"5択(誤り)",q:"測量法における測量の基準について、明らかに間違っているものはどれか。",c:["距離及び面積は、測量法で規定する回転楕円体の表面上の値で表示する。","日本経緯度原点及び日本水準原点の原点数値は測量法施行令で定められ、過去に改正されたことがある。","位置は地理学的経緯度及び平均海面からの高さで表示する（場合により直角座標等も可）。","地理学的経緯度は、世界測地系に従って測定しなければならない。","基本測量の測量成果は、ITRFが更新されると直ちに修正されなければならない。"],a:5,exp:"誤りは5。ITRFが更新されても基本測量の成果が「直ちに修正」されるわけではない。\n⚠️「直ちに」「必ず」など強い表現は誤りを疑う。"},
{y:"R6",no:7,field:"基準点測量",type:"5択(誤り)",q:"トータルステーションを用いた基準点測量について、明らかに間違っているものはどれか。",c:["新点の位置精度は既知点・新点の配置の影響を受けるため、標準の路線の辺数・路線長・路線図形等が定められている。","距離測定は、1視準1読定を1セットとし、2セット行う。","距離測定の気象補正の気温・気圧は、TSを整置した観測点で測定開始直前又は終了直後に行う。","TSで測定される斜距離には、反射鏡定数の誤差など測定距離に比例しない誤差が含まれる。","水平角観測において、対回内の観測方向数は5方向以下とする。"],a:2,exp:"誤りは2。距離測定の観測は「1視準2読定を1セット」とするのが標準で、読定回数の記述が誤り。\n⚠️ 視準・読定の回数の数値すり替えに注意。"},
{y:"R6",no:9,field:"GNSS測量",type:"5択(誤り)",q:"GNSS測量機を用いた1〜4級基準点測量について、明らかに間違っているものはどれか。",c:["1〜3級基準点測量では、既知点を電子基準点のみとすることができる。","スタティック法10km以上でGPS・準天頂・GLONASSを用いる場合、使用衛星数は6衛星以上とする。","ネットワーク型RTK法は補正データ等を通信回線で移動局が受信し、即時に位置を求める（後処理も可）。","スタティック法等のアンテナ高の測定は、標識上面からGNSSアンテナの位相中心までとする。","スタティック法等の基線解析では、原則としてPCV補正を行う。"],a:4,exp:"誤りは4。アンテナ高は標識上面からアンテナ底面(基準となる位置)までを測る。「位相中心まで」は誤り。\n⚠️ アンテナ高の基準位置のすり替えに注意。"},
{y:"R6",no:10,field:"GNSS標高計算",type:"計算",q:"GNSS基準点測量で、電子基準点A〜新点Bの距離12,000.00m、新点Bの楕円体高497.57mを得た。新点Bの標高は幾らか。\n・電子基準点Aの標高492.48m、楕円体高534.09m\n・ジオイド高はA→B方向へ1,000mあたり−0.07mの一様な変化",c:["455.12m","455.88m","455.96m","456.80m","464.36m"],a:4,exp:"標高H＝楕円体高h−ジオイド高N。\nA点のN=534.09−492.48=41.61m、変化−0.07×12=−0.84m→N_B=40.77m。\nH_B=497.57−40.77=456.80m。\n⚠️ Nは“引く”。ジオイド高の変化を距離に比例配分(×12km)。",fig:"gnss-height"},
{y:"R6",no:14,field:"現地測量",type:"5択(誤り)",q:"GNSS測量機を用いた現地測量について、明らかに間違っているものはどれか。",c:["キネマティック法・RTK法での使用衛星数は5衛星以上を標準とする。","ネットワーク型RTK法のTS点設置を単点観測法で行う場合、整合を確認する既知点数は1点を標準とする。","キネマティック法・RTK法の地形・地物測定は、基準点又はTS点に整置し放射法で1セット行う。","ネットワーク型RTK法の地形・地物測定は、GNSS測量機1台で行うことができる。","使用する測量機は、2級以上の性能を有するGNSS測量機とする。"],a:2,exp:"誤りは2。単点観測法での整合確認は、既知点2点以上で行うのが標準で、「1点」は誤り。\n⚠️ 整合確認の既知点数の数値に注意。"},
{y:"R6",no:18,sub:"a",field:"リモートセンシング",type:"○×",q:"プッシュブルーム走査方式のラインセンサでは、衛星の進行とともに帯状に画像を取得し、その画像は正射投影画像である。",c:["正しい","誤り"],a:2,exp:"誤り。ラインセンサ画像はそのままでは正射投影画像ではない（中心投影的なゆがみを含む）。正射化には別途処理が必要。"},
{y:"R6",no:18,sub:"b",field:"リモートセンシング",type:"○×",q:"熱赤外線のリモートセンシングでは対象物の熱放射を観測するため、夜間でも水面温度や雲の分布を観測できる。",c:["正しい","誤り"],a:1,exp:"正しい。熱赤外は自らの熱放射を捉えるため夜間も観測可。"},
{y:"R6",no:18,sub:"c",field:"リモートセンシング",type:"○×",q:"可視光の波長帯は、近赤外線の波長帯に比べて植物からの反射率が高い。",c:["正しい","誤り"],a:2,exp:"誤り。植物からの反射率は「近赤外」の方が高い（可視光より）。\n⚠️ 可視光⇔近赤外の反射率の大小が逆。植物は近赤外を強く反射。"},
{y:"R6",no:18,sub:"d",field:"リモートセンシング",type:"○×",q:"合成開口レーダ(SAR)は、対象物にマイクロ波を照射し反射波を受信して地表状態を把握する能動型センサである。",c:["正しい","誤り"],a:1,exp:"正しい。SARは自らマイクロ波を出す能動型。"},
{y:"R6",no:18,sub:"e",field:"リモートセンシング",type:"○×",q:"光学センサで受信する電磁波は、マイクロ波センサで受信する電磁波より波長が短く、より雲を透過しづらい。",c:["正しい","誤り"],a:1,exp:"正しい。波長が短い可視・赤外は雲を透過しにくい（マイクロ波は雲を透過）。"},
{y:"R6",no:19,field:"三次元点群データ",type:"5択(誤り)",q:"地形測量・写真測量のうち三次元点群測量について、明らかに間違っているものはどれか。",c:["地上レーザ測量は、地上レーザスキャナで計測したデータから三次元点群データを作成する。","UAV写真点群測量は、UAVで撮影した数値写真から三次元点群データを作成する。","UAVレーザ測量は、位置姿勢データ取得装置とレーザ測距装置で計測し、三次元形状復元計算により三次元点群データを作成する。","車載写真レーザ測量は、車両搭載の各装置で計測し、写真・点群データから三次元点群データを作成する。","航空レーザ測量は、レーザ測距データと最適軌跡解析データの統合解析で三次元点群データを作成する。"],a:3,exp:"誤りは3。UAVレーザ測量はレーザ測距と軌跡解析で点群を作る。「三次元形状復元計算」は写真から作る写真測量の用語で、レーザ測量には使わない。\n⚠️ レーザ測量⇔写真測量の用語の取り違え。"},
{y:"R6",no:20,field:"UAVレーザ測量",type:"5択(誤り)",q:"UAVレーザ測量について、明らかに間違っているものはどれか。",c:["標準的な計測点間隔は、要求点間隔と定数q(1.1〜1.5)を用いて 要求点間隔/q で求める。","スキャン角度は、レーザ光の入射角を45°以上とし、必要な計測距離を満たすよう定める。","計測対象物との距離は、レーザ測距装置の最大測距距離の80%以下となるよう定める。","コース間重複度は、30%以上とすることを標準とする。","UAVの位置決定はGNSSキネマティック法で行い、固定局は計測地域から直線距離で80kmを超えないものとする。"],a:5,exp:"誤りは5。キネマティック解析の固定局は計測地域から近い距離(数km〜十数km程度)に置くもので、「80km」は遠すぎて誤り。\n⚠️ 固定局までの距離の数値に注意（長すぎる値は誤り）。"},
{y:"R6",no:23,field:"GIS",type:"5択(誤り)",q:"GISの機能を使った地理空間情報の利用について、明らかに間違っているものはどれか。",c:["DTMと基盤地図情報の建築物外周線データのみを用いて、津波避難ビルの建物の高さを算出できる。","ジオリファレンス機能で過去の写真地図に座標を与え、現在の地図と重ね合わせて比較できる。","ネットワーク分析で道路中心線データと消防署・火災現場の点データから最短ルートを表示できる。","バッファリングと空間検索で、自宅から半径5km内にある病院を抽出できる。","ボロノイ分割で、各公民館から直線距離が最も短い駅を特定できる。"],a:1,exp:"誤りは1。DTM(地表面)には建物の高さ情報がなく、建物の高さは算出できない。建物高さにはDSMが必要。\n⚠️ DTM(地表)とDSM(建物・樹木含む)の違いが狙われる。"},
{y:"R6",no:24,field:"地理院地図・ウェブ地図",type:"5択(誤り)",q:"地理院地図をはじめとするウェブ地図について、明らかに間違っているものはどれか。",c:["地理院地図は地図画像をタイル状に分割して配信し、各タイルはメルカトル投影で正方形に変換されている（極域一部は除外）。","ウェブ地図では、表示リクエストの度に、その範囲のデータをサーバ側で切り抜いて配信する方式が多く採用されている。","地理院地図は、地球を回転楕円体ではなく長半径を半径とした真球で投影する図法を採用している。","ウェブ地図のタイルには、ラスタ形式とベクタ形式のものがある。","メルカトル投影のウェブ地図では、同一距離を表すスケールバーの画面上の長さは高緯度ほど長くなる。"],a:2,exp:"誤りは2。ウェブ地図はあらかじめタイル状に分割したデータを配信する「タイル方式」が主流。リクエストの度に切り抜く方式が多いというのは誤り。"},
{y:"R6",no:26,field:"用地測量",type:"5択(誤り)",q:"公共測量における用地測量について、明らかに間違っているものはどれか。",c:["境界確認完了時は土地境界確認書を作成し、関係権利者全員に確認の署名等を求める。","境界測量は近傍の4級基準点以上に基づき放射法等で行う（やむを得ない場合は補助基準点も可）。","平地の境界点間測量で、隣接境界点間距離30mの場合、較差の許容範囲は15mmを標準とする。","面積計算は、原則として三斜法により行う。","用地平面図データは地図情報レベル250を標準とし、現地で主要地物を測定し作成する。"],a:4,exp:"誤りは4。面積計算は原則として「座標法」により行う。三斜法ではない。\n⚠️ 座標法⇔三斜法の取り違え。座標があるなら座標法。"},
{y:"R6",no:28,sub:"a",field:"河川測量",type:"○×",q:"距離標設置測量の観測には、トータルステーションを用いる放射法、RTK法、ネットワーク型RTK法などを用いることができる。",c:["正しい","誤り"],a:1,exp:"正しい。放射法・RTK・ネットワーク型RTKなどが使える。"},
{y:"R6",no:28,sub:"b",field:"河川測量",type:"○×",q:"水準基標測量は2級水準測量により行い、水準基標の位置を示すため点の記を作成する。",c:["正しい","誤り"],a:1,exp:"正しい。水準基標測量は2級水準測量、点の記を作成する。"},
{y:"R6",no:28,sub:"c",field:"河川測量",type:"○×",q:"定期縦断測量は山地では3級水準測量により行うが、状況により3級に代えて4級水準測量で行うことができる。",c:["正しい","誤り"],a:2,exp:"誤り。定期縦断測量は平地では3級、山地では原則4級水準測量。等級の関係の記述が誤り。\n⚠️ 平地3級／山地4級を押さえる。"},
{y:"R6",no:28,sub:"d",field:"河川測量",type:"○×",q:"定期横断測量は水際杭を境に、陸部は路線測量の横断測量に準じ、水部は深浅測量に準じて行う。",c:["正しい","誤り"],a:1,exp:"正しい。陸部は横断測量、水部は深浅測量に準じる。"},
{y:"R6",no:28,sub:"e",field:"河川測量",type:"○×",q:"深浅測量における水深の測定は、電波式水位計を用いて行う（水深が浅い場合はロッド又はレッドで直接測定）。",c:["正しい","誤り"],a:2,exp:"誤り。水深の測定は「音響測深機」を用いる（浅い場合はロッド・レッド）。電波式水位計は水位観測用。\n⚠️ 音響測深機⇔電波式水位計の取り違え。水深＝音響測深機。"},
/* ===== 令和5年 午前 ===== */
{y:"R5",no:1,sub:"a",field:"測量法",type:"○×",q:"公共測量とは、費用の全部又は一部を国又は公共団体の負担を受けて行う測量をいい、国又は公共団体からの補助を受けて行う測量を含まない。",c:["正しい","誤り"],a:2,exp:"誤り。公共測量は費用を「負担し、又は補助して」行う測量を含む。\n⚠️「補助は含まない」はひっかけ。負担も補助も含む。"},
{y:"R5",no:1,sub:"b",field:"測量法",type:"○×",q:"測量計画機関は、公共測量で永久標識又は一時標識を設置したとき、関係市町村長に通知するとともにインターネット等で公表しなければならない。",c:["正しい","誤り"],a:2,exp:"誤り。標識設置時は関係市町村長への「通知」は必要だが、インターネット公表が義務づけられているわけではない。"},
{y:"R5",no:1,sub:"c",field:"測量法",type:"○×",q:"山林原野等で基本測量を実施する者は、所有者等の承諾を得ることが困難でかつ現状を著しく損傷しないときは、承諾を得ずに植物等を伐除でき、遅滞なくその旨を通知する。",c:["正しい","誤り"],a:1,exp:"正しい。要件を満たせば承諾なしで伐除でき、事後に通知する。"},
{y:"R5",no:1,sub:"d",field:"測量法",type:"○×",q:"基本測量の測量成果・測量記録の謄本又は抄本の交付を受けようとする者は、国土地理院の長に申請しなければならない。",c:["正しい","誤り"],a:1,exp:"正しい。交付申請先は国土地理院の長。"},
{y:"R5",no:1,sub:"e",field:"測量法",type:"○×",q:"「基本測量及び公共測量以外の測量」とは、基本測量及び公共測量以外の測量成果を使用して実施する測量をいう。",c:["正しい","誤り"],a:2,exp:"誤り。定義は「基本測量又は公共測量の測量成果を使用して実施する測量」。文の言い回しが誤り。"},
{y:"R5",no:2,sub:"a",field:"ITRF・座標系",type:"○×",q:"ITRFにおける地球上の位置は、三次元直交座標(X,Y,Z)で表される。",c:["正しい","誤り"],a:1,exp:"正しい。ITRFは地心三次元直交座標。"},
{y:"R5",no:2,sub:"b",field:"ITRF・座標系",type:"○×",q:"日本の測地成果は、ITRFが更新されると連動して更新される。",c:["正しい","誤り"],a:2,exp:"誤り。ITRF更新で測地成果が自動連動はしない（必要に応じ改定）。"},
{y:"R5",no:2,sub:"c",field:"ITRF・座標系",type:"○×",q:"ITRFのX軸は、回転楕円体の中心から経度0°の子午線と赤道の交点に向かう方向を正とする。",c:["正しい","誤り"],a:1,exp:"正しい。X軸は経度0°(グリニッジ)方向が正。"},
{y:"R5",no:2,sub:"d",field:"ITRF・座標系",type:"○×",q:"ITRFのY軸は、回転楕円体の中心から東経90°の子午線と赤道の交点に向かう方向を正とする。",c:["正しい","誤り"],a:1,exp:"正しい。Y軸は東経90°方向が正。"},
{y:"R5",no:2,sub:"e",field:"ITRF・座標系",type:"○×",q:"日本列島の位置をITRFで表すと値域は X<0, Y>0, Z>0 であり、札幌市役所から那覇市役所へ向かうベクトルの符号は(負,正,負)となる。",c:["正しい","誤り"],a:2,exp:"誤り。札幌→那覇は南西方向で、各成分の符号の組合せが記述と一致しない。\n⚠️ 方向ベクトルの符号は緯度・経度差から丁寧に確認する。"},
{y:"R5",no:3,field:"JPGIS",type:"5択(誤り)",q:"地理情報標準プロファイル(JPGIS)について、明らかに間違っているものはどれか。",c:["JPGISは、ISO規格及び日本産業規格から必要な基本要素を抽出し体系化したものである。","JPGISに準拠する応用スキーマで定義された地理空間データは、統一モデル化言語(UML)を用いて符号化される。","JPGIS準拠のデータが全て同じXML形式で作成されているわけではない。","製品仕様書には、得ようとする測量成果の種類・内容・構造・品質等を示さなければならない。","製品仕様書のデータ品質要素の検査は、書式一貫性、次に概念一貫性の順で行う。"],a:2,exp:"誤りは2。UMLは応用スキーマを「記述」する言語で、データの「符号化」はXML/GML等で行う。\n⚠️ UML(モデル記述)と符号化(XML/GML)の役割の取り違え。"},
{y:"R5",no:6,sub:"a",field:"測量の基準",type:"○×",q:"位置は、地心緯度、経度及び平均海面からの高さで表示する。",c:["正しい","誤り"],a:2,exp:"誤り。位置は「地理学的経緯度」及び平均海面からの高さで表示する。地心緯度ではない。"},
{y:"R5",no:6,sub:"b",field:"測量の基準",type:"○×",q:"公共測量における距離及び面積は、ジオイドの表面上における値で表示する。",c:["正しい","誤り"],a:2,exp:"誤り。距離・面積は「回転楕円体の表面上」の値で表示する。\n⚠️ 楕円体面⇔ジオイド面の取り違え。"},
{y:"R5",no:6,sub:"c",field:"測量の基準",type:"○×",q:"ジオイドとは、平均海面を陸地内部まで延長した面であり、水平位置を求める測量の基準面である。",c:["正しい","誤り"],a:2,exp:"誤り。ジオイドは「標高(高さ)」の基準面であって、水平位置の基準面ではない。"},
{y:"R5",no:6,sub:"d",field:"測量の基準",type:"○×",q:"平面直角座標系は、座標系のY軸を原点で子午線に一致する軸とし、X軸をY軸に直交する軸とする。",c:["正しい","誤り"],a:2,exp:"誤り。X軸が原点で子午線に一致し（北が正）、Y軸がそれに直交する（東が正）。X・Yが逆。\n💡 X=北(子午線)、Y=東。"},
{y:"R5",no:7,field:"基準点測量",type:"5択(誤り)",q:"トータルステーション(TS)による距離の測定について、明らかに間違っているものはどれか。",c:["距離測定の誤差は、距離に比例するもの(大気の屈折率の影響等)としないもの(位相差測定誤差等)に分けられる。","距離を測定する際、気温が上がると測定される距離は短くなる。","距離を測定する際、気圧が低くなると測定される距離は短くなる。","前回の機器検定から1年経過したので、国土地理院に登録された比較基線場で検定を行った。","TSとミラー間で往復した光波の反射波と発射波の位相差を測定し、これに往復時間を乗じて距離を求めている。"],a:5,exp:"誤りは5。位相差測定方式は「位相差から距離を求める」もので、往復時間を乗じるのではない（時間を測るのはパルス方式）。\n⚠️ 位相差方式と時間計測方式(パルス)の混同に注意。"},
{y:"R5",no:9,sub:"a",field:"GNSS測量",type:"○×",q:"アンテナ位相特性が異なるアンテナ同士のGNSS測量では、PCV補正を適用することで異機種間観測の精度を確保できる。",c:["正しい","誤り"],a:1,exp:"正しい。PCV補正で異機種間の精度を確保する。"},
{y:"R5",no:9,sub:"b",field:"GNSS測量",type:"○×",q:"GNSS衛星及び受信機の時計誤差は、二重位相差による解析処理で同時に消去できる。",c:["正しい","誤り"],a:1,exp:"正しい。二重位相差で時計誤差を消去できる。"},
{y:"R5",no:9,sub:"c",field:"GNSS測量",type:"○×",q:"スタティック法10km以上でGPS・準天頂・GLONASSを用いる場合、これらの衛星を5衛星以上使用する。",c:["正しい","誤り"],a:2,exp:"誤り。GLONASSを併用する場合はGPS・準天頂で所定数に加え、GLONASSも2衛星以上使う等の条件があり、“合計5衛星”では不足。"},
{y:"R5",no:9,sub:"d",field:"GNSS測量",type:"○×",q:"スタティック法は複数点に測量機を整置し、同時受信して整数値バイアスを決定し、基線ベクトルを求める。",c:["正しい","誤り"],a:1,exp:"正しい。スタティック法の説明として妥当。"},
{y:"R5",no:9,sub:"e",field:"GNSS測量",type:"○×",q:"キネマティック法は、固定局と移動局で同時に単独測位を行い、それぞれの座標値の差から基線ベクトルを求める観測方法である。",c:["正しい","誤り"],a:2,exp:"誤り。キネマティック法は搬送波位相を使う「相対測位」。単独測位の座標差ではない。\n⚠️ 単独測位⇔相対測位の取り違え。"},
{y:"R5",no:10,field:"GNSS標高計算",type:"計算",q:"GNSS基準点測量で、既知点A〜新点Bの基準面上の距離10,000.00m、新点Bの楕円体高72.50mを得た。新点Bの標高と、A→B方向のジオイド面の1,000mあたりの傾斜量の組合せはどれか。\n・既知点Aの標高34.00m、楕円体高68.50m\n・新点Bのジオイド高34.60m",c:["標高34.50m / 傾斜−0.01m","標高37.90m / 傾斜−0.01m","標高37.90m / 傾斜＋0.01m","標高37.90m / 傾斜＋0.03m","標高38.50m / 傾斜＋0.08m"],a:3,exp:"A点のジオイド高 N_A=68.50−34.00=34.50m、B点は34.60m。\n標高H_B=楕円体高−ジオイド高=72.50−34.60=37.90m。\n傾斜量=(34.60−34.50)/10=＋0.01m/1,000m。→ 標高37.90m・傾斜＋0.01m。",fig:"gnss-height"},
{y:"R5",no:15,field:"GNSS現地測量",type:"5択(誤り)",q:"GNSS測量機を用いた現地測量について、明らかに間違っているものはどれか。",c:["使用する機器は2級GNSS測量機と同等以上とする。","RTK法等で初期化を行う観測点のセット間較差の許容範囲は、南北・東西・高さのいずれも20mmである。","作成する数値地形図データの地図情報レベルは原則1000以下である。","単点観測法で既知点と整合しない場合、水平の整合処理はヘルマート変換等を採用する。","単点観測法で整合しない場合、高さの整合処理は標高を用いることを標準とする。"],a:2,exp:"誤りは2。較差の許容範囲は、水平(南北・東西)が20mm、「高さ成分は30mm」で、いずれも20mmではない。\n⚠️ 高さ成分だけ30mm。水平20mm/高さ30mm。"},
{y:"R5",no:16,sub:"a",field:"地上レーザ測量",type:"○×",q:"計測の方向は、地形の低い方から高い方への向きを原則とする。",c:["正しい","誤り"],a:1,exp:"正しい。死角を減らすため低→高が原則。"},
{y:"R5",no:16,sub:"b",field:"地上レーザ測量",type:"○×",q:"同一箇所から複数回計測する場合、地上レーザスキャナの器械高は変えないようにする。",c:["正しい","誤り"],a:2,exp:"誤り。器械高は「変える」のが原則。\n⚠️ 変える⇔変えないの逆転に注意。"},
{y:"R5",no:16,sub:"c",field:"地上レーザ測量",type:"○×",q:"計測範囲の空中に煙などの浮遊物がある場合、その大きさや密度によっては空中に点群が生成されることがある。",c:["正しい","誤り"],a:1,exp:"正しい。浮遊物にレーザが当たると空中点群が生じ得る。"},
{y:"R5",no:16,sub:"d",field:"地上レーザ測量",type:"○×",q:"標準的な地形・地物等が入射角1.5°以上で計測できる性能を有する地上レーザスキャナを使用する。",c:["正しい","誤り"],a:1,exp:"正しい。入射角1.5°以上で計測できる性能を要する。"},
{y:"R5",no:16,sub:"e",field:"地上レーザ測量",type:"○×",q:"地図情報レベル500の数値地形図データを作成する場合、標定点の精度(標準偏差)は水平位置・標高ともに0.2m以内である。",c:["正しい","誤り"],a:2,exp:"誤り。地図情報レベル500では要求される標定点精度はより高く、0.2m以内では不足（0.1m以内程度）。"},
{y:"R5",no:17,field:"空中写真の重複度(計算)",type:"計算",q:"デジタル航空カメラ鉛直下で、標高150〜350mの土地全体で隣接コースの重複度が最小35%となるよう計画。撮影基準面150mでの隣接コース重複度は最大で何%か。\n・画面距離10cm、素子寸法6μm、画面17,000×11,000画素、画面短辺が撮影基線と平行\n・等高度・コース間隔一定、撮影基準面の地上画素寸法15cm",c:["38%","40%","42%","44%","46%"],a:2,exp:"重複度が最小35%になるのは地表が最も高い350m。そこでのコース間隔を求め、基準面(150m)では地上カバーが広がり重複度は最大に。計算すると約40%。\n⚠️ 最小重複度は“最も高い地表”で発生。基準面(低い側)では大きくなる。",fig:"overlap"},
{y:"R5",no:18,field:"UAV測量",type:"5択(誤り)",q:"UAV写真点群測量について、明らかに間違っているものはどれか。",c:["標定点は外側標定点3点以上・内側標定点1点以上となるよう設置し、検証点を兼ねることができる。","位置精度0.10m以内が必要な場合、数値写真の地上画素寸法が0.02m以内となるよう計画する。","高低差が大きい地域では、撮影基準面を数コース単位で設定できる。","撮影後に重複度確認が困難と予想される場合、同一コース内の隣接写真の重複度が90%以上となるよう計画する。","外側標定点を結ぶ範囲のさらに外側に、少なくとも1枚以上の数値写真を撮影する。"],a:1,exp:"誤りは1。検証点は標定点とは「別に」設置する。標定点を検証点に兼用すると精度評価にならない。\n⚠️ 標定点と検証点の兼用は不可（R7でも既出）。"},
{y:"R5",no:19,field:"航空レーザ測量(計算)",type:"計算",q:"対地高度2,000mで航空レーザ測量を実施。航空機直下の地表面における進行方向の計測間隔は幾らか。\n・パルスレート 毎秒600,000回、スキャンレート 毎秒105往復、スキャン角度±25°\n・対地飛行速度 秒速70m",c:["0.3m","0.5m","0.7m","1.5m","3.0m"],a:1,exp:"進行方向の計測間隔＝対地飛行速度÷(1秒間の走査線数)。1往復＝2走査線→毎秒210走査線。70÷210≒0.33→0.3m。\n💡 進行方向＝速度÷走査線数(往復×2)。"},
{y:"R5",no:22,field:"地理院地図・ウェブ地図",type:"5択(誤り)",q:"ウェブ地図「地理院地図」や地図投影法について、明らかに間違っているものはどれか。",c:["地理院地図では、同一距離を表すスケールバーの画面上の長さは高緯度ほど長くなる。","地理院地図では、複数の種類の地図や空中写真などから選択して表示できる。","平面の地図で正距の性質と正積の性質を同時に満足させることは、理論上可能である。","地理院タイルの地図投影法は、1/25,000地形図と同様にUTM図法を採用している。","地図投影法は必ずひずみが生じるため、目的に応じて投影法を選択する必要がある。"],a:4,exp:"誤りは4。地理院タイル(ウェブ地図)は「ウェブメルカトル図法」を採用。UTMは紙の1/25,000地形図。\n⚠️ ウェブ地図＝ウェブメルカトル、紙の地形図＝UTM、で対に覚える。",fig:"projection"},
{y:"R5",no:23,field:"DTMの活用",type:"5択(誤り)",q:"数値地形モデル(DTM)の活用について、明らかに間違っているものはどれか。",c:["DTMと基盤地図情報の建築物の外周線を用いて、建築物の地表面からの高さを求めることができる。","格子間隔5mのDTMを用いて、地図情報レベル5000の等高線(主曲線間隔5m)を作成できる。","DTMを用いて、標高区分ごとに彩色し陰影をつけた陰影段彩図を作成できる。","格子間隔の小さいDTMを用いた方が、より詳細な地形の断面図を作成できる。","DTMを用いて、中心投影の数値空中写真から正射投影画像(オルソ画像)を作成できる。"],a:1,exp:"誤りは1。DTM(地表面)には建物の高さ情報がないため、建物の高さは求められない。建物高さにはDSMが必要。\n⚠️ DTM(地表)とDSM(建物・樹木含む)の違いが狙われる。"},
{y:"R5",no:24,sub:"a",field:"基盤地図情報",type:"○×",q:"基盤地図情報として、国土地理院から5mメッシュ及び10mメッシュの数値標高モデルのデータが提供されている。",c:["正しい","誤り"],a:1,exp:"正しい。5m・10mメッシュのDEMが提供されている。"},
{y:"R5",no:24,sub:"b",field:"基盤地図情報",type:"○×",q:"基盤地図情報に係る項目は、国土交通省令で、測量の基準点・海岸線・軌道の中心線・道路中心線・建築物の外周線などの18項目が定められている。",c:["正しい","誤り"],a:2,exp:"誤り。基盤地図情報の項目は「13項目」。18項目ではない。\n⚠️ 13項目⇔18項目の数値ひっかけ。"},
{y:"R5",no:24,sub:"c",field:"基盤地図情報",type:"○×",q:"基盤地図情報の精度は都市計画区域内と区域外で異なり、都市計画区域内における高さの誤差は5.0m以内とされている。",c:["正しい","誤り"],a:2,exp:"誤り。区域内の高さ誤差は1.0m以内(区域外が5.0m以内)。区域内の値が誤り。"},
{y:"R5",no:24,sub:"d",field:"基盤地図情報",type:"○×",q:"新たに基盤地図情報を作成する場合、新たな測量作業のほか、既存の測量成果の編集による方法も認められている。",c:["正しい","誤り"],a:1,exp:"正しい。新規測量・既存成果の編集いずれも可。"},
{y:"R5",no:24,sub:"e",field:"基盤地図情報",type:"○×",q:"基盤地図情報を提供する場合に適合すべき規格には、国際標準化機構(ISO)が定めた規格が含まれる。",c:["正しい","誤り"],a:1,exp:"正しい。ISO規格を含む。"},
/* ===== 令和4年 追加分 ===== */
{y:"R4",no:3,field:"JPGIS",type:"5択(語句)",q:"地理情報標準プロファイル(JPGIS)について、ア〜オに入る組合せはどれか。\nJPGISは、ISO規格及びJIS規格の中から、地理空間情報の概念（ア）を記述し符号化するために必要な基本的な（イ）を抽出し（ウ）したもので、地球上の位置に関連付けられた（エ）又は現象に関する実用標準である。測量計画機関は、得ようとする測量成果の種類・内容・構造・品質等を示す（オ）をJPGISに準拠して定めなければならない。",c:["ア:オブジェクト イ:要素 ウ:記号化 エ:プロファイル オ:製品仕様書","ア:オブジェクト イ:内容 ウ:記号化 エ:プロファイル オ:作業規程の準則","ア:スキーマ イ:内容 ウ:体系化 エ:オブジェクト オ:作業規程の準則","ア:スキーマ イ:要素 ウ:体系化 エ:オブジェクト オ:製品仕様書","ア:スキーマ イ:要素 ウ:記号化 エ:プロファイル オ:製品仕様書"],a:4,exp:"正しい組合せは4（ア:スキーマ／イ:要素／ウ:体系化／エ:オブジェクト／オ:製品仕様書）。\n💡 JPGIS＝規格から基本要素を抽出し“体系化”。測量成果の仕様は“製品仕様書”をJPGIS準拠で定める。"},
{y:"R4",no:12,field:"水準測量",type:"5択(語句)",q:"1級水準測量の観測について、ア〜エに入る組合せはどれか。\nア：レベルと標尺の距離は最大（ア）を標準\nイ：標尺目盛の読定単位は（イ）を標準\nウ：三脚の沈下による誤差を小さくするため（ウ）の順に読み取る\nエ：光路の屈折による誤差を小さくするため、傾斜地では標尺（エ）での視準を避ける",c:["ア:50m イ:0.1mm ウ:後視→後視→前視→前視 エ:下方","ア:60m イ:0.1mm ウ:後視→後視→前視→前視 エ:上方","ア:60m イ:1mm ウ:後視→後視→前視→前視 エ:下方","ア:50m イ:0.1mm ウ:後視→前視→前視→後視 エ:下方","ア:50m イ:1mm ウ:後視→前視→前視→後視 エ:上方"],a:4,exp:"正しい組合せは4（ア:50m／イ:0.1mm／ウ:後視→前視→前視→後視／エ:下方）。\n💡 読定順「後→前→前→後」は三脚沈下(時間経過)対策。1級は読定0.1mm、地面付近の“下方”は屈折で避ける。"},
{y:"R4",no:17,field:"UAV測量",type:"5択(語句)",q:"UAV写真測量について、ア〜ウに入る組合せはどれか。\nア：撮影時の対地高度は、地上画素寸法・画素サイズと（ア）から求める式以下とする\nイ：複数コースの場合、水平位置の標定点はブロックの（イ）に必ず配置する\nウ：タイポイントは1モデルごとに等間隔かつ（ウ）に配置する",c:["ア:焦点距離 イ:中央 ウ:直線状","ア:焦点距離 イ:四隅 ウ:直線状にならないようジグザグ","ア:撮影縮尺 イ:四隅 ウ:直線状","ア:撮影縮尺 イ:中央 ウ:直線状にならないようジグザグ","ア:基線長 イ:中央 ウ:直線状"],a:2,exp:"正しい組合せは2（ア:焦点距離／イ:四隅／ウ:ジグザグ）。\n💡 対地高度は焦点距離から算出。標定点はブロックの“四隅”に必置。タイポイントは直線状を避けジグザグ。"},
{y:"R4",no:23,field:"DTMの活用",type:"5択(語句)",q:"DTMの活用について、ア〜エに入る組合せはどれか。\n地図情報レベル2500の等高線(計曲線間隔10m)は格子間隔（ア）mのDTMで作成できる。格子間隔の（イ）DTMほど詳細な断面図が作れる。標高値の範囲ごとに彩色した（ウ）は、同色で示す標高の幅を山地に比べ平地で（エ）することで平地の微細な起伏を表せる。",c:["ア:2 イ:広い ウ:段彩図 エ:広く","ア:2 イ:狭い ウ:段彩図 エ:狭く","ア:5 イ:広い ウ:陰影図 エ:狭く","ア:5 イ:狭い ウ:陰影図 エ:広く","ア:5 イ:狭い ウ:段彩図 エ:狭く"],a:2,exp:"正しい組合せは2（ア:2／イ:狭い／ウ:段彩図／エ:狭く）。\n💡 格子間隔は“狭い”ほど詳細。色分けの標高幅を“狭く”すると微細な起伏を表現できる。"},
/* ===== 図解付き問題（R4図表） ===== */
{y:"R4",no:8,field:"偏心観測(計算)",type:"計算",q:"基準点A・B間に障害物があり、偏心点A1・B1で観測した（図・表8）。基準点A・B間の基準面上の距離Sはいくらか。（a=偏心角、e=偏心距離、S1=偏心点間距離）",qsvg:"<svg viewBox=\"0 0 360 170\" xmlns=\"http://www.w3.org/2000/svg\">\n<defs><marker id=\"a8\" markerWidth=\"7\" markerHeight=\"7\" refX=\"3.5\" refY=\"3.5\" orient=\"auto\"><path d=\"M0,0L7,3.5L0,7z\" fill=\"#8ec5ff\"/></marker></defs>\n<circle cx=\"45\" cy=\"130\" r=\"4\" fill=\"#7dd3a0\"/><text x=\"30\" y=\"150\" fill=\"#7dd3a0\" font-size=\"11\">基準点A</text>\n<circle cx=\"315\" cy=\"45\" r=\"4\" fill=\"#7dd3a0\"/><text x=\"292\" y=\"35\" fill=\"#7dd3a0\" font-size=\"11\">基準点B</text>\n<circle cx=\"80\" cy=\"105\" r=\"3.5\" fill=\"#ffb86b\"/><text x=\"60\" y=\"100\" fill=\"#ffb86b\" font-size=\"10\">偏心点A1</text>\n<circle cx=\"280\" cy=\"70\" r=\"3.5\" fill=\"#ffb86b\"/><text x=\"258\" y=\"90\" fill=\"#ffb86b\" font-size=\"10\">偏心点B1</text>\n<line x1=\"80\" y1=\"105\" x2=\"280\" y2=\"70\" stroke=\"#8ec5ff\" stroke-width=\"2\"/><text x=\"165\" y=\"80\" fill=\"#8ec5ff\" font-size=\"11\">S1=1000.000m</text>\n<line x1=\"45\" y1=\"130\" x2=\"80\" y2=\"105\" stroke=\"#ffb86b\" stroke-dasharray=\"3 3\"/><text x=\"30\" y=\"118\" fill=\"#ffb86b\" font-size=\"10\">e1</text>\n<line x1=\"315\" y1=\"45\" x2=\"280\" y2=\"70\" stroke=\"#ffb86b\" stroke-dasharray=\"3 3\"/><text x=\"318\" y=\"58\" fill=\"#ffb86b\" font-size=\"10\">e2</text>\n<line x1=\"45\" y1=\"130\" x2=\"315\" y2=\"45\" stroke=\"#6b7a94\" stroke-dasharray=\"5 4\"/><text x=\"150\" y=\"130\" fill=\"#9fb0c8\" font-size=\"11\">求める距離 S</text>\n</svg>\n<div class=\"tbl\">表8：S1=1000.000m ／ e1=20.000m, a1=300°00'00\" ／ e2=50.000m, a2=315°00'00\"</div>",c:["953.190m","954.617m","954.644m","955.450m","956.097m"],a:5,exp:"偏心補正の問題。偏心点間の距離S1に、両端の偏心量(e,偏心角a)の影響を余弦定理で補正して基準点間距離Sを求める。\n各偏心点での補正三角形に余弦定理を適用して順に距離を求めると S≒956.097m。\n💡 手順：①A1側の偏心を補正 →②B1側の偏心を補正。偏心角は基準方向からの角度で、余弦定理 S²=S1²+e²−2·S1·e·cos(a) を用いる。"},
{y:"R4",no:13,field:"水準環閉合差(計算)",type:"計算",q:"水準点A〜Dで路線⑴〜⑹の水準測量を行った（図・表13）。環閉合差を点検し、再測すべき路線として最も適当なものはどれか。",qsvg:"<svg viewBox=\"0 0 360 175\" xmlns=\"http://www.w3.org/2000/svg\">\n<line x1=\"70\" y1=\"35\" x2=\"70\" y2=\"140\" stroke=\"#8ec5ff\" stroke-width=\"2\"/><text x=\"150\" y=\"30\" fill=\"#9fb0c8\" font-size=\"10\">⑴ A→B</text>\n<line x1=\"70\" y1=\"140\" x2=\"285\" y2=\"140\" stroke=\"#8ec5ff\" stroke-width=\"2\"/><text x=\"150\" y=\"158\" fill=\"#9fb0c8\" font-size=\"10\">⑵ B→C</text>\n<line x1=\"285\" y1=\"140\" x2=\"70\" y2=\"35\" stroke=\"#8ec5ff\" stroke-width=\"2\"/><text x=\"205\" y=\"80\" fill=\"#9fb0c8\" font-size=\"10\">⑶ C→A</text>\n<line x1=\"70\" y1=\"35\" x2=\"180\" y2=\"90\" stroke=\"#ffb86b\" stroke-width=\"2\"/><text x=\"95\" y=\"55\" fill=\"#ffb86b\" font-size=\"10\">⑷ A→D</text>\n<line x1=\"180\" y1=\"90\" x2=\"285\" y2=\"140\" stroke=\"#ffb86b\" stroke-width=\"2\"/><text x=\"228\" y=\"112\" fill=\"#ffb86b\" font-size=\"10\">⑸ D→C</text>\n<line x1=\"180\" y1=\"90\" x2=\"70\" y2=\"140\" stroke=\"#ff9b9b\" stroke-width=\"2.5\"/><text x=\"95\" y=\"122\" fill=\"#ff9b9b\" font-size=\"10\">⑹ D→B</text>\n<circle cx=\"70\" cy=\"35\" r=\"4\" fill=\"#7dd3a0\"/><text x=\"55\" y=\"30\" fill=\"#7dd3a0\" font-size=\"11\">A</text>\n<circle cx=\"70\" cy=\"140\" r=\"4\" fill=\"#7dd3a0\"/><text x=\"52\" y=\"145\" fill=\"#7dd3a0\" font-size=\"11\">B</text>\n<circle cx=\"285\" cy=\"140\" r=\"4\" fill=\"#7dd3a0\"/><text x=\"290\" y=\"145\" fill=\"#7dd3a0\" font-size=\"11\">C</text>\n<circle cx=\"180\" cy=\"90\" r=\"4\" fill=\"#7dd3a0\"/><text x=\"185\" y=\"88\" fill=\"#7dd3a0\" font-size=\"11\">D</text>\n</svg>\n<div class=\"tbl\">⑴A→B +14.393m/18km ⑵B→C −38.341m/32km ⑶C→A +23.984m/48km\n⑷A→D +7.185m/9km ⑸D→C −31.158m/12km ⑹D→B +7.270m/16km\n許容範囲=5√ΣS mm</div>",c:["路線⑴","路線⑵","路線⑷","路線⑸","路線⑹"],a:5,exp:"各環の閉合差を計算し、許容範囲 5√(ΣS) mm と比べる。\n・環A-D-B-A：⑷+⑹−⑴=7.185+7.270−14.393=＋0.062m=62mm、ΣS=43km→許容5√43≒33mm → 超過(NG)\n・環D-C-B-D：⑸−⑵−⑹方向…も超過(NG)\n両方のNG環に共通する路線は⑹ → 再測すべきは路線⑹。\n💡 複数の不良環に“共通する路線”が誤差の発生源。"},
{y:"R4",no:16,field:"TS高低差の標準偏差(計算)",type:"計算",q:"TSで放射法により既知点A→求点Bの高低差 Z=D·sin i を求める（図16）。斜距離D=100.000m、高低角i=30°、距離測定精度σD=(5+5×10⁻⁶·D)mm、角度測定精度σi=5″のとき、高低差Zの標準偏差σZは（誤差伝播の法則、ア〜オの計算）。",qsvg:"<svg viewBox=\"0 0 360 150\" xmlns=\"http://www.w3.org/2000/svg\">\n<circle cx=\"55\" cy=\"120\" r=\"4\" fill=\"#7dd3a0\"/><text x=\"40\" y=\"138\" fill=\"#7dd3a0\" font-size=\"11\">既知点A</text>\n<circle cx=\"300\" cy=\"45\" r=\"4\" fill=\"#7dd3a0\"/><text x=\"278\" y=\"35\" fill=\"#7dd3a0\" font-size=\"11\">求点B</text>\n<line x1=\"55\" y1=\"120\" x2=\"300\" y2=\"45\" stroke=\"#8ec5ff\" stroke-width=\"2\"/><text x=\"150\" y=\"75\" fill=\"#8ec5ff\" font-size=\"11\">斜距離 D=100.000m</text>\n<line x1=\"300\" y1=\"45\" x2=\"300\" y2=\"120\" stroke=\"#7dd3a0\" stroke-width=\"2\" stroke-dasharray=\"4 3\"/><text x=\"305\" y=\"90\" fill=\"#7dd3a0\" font-size=\"11\">高低差 Z</text>\n<line x1=\"55\" y1=\"120\" x2=\"300\" y2=\"120\" stroke=\"#6b7a94\"/>\n<path d=\"M95,120 A40,40 0 0,0 88,103\" fill=\"none\" stroke=\"#ffb86b\"/><text x=\"78\" y=\"113\" fill=\"#ffb86b\" font-size=\"11\">i=30°</text>\n</svg>\n<div class=\"tbl\">Z=D·sin i ／ σD=(5+5×10⁻⁶·D)mm ／ σi=5″ ／ 1rad=(2×10⁵)″</div>",c:["σZ=1.86mm","σZ=3.02mm","σZ=3.50mm","σZ=4.95mm","σZ=9.05mm"],a:3,exp:"誤差伝播の法則 σZ²=(∂Z/∂D)²σD² + (∂Z/∂i)²σi²。\n∂Z/∂D=sin i=sin30°=0.5。σD=5+5×10⁻⁶×100000=5.5mm。\n∂Z/∂i=D·cos i=100000×cos30°≒86,603。σi=5″=5/(2×10⁵)=0.000025rad。\nσZ=√((0.5×5.5)²+(86603×0.000025)²)=√(7.56+4.69)=√12.25=3.50mm。\n💡 距離側(0.5×5.5=2.75)と角度側(86603×0.000025≒2.17)を二乗和平方根。"},
{y:"R4",no:27,field:"座標法による面積(計算)",type:"計算",q:"境界点E・F・Gの折れ線で分けた甲・乙の土地（図・表27の座標）。甲乙それぞれの面積を変えずに、点P・Qを設け直線PQで区割りし直すとき、点QのX座標はいくらか。（Pは道路に接する長さが等しい位置 AP=PD）",qsvg:"<svg viewBox=\"0 0 360 165\" xmlns=\"http://www.w3.org/2000/svg\">\n<polygon points=\"55,120 90,35 300,35 300,120\" fill=\"none\" stroke=\"#8ec5ff\" stroke-width=\"1.5\"/>\n<line x1=\"55\" y1=\"120\" x2=\"300\" y2=\"120\" stroke=\"#ffb86b\" stroke-width=\"2\"/><text x=\"150\" y=\"138\" fill=\"#ffb86b\" font-size=\"10\">道路</text>\n<polyline points=\"200,35 175,75 130,105\" fill=\"none\" stroke=\"#ff9b9b\" stroke-width=\"2\"/><text x=\"205\" y=\"60\" fill=\"#ff9b9b\" font-size=\"10\">境界線 E-F-G</text>\n<circle cx=\"55\" cy=\"120\" r=\"3\" fill=\"#7dd3a0\"/><text x=\"42\" y=\"133\" fill=\"#7dd3a0\" font-size=\"10\">A</text>\n<circle cx=\"90\" cy=\"35\" r=\"3\" fill=\"#7dd3a0\"/><text x=\"80\" y=\"30\" fill=\"#7dd3a0\" font-size=\"10\">B</text>\n<circle cx=\"300\" cy=\"35\" r=\"3\" fill=\"#7dd3a0\"/><text x=\"303\" y=\"35\" fill=\"#7dd3a0\" font-size=\"10\">C</text>\n<circle cx=\"300\" cy=\"120\" r=\"3\" fill=\"#7dd3a0\"/><text x=\"303\" y=\"123\" fill=\"#7dd3a0\" font-size=\"10\">D</text>\n<text x=\"120\" y=\"95\" fill=\"#9fb0c8\" font-size=\"11\">甲</text><text x=\"240\" y=\"95\" fill=\"#9fb0c8\" font-size=\"11\">乙</text>\n<circle cx=\"177\" cy=\"120\" r=\"3\" fill=\"#c9b5ff\"/><text x=\"170\" y=\"133\" fill=\"#c9b5ff\" font-size=\"10\">P</text>\n<circle cx=\"200\" cy=\"35\" r=\"3\" fill=\"#c9b5ff\"/><text x=\"203\" y=\"30\" fill=\"#c9b5ff\" font-size=\"10\">Q</text>\n</svg>\n<div class=\"tbl\">A(13060,11970) B(13090,11980) C(13100,12020) D(13060,12020)\nE(13095,12000) F(13080,12005) G(13060,11990) ／ P:AP=PD</div>",c:["+13,094.82m","+13,095.25m","+13,095.68m","+13,096.11m","+13,096.54m"],a:4,exp:"手順：①座標法（各点の座標から）で甲・乙の面積を求める。②Pは道路辺ADの中点(AP=PD)に置く。③直線PQで区切った後の甲(または乙)の面積が元と等しくなるよう、Qの位置(X座標)を逆算する。\n計算すると Q のX座標≒+13,096.11m。\n💡 座標法の面積＝Σ{Xi(Yi+1−Yi−1)}/2。面積を保存する条件からQを決める。"},
/* ===== 図解付き類題 ===== */
{y:"類題",no:101,field:"GNSS標高計算",type:"計算(図解)",q:"新点A〜Eが一直線上に並ぶ（図）。新点Aの標高は50.00m。ジオイドは楕円体面に対しA→E方向へ1,000mあたり+0.05m傾斜する。各点の楕円体高が表のとき、標高が最も高い点はどれか。",qsvg:"<svg viewBox=\"0 0 360 120\" xmlns=\"http://www.w3.org/2000/svg\">\n<line x1=\"30\" y1=\"70\" x2=\"330\" y2=\"70\" stroke=\"#6b7a94\" stroke-width=\"2\"/>\n<text x=\"120\" y=\"100\" fill=\"#8ec5ff\" font-size=\"11\">A→E方向：ジオイド +0.05m/1000m</text>\n<g fill=\"#7dd3a0\" font-size=\"12\" font-weight=\"700\">\n<circle cx=\"40\" cy=\"70\" r=\"4\"/><text x=\"35\" y=\"58\">A</text>\n<circle cx=\"110\" cy=\"70\" r=\"4\"/><text x=\"105\" y=\"58\">B</text>\n<circle cx=\"180\" cy=\"70\" r=\"4\"/><text x=\"175\" y=\"58\">C</text>\n<circle cx=\"250\" cy=\"70\" r=\"4\"/><text x=\"245\" y=\"58\">D</text>\n<circle cx=\"320\" cy=\"70\" r=\"4\"/><text x=\"315\" y=\"58\">E</text></g>\n</svg>\n<div class=\"tbl\">A:距離0m 楕円体高90.00m(標高50.00m) ／ B:1000m 92.00m ／ C:2000m 93.00m\nD:3000m 93.50m ／ E:4000m 93.20m　※距離は楕円体面上</div>",c:["新点A","新点B","新点C","新点D","新点E"],a:4,exp:"標高H=楕円体高h−ジオイド高N。A点のN=90.00−50.00=40.00m。N(距離d)=40.00+0.05×(d/1000)。\nH_B=92.00−40.05=51.95、H_C=93.00−40.10=52.90、H_D=93.50−40.15=53.35、H_E=93.20−40.20=53.00。\n最も高いのは新点D(53.35m)。\n💡 楕円体高が最大の点＝標高最大とは限らない。ジオイド高を引いて比較する。\n（図解類題：R7型）"},
{y:"類題",no:102,field:"デジタル航空カメラ(計算)",type:"計算(図解)",q:"鉛直下向きの数値写真で、主点から離れた高塔が「倒れ込み(像のずれ)」で写っている（図）。主点から高塔先端の像までの距離r=100mm、先端と根元の像のずれΔr=6mm、対地高度H=2,500mのとき、高塔の高さはいくらか。",qsvg:"<svg viewBox=\"0 0 360 150\" xmlns=\"http://www.w3.org/2000/svg\">\n<rect x=\"30\" y=\"15\" width=\"300\" height=\"120\" fill=\"none\" stroke=\"#6b7a94\"/>\n<text x=\"150\" y=\"12\" fill=\"#9fb0c8\" font-size=\"10\">数値写真（鉛直）</text>\n<circle cx=\"180\" cy=\"75\" r=\"3\" fill=\"#8ec5ff\"/><text x=\"185\" y=\"72\" fill=\"#8ec5ff\" font-size=\"10\">主点(鉛直点)</text>\n<circle cx=\"80\" cy=\"75\" r=\"3\" fill=\"#ffb86b\"/><text x=\"60\" y=\"90\" fill=\"#ffb86b\" font-size=\"10\">高塔の根元</text>\n<circle cx=\"80\" cy=\"45\" r=\"3\" fill=\"#ff9b9b\"/><text x=\"60\" y=\"40\" fill=\"#ff9b9b\" font-size=\"10\">高塔の先端</text>\n<line x1=\"180\" y1=\"75\" x2=\"80\" y2=\"75\" stroke=\"#8ec5ff\" stroke-dasharray=\"3 3\"/><text x=\"105\" y=\"70\" fill=\"#8ec5ff\" font-size=\"10\">r=100mm</text>\n<line x1=\"80\" y1=\"75\" x2=\"80\" y2=\"45\" stroke=\"#ff9b9b\" stroke-width=\"2\"/><text x=\"20\" y=\"60\" fill=\"#ff9b9b\" font-size=\"10\">Δr=6mm</text>\n</svg>\n<div class=\"tbl\">対地高度(撮影高度) H=2,500m ／ 主点〜高塔先端の像 r=100mm ／ 像のずれ(倒れ込み) Δr=6mm</div>",c:["100m","120m","150m","180m","200m"],a:3,exp:"倒れ込み量 Δr は Δr = r·h/H の関係。よって高塔の高さ h = Δr·H/r。\nh = 6 × 2,500 ÷ 100 = 150m。\n💡 主点から遠い(rが大きい)ほど、また高い(hが大きい)ほど倒れ込みΔrは大きくなる。h=Δr·H/r。\n（図解類題：R6型）"},
{y:"類題",no:103,field:"TS点の水平位置の標準偏差(計算)",type:"計算(図解)",q:"基準点Aから放射法でTS点Cを観測した（図）。水平距離D=150.000m、距離測定の標準偏差σD=5mm、方向の標準偏差σθ=10″のとき、TS点Cの水平位置の標準偏差はいくらか。（距離測定と角度測定は独立）",qsvg:"<svg viewBox=\"0 0 360 130\" xmlns=\"http://www.w3.org/2000/svg\">\n<circle cx=\"50\" cy=\"95\" r=\"4\" fill=\"#7dd3a0\"/><text x=\"35\" y=\"113\" fill=\"#7dd3a0\" font-size=\"11\">基準点A</text>\n<circle cx=\"300\" cy=\"45\" r=\"4\" fill=\"#7dd3a0\"/><text x=\"275\" y=\"38\" fill=\"#7dd3a0\" font-size=\"11\">TS点C</text>\n<line x1=\"50\" y1=\"95\" x2=\"300\" y2=\"45\" stroke=\"#8ec5ff\" stroke-width=\"2\"/><text x=\"140\" y=\"60\" fill=\"#8ec5ff\" font-size=\"11\">水平距離 D=150.000m</text>\n<path d=\"M300,45 L285,40 L288,55 Z\" fill=\"#ff9b9b\"/><text x=\"240\" y=\"80\" fill=\"#ff9b9b\" font-size=\"10\">横方向の誤差 D·σθ</text>\n</svg>\n<div class=\"tbl\">σD(距離)=5mm ／ σθ(方向)=10″ ／ 1ラジアン=(2×10⁵)″</div>",c:["5.0mm","7.5mm","9.0mm","12.5mm","15.0mm"],a:3,exp:"水平位置の誤差は「距離方向の誤差σD」と「横方向の誤差 D·σθ」の合成。\n横方向の誤差 = D·σθ = 150,000mm × 10/(2×10⁵) = 150,000×5×10⁻⁵ = 7.5mm。\nσ位置 = √(σD² + (D·σθ)²) = √(5² + 7.5²) = √81.25 ≒ 9.0mm。\n💡 角度の誤差は距離が長いほど横方向に効く(D·σθ)。距離側と直交合成。\n（図解類題：R6型）"},
/* ===== A: 復元した実問題(R5/R6) ===== */
{y:"R6",no:1,sub:"a",field:"測量法",type:"○×",q:"基本測量及び公共測量以外の測量とは、基本測量及び公共測量の測量成果を使用しないで実施する測量である。",c:["正しい","誤り"],a:2,exp:"誤り。定義は成果を「使用して」実施する測量。\n⚠️「使用しないで」は逆で誤り。"},
{y:"R6",no:1,sub:"b",field:"測量法",type:"○×",q:"測量作業機関とは、測量計画機関の指示又は委託を受けて測量作業を実施する者をいう。",c:["正しい","誤り"],a:1,exp:"正しい。作業機関の定義どおり。"},
{y:"R6",no:1,sub:"c",field:"測量法",type:"○×",q:"測量標とは、永久標識、一時標識及び仮設標識をいう。",c:["正しい","誤り"],a:1,exp:"正しい。測量標の定義どおり。"},
{y:"R6",no:1,sub:"d",field:"測量法",type:"○×",q:"測量業者は、その営業所ごとに測量士又は測量士補を一人以上置かなければならない。",c:["正しい","誤り"],a:2,exp:"誤り。営業所ごとに置くのは「測量士」を一人以上。測量士補では要件を満たさない。\n⚠️「又は測量士補」がひっかけ。"},
{y:"R6",no:1,sub:"e",field:"測量法",type:"○×",q:"測量業者は、その業務を誠実に行い、常に測量成果の正確さの確保に努めなければならない。",c:["正しい","誤り"],a:1,exp:"正しい。"},
{y:"R6",no:11,sub:"a",field:"GNSS水準測量",type:"○×",q:"標高を定める測量であるため、GNSS水準測量ではPCV補正を行わない。",c:["正しい","誤り"],a:2,exp:"誤り。GNSS水準測量でもPCV補正は行う。\n⚠️「行わない」は誤り。"},
{y:"R6",no:11,sub:"b",field:"GNSS水準測量",type:"○×",q:"ジオイド・モデルを用いることで、既知点からの距離が6〜40kmの範囲で3級水準点を設置できる。",c:["正しい","誤り"],a:1,exp:"正しい。"},
{y:"R6",no:11,sub:"c",field:"GNSS水準測量",type:"○×",q:"使用できる既知点は、一〜二等水準点、電子基準点(標高:水準測量による)及び1・2級水準点である。",c:["正しい","誤り"],a:1,exp:"正しい。"},
{y:"R6",no:11,sub:"d",field:"GNSS水準測量",type:"○×",q:"GNSS水準測量では、スタティック法又はネットワーク型RTK法により観測を行う。",c:["正しい","誤り"],a:2,exp:"誤り。GNSS水準測量はスタティック法により観測する。ネットワーク型RTK法では行わない。"},
{y:"R6",no:11,sub:"e",field:"GNSS水準測量",type:"○×",q:"寒冷前線や温暖前線が通過しているときは、原則として観測を行わない。",c:["正しい","誤り"],a:1,exp:"正しい。大気遅延の影響を避けるため。"},
{y:"R6",no:12,sub:"a",field:"水準測量",type:"○×",q:"望遠鏡の鉛直軸が傾いて生じる誤差を視準線誤差といい、三脚の特定の1本を常に同一の標尺に向けて整置して観測することで消去できる。",c:["正しい","誤り"],a:2,exp:"誤り。三脚の1本を固定する方法で消去するのは「鉛直軸誤差」。誤差の名称(視準線誤差)が誤り。"},
{y:"R6",no:12,sub:"b",field:"水準測量",type:"○×",q:"標尺の零目盛が正しくないために生じる零点誤差は、レベルの設置回数(測点数)を偶数回にすることで消去できる。",c:["正しい","誤り"],a:1,exp:"正しい。据付回数を偶数にすると零点誤差が相殺される。"},
{y:"R6",no:12,sub:"c",field:"水準測量",type:"○×",q:"標尺の下方を読定しないことで、大気の屈折による誤差の影響を小さくできる。",c:["正しい","誤り"],a:1,exp:"正しい。地面付近の屈折(かげろう)を避ける。"},
{y:"R6",no:12,sub:"d",field:"水準測量",type:"○×",q:"簡易水準測量で標尺付属水準器が無い場合は、標尺を前後にゆっくり動かして読定値が最大となるところを読む。",c:["正しい","誤り"],a:2,exp:"誤り。前後に振って読定値が「最小」となるところ(＝鉛直)を読む。\n⚠️ 最大⇔最小の取り違え。"},
{y:"R6",no:12,sub:"e",field:"水準測量",type:"○×",q:"地球の曲率の影響による誤差は、前視標尺と後視標尺を結ぶ直線上の中央にレベルを整置することで消去できる。",c:["正しい","誤り"],a:1,exp:"正しい。前後視等距離で球差を相殺。"},
{y:"R6",no:15,sub:"a",field:"数値地形図データの修正",type:"○×",q:"地図情報レベル1000の修正で、2年前作成の地図情報レベル2500の基盤地図情報から経年変化箇所の建築物外周線データを取得した。",c:["正しい","誤り"],a:2,exp:"誤り。より精度の低いレベル2500のデータを、レベル1000の修正に用いるのは精度不足で不適。"},
{y:"R6",no:15,sub:"b",field:"数値地形図データの修正",type:"○×",q:"4年前に完成した道路について、車載写真レーザ測量によって修正データを取得した。",c:["正しい","誤り"],a:1,exp:"正しい。"},
{y:"R6",no:15,sub:"c",field:"数値地形図データの修正",type:"○×",q:"2年前撮影の地上画素寸法0.4mの写真地図から、3年前完成の体育館の修正データを取得した。",c:["正しい","誤り"],a:2,exp:"誤り。地上画素寸法0.4mの写真地図では、地図情報レベル1000に必要な精度に不足する。"},
{y:"R6",no:15,sub:"d",field:"数値地形図データの修正",type:"○×",q:"半年前の土砂災害で形状が変化した斜面について、UAVレーザ測量によって修正データを取得した。",c:["正しい","誤り"],a:1,exp:"正しい。"},
{y:"R6",no:15,sub:"e",field:"数値地形図データの修正",type:"○×",q:"1年前に完成した海岸部の埋立地について、UAV写真測量によって修正データを取得した。",c:["正しい","誤り"],a:1,exp:"正しい。"},
{y:"R5",no:11,field:"GNSS水準測量",type:"5択(誤り)",q:"GNSS測量機による水準測量(GNSS水準測量)について、明らかに間違っているものはどれか。",c:["1級・2級GNSS測量機を使用でき、2級を使用できるのは10km未満の基線の場合のみである。","使用できる既知点は、一〜二等水準点、水準測量で標高が取り付けられた電子基準点及び1・2級水準点である。","電子基準点のみを既知点とする場合、セミ・ダイナミック補正を行う必要がある。","前線が接近・通過しているときなどは、原則としてGNSS観測を行わない。","3級水準点を設置する場合、水準点間の観測距離を6km以上40km以下とする。"],a:3,exp:"誤りは3。GNSS水準測量は標高を定める測量で、電子基準点のみを既知点とする場合でも「セミ・ダイナミック補正を行う必要がある」とする記述が誤り（この補正の扱いが規定と異なる）。\n⚠️ 他の4つ(測量機・既知点・気象条件・観測距離)は正しい規定。"},
{y:"R5",no:20,field:"車載写真レーザ測量(MMS)",type:"5択(誤り)",q:"車載写真レーザ測量について、明らかに間違っているものはどれか。",c:["作成する数値地形図データの地図情報レベルは、500及び1000を標準とする。","調整点は、走行区間の路線長や状況に応じて2点以上設置することを原則とする。","着脱式システムについて、キャリブレーションの有効期間は1年を標準とする。","固定局は取得区間との基線距離を原則10km以内とし、やむを得ない場合でも30kmを超えてはならない。","数値図化範囲は道路縁内を原則とするが、システム性能が精度内なら道路縁外も数値図化してよい。"],a:3,exp:"誤りは3。着脱式システムのキャリブレーションの有効期間は「6か月」が標準で、「1年」は誤り。\n⚠️ 有効期間の数値すり替えに注意。"},
{y:"R5",no:26,field:"用地測量",type:"5択(誤り)",q:"公共測量における用地測量について、明らかに間違っているものはどれか。",c:["公図等転写連続図で字界の線形に相違があったが、調整せず公図どおり転写した。","権利者確認調査のため、測量計画機関から貸与された資料を基に権利者調査表を作成した。","復元測量で境界杭の亡失があったため復元位置に仮杭を設置し、事前説明は行ったが立会いは行わなかった。","境界測量で、近傍の4級基準点から節点2点の開放多角測量により補助基準点を設置し、これに基づき放射法で境界点を測定した。","用地境界仮杭設置は、交点計算で求めた座標値に基づき、4級基準点以上から放射法又は視通法で行う。"],a:4,exp:"誤りは4。補助基準点を「開放多角測量」で設置するのは精度が確保できず不適。結合多角等で設置する。\n⚠️ 開放多角(片方が結合しない)は誤差点検ができず基準点設置に使えない。"},
{y:"R5",no:28,field:"河川測量",type:"5択(誤り)",q:"公共測量における河川測量について、明らかに間違っているものはどれか。",c:["距離標の設置間隔は、河口又は幹川への合流点に設けた起点から、河心に沿って200mを標準とする。","単点観測法で位置情報サービス事業者の補正データを使う場合、その地点から距離標までの距離を3km以内とする。","水準基標は水位標に近接した位置に設置し、設置間隔は5kmから20kmまでを標準とする。","定期横断測量は水際杭を境に陸部と水部に分けて実施し、陸部の測量範囲は水際杭から20mを標準とする。","横断面図データの縮尺は、横100分の1〜1,000分の1、縦100分の1〜200分の1を標準とする。"],a:4,exp:"誤りは4。定期横断測量の陸部の測量範囲の規定が誤り（水際杭から一定範囲とする値が実際の標準と異なる）。\n⚠️ 距離標200m・水準基標5〜20km・横断面図の縮尺など他の数値は正しい。"},
/* ===== R4 図必須問題 ===== */
{y:"R4",no:2,field:"地心直交座標系(グラフ)",type:"計算",q:"点A・Bは同じ経度135°上にあり、点Pが子午線に沿って一定速度でA→Bへ移動する（t=0〜100秒、図・表2）。時刻tに対する点Pの地心直交座標(X,Y,Z)の変化として最も適当なものはどれか。",qsvg:"<svg viewBox=\"0 0 360 150\" xmlns=\"http://www.w3.org/2000/svg\">\n<circle cx=\"110\" cy=\"80\" r=\"55\" fill=\"none\" stroke=\"#8ec5ff\" stroke-width=\"1.5\"/>\n<ellipse cx=\"110\" cy=\"80\" rx=\"20\" ry=\"55\" fill=\"none\" stroke=\"#6b7a94\" stroke-dasharray=\"3 3\"/>\n<line x1=\"110\" y1=\"25\" x2=\"110\" y2=\"135\" stroke=\"#6b7a94\"/>\n<circle cx=\"90\" cy=\"115\" r=\"4\" fill=\"#7dd3a0\"/><text x=\"72\" y=\"132\" fill=\"#7dd3a0\" font-size=\"11\">A(緯度0°)</text>\n<circle cx=\"112\" cy=\"30\" r=\"4\" fill=\"#ffb86b\"/><text x=\"120\" y=\"30\" fill=\"#ffb86b\" font-size=\"11\">B(緯度60°)</text>\n<path d=\"M90,115 Q95,70 112,30\" fill=\"none\" stroke=\"#ff9b9b\" stroke-width=\"2\" marker-end=\"url(#a2)\"/>\n<defs><marker id=\"a2\" markerWidth=\"7\" markerHeight=\"7\" refX=\"3.5\" refY=\"3.5\" orient=\"auto\"><path d=\"M0,0L7,3.5L0,7z\" fill=\"#ff9b9b\"/></marker></defs>\n<text x=\"215\" y=\"60\" fill=\"#9fb0c8\" font-size=\"11\">経度は135°で一定</text>\n<text x=\"215\" y=\"80\" fill=\"#9fb0c8\" font-size=\"11\">点Pが子午線に沿って</text>\n<text x=\"215\" y=\"98\" fill=\"#9fb0c8\" font-size=\"11\">A→Bへ一定速度で移動</text>\n</svg>\n<div class=\"tbl\">A:北緯0°,東経135°,楕円体高0m ／ B:北緯60°,東経135°,楕円体高0m ／ t=0〜100秒</div>",c:["X:負のまま −4,500→−2,250へ増加／Y:正で 4,500→2,250へ減少／Z:0→約5,500へ増加","X:+2,500→−2,500／Y:一定2,000／Z:5,500付近で一定","X:−4,000→−3,000／Y:4,000→3,000／Z:6,000→10,000へ増加","X:正で 3,000→4,000／Y:4,000→3,000／Z:0→約5,000へ増加","X:+2,500→−2,500／Y:+2,500→−2,500／Z:5,500付近で一定"],a:1,exp:"地心直交座標は X=R·cosφ·cosλ、Y=R·cosφ·sinλ、Z=R·sinφ（φ=緯度, λ=経度135°, R≒6,370km）。\nλ=135°→cosλ<0(負), sinλ>0(正)。φが0°→60°に増えると cosφ:1→0.5、sinφ:0→0.866。\n・X=R·cosφ·cosλ → 負のまま、|X|が減り −4,500→−2,250へ増加\n・Y=R·cosφ·sinλ → 正のまま 4,500→2,250へ減少\n・Z=R·sinφ → 0→約5,500へ増加\nこの組合せは選択肢1。\n💡 同一経度＝子午線移動。X,Yはcosφ、Zはsinφに比例。経度135°でXが負・Yが正。"},
{y:"R4",no:4,field:"回転行列(選択)",type:"計算",q:"z軸まわりの回転が Rz=[c,−s,0 / s,c,0 / 0,0,1]（c=cosφ, s=sinφ）で表される（図4）。同じ向きの規則で、x軸まわりの回転行列Rxとy軸まわりの回転行列Ryの正しい組合せはどれか。",qsvg:"<svg viewBox=\"0 0 360 130\" xmlns=\"http://www.w3.org/2000/svg\">\n<defs><marker id=\"a4\" markerWidth=\"7\" markerHeight=\"7\" refX=\"3.5\" refY=\"3.5\" orient=\"auto\"><path d=\"M0,0L7,3.5L0,7z\" fill=\"#8ec5ff\"/></marker></defs>\n<line x1=\"120\" y1=\"90\" x2=\"120\" y2=\"25\" stroke=\"#8ec5ff\" stroke-width=\"2\" marker-end=\"url(#a4)\"/><text x=\"125\" y=\"25\" fill=\"#8ec5ff\" font-size=\"11\">z</text>\n<line x1=\"120\" y1=\"90\" x2=\"200\" y2=\"115\" stroke=\"#7dd3a0\" stroke-width=\"2\" marker-end=\"url(#a4)\"/><text x=\"205\" y=\"118\" fill=\"#7dd3a0\" font-size=\"11\">x</text>\n<line x1=\"120\" y1=\"90\" x2=\"230\" y2=\"60\" stroke=\"#ffb86b\" stroke-width=\"2\" marker-end=\"url(#a4)\"/><text x=\"235\" y=\"58\" fill=\"#ffb86b\" font-size=\"11\">y</text>\n<text x=\"250\" y=\"90\" fill=\"#9fb0c8\" font-size=\"10\">z軸回転(既知)：</text>\n<text x=\"250\" y=\"106\" fill=\"#9fb0c8\" font-size=\"10\">Rz=[c,−s,0/s,c,0/0,0,1]</text>\n</svg>\n<div class=\"tbl\">c=cosφ, s=sinφ（各軸の回転角）。z軸回転の行列を参考に、x軸回転Rxとy軸回転Ryの組合せを選ぶ。</div>",c:["Rx=[1,0,0/0,c,s/0,−s,c]　Ry=[c,0,s/0,1,0/−s,0,c]","Rx=[1,0,0/0,c,s/0,−s,c]　Ry=[c,0,−s/0,1,0/s,0,c]","Rx=[1,0,0/0,c,s/0,−s,c]　Ry=[c,0,−s/0,1,0/−s,0,c]","Rx=[1,0,0/0,c,−s/0,s,c]　Ry=[c,0,s/0,1,0/−s,0,c]","Rx=[1,0,0/0,c,−s/0,s,c]　Ry=[c,0,−s/0,1,0/s,0,c]"],a:4,exp:"正しい組合せは4。\nx軸回転 Rx=[1,0,0 / 0,c,−s / 0,s,c]、y軸回転 Ry=[c,0,s / 0,1,0 / −s,0,c]。\n💡 各回転行列は「回転軸の行・列が単位ベクトル(1と0)」、残り2×2が [c,−s / s,c] の形。ただしy軸だけは符号配置が入れ替わり、sが右上(＋)・左下(−)になる。z軸回転Rzの符号規則と揃えて確認する。"},
/* ===== 午後（知識確認） ===== */
{y:"午後",no:1,field:"測量制度(午後)",type:"○×",q:"公共測量の測量成果を使用して測量しようとする者は、あらかじめ、その成果を得た測量計画機関の承認を得なければならない。",c:["正しい","誤り"],a:1,exp:"正しい（測量法44条）。承認を得る相手は成果を得た“測量計画機関”。\n⚠️「測量作業機関」と入れ替えるひっかけに注意。"},
{y:"午後",no:2,field:"測量制度(午後)",type:"○×",q:"測量作業機関が選任する主任技術者は、測量士でなくても、高度な技術と十分な実務経験があればよい。",c:["正しい","誤り"],a:2,exp:"誤り。主任技術者は「測量士」でなければならない。\n⚠️「測量士でなくてもよい」は典型の誤り。"},
{y:"午後",no:3,field:"測量制度(午後)",type:"5択(誤り)",q:"公共測量の実施手続きについて、明らかに間違っているものはどれか。",c:["測量計画機関は、公共測量を実施しようとするときは、あらかじめ計画書を提出し国土地理院の長の技術的助言を求める。","測量計画機関は、得ようとする測量成果の種類・内容・品質等を示す製品仕様書をJPGISに準拠して定める。","測量計画機関は、公共測量の測量成果を得たときは、遅滞なくその写しを国土地理院の長に送付する。","測量成果の使用承認申請があったとき、測量計画機関は正当な理由がある場合を除き承認する。","計画書の内容に技術的な実績があれば、国土地理院の長への計画書提出は省略できる。"],a:5,exp:"誤りは5。公共測量の計画書提出は省略できない（事前に提出し技術的助言を求める）。\n⚠️「省略できる」は誤りのサイン。"},
{y:"午後",no:4,field:"基準点測量(午後)",type:"○×",q:"平均図は、後続の作業を開始する前に、測量計画機関の承認を受けなければならない。",c:["正しい","誤り"],a:1,exp:"正しい。平均図(観測計画)は後続作業前に測量計画機関の承認を受ける。"},
{y:"午後",no:5,field:"基準点測量(午後)",type:"○×",q:"電子基準点のみを既知点として基準点測量を行う場合、地殻変動の影響を補正するため、セミ・ダイナミック補正を行う。",c:["正しい","誤り"],a:1,exp:"正しい。電子基準点のみを既知点とする場合、元期と今期のずれをセミ・ダイナミック補正で補正する。\n💡 電子基準点のみ＝セミ・ダイナミック補正、で覚える。"},
{y:"午後",no:6,field:"基準点測量(午後)",type:"5択(誤り)",q:"トータルステーションを用いた基準点測量の点検計算について、明らかに間違っているものはどれか。",c:["点検計算は、観測終了後に水平位置及び標高の閉合差により行う。","結合多角方式では、既知点間の座標・標高の閉合差を点検する。","点検路線は、なるべく多くの新点を含み、辺数が少なくなるように選定する。","閉合差が許容範囲を超えた場合は、再測などにより原因を確認する。","点検計算に合格した後、厳密網平均計算により新点の成果を求める。"],a:3,exp:"誤りは3。点検路線は「辺数が少なく」なるよう選ぶのは正しいが、“なるべく多くの新点を含み”という条件は不要（短い独立な路線で点検する）。記述の組合せが不適当。\n⚠️ 点検路線は短く・独立に選ぶ。"},
{y:"午後",no:7,field:"地形・写真測量(午後)",type:"○×",q:"UAV写真点群測量では、三次元点群データの位置精度を評価するため、標定点とは別に検証点を設置する。",c:["正しい","誤り"],a:1,exp:"正しい。検証点は標定点と別に設ける（兼用不可）。\n⚠️ 標定点と検証点の兼用は不可。"},
{y:"午後",no:8,field:"地形・写真測量(午後)",type:"○×",q:"航空レーザ測量では、オリジナルデータから建物や植生などの点を除くフィルタリングを行い、地表面のグラウンドデータを作成する。",c:["正しい","誤り"],a:1,exp:"正しい。フィルタリングで地表面(グラウンド)を抽出し、内挿でグリッドデータ(DEM)を作る。"},
{y:"午後",no:9,field:"地形・写真測量(午後)",type:"○×",q:"空中写真測量では、同一コース内の重複度(オーバーラップ)は約60%、隣接コース間の重複度(サイドラップ)は約30%を標準とする。",c:["正しい","誤り"],a:1,exp:"正しい。オーバーラップ60%・サイドラップ30%が標準。\n💡 進行方向60%・コース間30%。"},
{y:"午後",no:10,field:"地図編集・GIS(午後)",type:"○×",q:"縮尺1/5,000の地形図の図葉区画割では、図郭の寸法と平面直角座標系の座標値から、対象範囲を覆う図葉数を求める。",c:["正しい","誤り"],a:1,exp:"正しい。図郭寸法×縮尺で1図葉の地上範囲を出し、対象範囲を割って図葉数を求める。"},
{y:"午後",no:11,field:"地図編集・GIS(午後)",type:"○×",q:"メルカトル図法(正角円筒図法)は、経線・緯線が直交する直線で表され、高緯度ほど面積が拡大して表示される。",c:["正しい","誤り"],a:1,exp:"正しい。メルカトルは正角で、高緯度ほど拡大。\n⚠️ メルカトルの直線は等角航路。最短経路(大圏)は曲線。"},
{y:"午後",no:12,field:"地図編集・GIS(午後)",type:"5択(誤り)",q:"GISの機能について、明らかに間違っているものはどれか。",c:["バッファリングは、指定地点や線から一定距離内の範囲を生成する機能である。","オーバーレイは、複数の地理空間データを重ね合わせて新たな情報を得る機能である。","ネットワーク解析は、道路データ等を用いて最短経路探索などを行う機能である。","ボロノイ分割は、各点に最も近い領域に空間を分割する機能である。","DTM(地表面)と建物外周線データのみから、建物の高さを算出できる。"],a:5,exp:"誤りは5。DTM(地表面)には建物の高さ情報がなく、建物高さは算出できない（DSMが必要）。\n⚠️ DTMとDSMの違いが狙われる。"},
{y:"午後",no:13,field:"応用測量(午後)",type:"○×",q:"クロソイド曲線は、曲線長に比例して曲率が変化する緩和曲線で、直線部と円曲線部の間に挿入される。",c:["正しい","誤り"],a:1,exp:"正しい。クロソイドは曲率が曲線長に比例（緩和曲線）。パラメータA、A²=R·L。"},
{y:"午後",no:14,field:"応用測量(午後)",type:"○×",q:"用地測量における面積計算は、境界測量の成果(座標値)に基づき、原則として座標法により行う。",c:["正しい","誤り"],a:1,exp:"正しい。面積計算は原則“座標法”。\n⚠️ 三斜法と取り違えない。座標があれば座標法。"},
{y:"午後",no:15,field:"応用測量(午後)",type:"○×",q:"河川測量の定期縦断測量は、水準基標を基準とし、水準基標から出発して他の水準基標に結合するように行う。",c:["正しい","誤り"],a:1,exp:"正しい。定期縦断は水準基標間で結合水準測量として行う。"},
{y:"午後",no:16,field:"応用測量(午後)",type:"5択(誤り)",q:"路線測量について、明らかに間違っているものはどれか。",c:["路線測量は、作業計画→線形決定→中心線測量→縦断測量→横断測量→用地測量等の工程で行う。","線形決定では、交点(IP)の位置や交角、曲線要素を決定する。","縦断測量は、中心杭等の高低を測定し縦断面図データを作成する。","クロソイドの単位クロソイドを用いると、任意のパラメータの諸元を相似計算で求められる。","中心線測量では、緩和曲線や円曲線の主要点を設置しないで直線のみで行う。"],a:5,exp:"誤りは5。中心線測量では、直線だけでなく緩和曲線・円曲線の主要点(BC・EC・BP等)や中心杭を設置する。\n⚠️「直線のみ」は誤り。"},
/* ===== 午後（増量分） ===== */
{y:"午後",no:17,field:"測量制度(午後)",type:"○×",q:"測量業を営もうとする者は、国土地理院の長の登録を受けなければならない。",c:["正しい","誤り"],a:2,exp:"誤り。測量業の登録は「国土交通大臣」が行う（測量法55条）。\n⚠️ 登録先の取り違えに注意。測量士の登録は国土地理院の長、測量業の登録は国土交通大臣。"},
{y:"午後",no:18,field:"測量制度(午後)",type:"○×",q:"測量計画機関は、公共測量で永久標識を設置したときは、その所在等を関係市町村長に通知する。",c:["正しい","誤り"],a:1,exp:"正しい。永久標識の設置は関係市町村長へ通知する。"},
{y:"午後",no:19,field:"測量制度(午後)",type:"5択(誤り)",q:"公共測量における測量成果・作業規程について、明らかに間違っているものはどれか。",c:["測量計画機関は、作業規程を定め、あらかじめ国土交通大臣の承認を得なければならない。","作業規程の準則に準拠して作業規程を定めることができる。","測量成果は、当該測量で最終目的として得た結果をいう。","測量記録は、測量成果を得る過程で得た作業記録をいう。","公共測量の測量成果の品質は、製品仕様書に基づいて評価する。"],a:1,exp:"誤りは1。公共測量の作業規程は、あらかじめ「国土地理院の長」の承認を得る（国土交通大臣ではない）。\n⚠️ 承認先：作業規程は国土地理院の長。測量業登録は国土交通大臣。混同注意。"},
{y:"午後",no:20,field:"基準点測量(午後)",type:"○×",q:"セミ・ダイナミック補正は、プレート運動などによる経年的な地殻変動(ひずみ)の影響を補正するものである。",c:["正しい","誤り"],a:1,exp:"正しい。セミ・ダイナミック補正は地殻変動による“ひずみ”を補正し、元期と今期を整合させる。"},
{y:"午後",no:21,field:"基準点測量(午後)",type:"○×",q:"偏心観測を行う場合、偏心距離はできるだけ短くとるのがよい。",c:["正しい","誤り"],a:1,exp:"正しい。偏心距離が大きいほど補正誤差が増えるため、できるだけ短くとる。"},
{y:"午後",no:22,field:"基準点測量(午後)",type:"○×",q:"結合多角方式の点検計算では、既知点間の水平位置及び標高の閉合差が許容範囲内かを確認する。",c:["正しい","誤り"],a:1,exp:"正しい。結合多角では既知点間の閉合差を点検する。"},
{y:"午後",no:23,field:"地形・写真測量(午後)",type:"○×",q:"車載写真レーザ測量(MMS)は、車両の自己位置姿勢データ(GNSS/IMU)とレーザ測距・カメラを用いて道路及び周辺を計測する。",c:["正しい","誤り"],a:1,exp:"正しい。MMSはGNSS/IMUで自車位置姿勢を求め、レーザ・カメラで周辺を計測する。"},
{y:"午後",no:24,field:"地形・写真測量(午後)",type:"○×",q:"航空レーザ測量では、フィルタリングにより地表面の点(グラウンドデータ)と建物・植生等の点を分離する。",c:["正しい","誤り"],a:1,exp:"正しい。フィルタリングでグラウンドデータを抽出し、内挿でグリッドデータ(DEM)を作る。"},
{y:"午後",no:25,field:"地形・写真測量(午後)",type:"計算",q:"デジタル航空カメラ(画面距離10cm、素子寸法6μm)で、撮影基準面の地上画素寸法を0.12mとしたい。必要な対地高度はいくらか。",c:["1,500m","1,800m","2,000m","2,400m","3,000m"],a:3,exp:"地上画素寸法 GSD = 素子寸法 × 対地高度H ÷ 画面距離f。\nH = GSD×f÷素子 = 0.12×0.10÷(6×10⁻⁶) = 0.012÷6×10⁻⁶ = 2,000m。\n💡 GSD=素子×H/f。高く飛ぶほどGSDは大きく(粗く)なる。",fig:"overlap"},

{y:"午後",no:27,field:"地図編集・GIS(午後)",type:"○×",q:"地理院地図(ウェブ地図)は、ウェブメルカトル図法を採用している。",c:["正しい","誤り"],a:1,exp:"正しい。地理院地図(ウェブ)はウェブメルカトル。紙の1/25,000地形図はUTM。\n⚠️ ウェブ地図=ウェブメルカトル、紙の地形図=UTMで対に覚える。",fig:"projection"},

{y:"午後",no:31,field:"応用測量(午後)",type:"○×",q:"縦断測量は路線の中心線上の地盤高を、横断測量は中心線に直交する方向の地盤高を測定する。",c:["正しい","誤り"],a:1,exp:"正しい。縦断＝中心線方向、横断＝直交方向。"},

/* ================= アプリ ================= */
const LS='sokuryo_am_v2';
let state={queue:[],idx:0,correct:0,answered:false,fields:new Set(),wrong:[]};
let store=loadStore();
function loadStore(){try{return JSON.parse(localStorage.getItem(LS))||{wrong:[]}}catch(e){return {wrong:[]}}}
function saveStore(){try{localStorage.setItem(LS,JSON.stringify(store))}catch(e){}}
function qid(q){return q.y+'-'+q.no+(q.sub?('-'+q.sub):'')}
function qlabel(q){return 'No.'+q.no+(q.sub?('-'+q.sub):'')}

const sectionOf=q=>q.y==='午後'?'午後':'午前';
const fieldsOf=sec=>[...new Set(Q.filter(q=>sectionOf(q)===sec).map(q=>q.field))];
let curSection='午前';
function setSection(s){curSection=s;state.fields=new Set(fieldsOf(s));document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.s===s));renderChips();}
function renderChips(){
  const el=document.getElementById('chips');el.innerHTML='';
  const fs=fieldsOf(curSection);
  const all=document.createElement('div');all.className='chip'+(state.fields.size===fs.length?' on':'');
  all.textContent='すべて';all.onclick=()=>{state.fields=state.fields.size===fs.length?new Set():new Set(fs);renderChips();};
  el.appendChild(all);
  fs.forEach(f=>{const c=document.createElement('div');c.className='chip'+(state.fields.has(f)?' on':'');
    c.textContent=f;c.onclick=()=>{state.fields.has(f)?state.fields.delete(f):state.fields.add(f);renderChips();};el.appendChild(c);});
}

function start(mode){
  let pool=Q.filter(q=>sectionOf(q)===curSection && state.fields.has(q.field));
  if(mode==='review'){
    const w=new Set(store.wrong||[]);
    pool=Q.filter(q=>sectionOf(q)===curSection && w.has(qid(q)));
    if(pool.length===0){alert('復習する問題がありません。まずは全問に挑戦してみましょう。');return;}
  }
  if(pool.length===0){alert('分野を1つ以上選んでください。');return;}
  if(mode==='shuffle'||mode==='review'){pool=[...pool].sort(()=>Math.random()-0.5);}
  state.queue=pool;state.idx=0;state.correct=0;state.wrong=[];
  document.getElementById('screen-start').style.display='none';
  document.getElementById('screen-end').style.display='none';
  document.getElementById('screen-quiz').style.display='block';
  document.getElementById('score').style.display='block';
  document.getElementById('pbar').style.display='block';
  document.getElementById('sc-t').textContent=state.queue.length;
  renderQ();
}

function renderQ(){
  const q=state.queue[state.idx];state.answered=false;
  document.getElementById('sc-n').textContent=state.correct;
  document.getElementById('pfill').style.width=(state.idx/state.queue.length*100)+'%';
  const isOX=(q.type==='○×');
  const s=document.getElementById('screen-quiz');
  s.innerHTML=`
  <div class="card">
    <div class="meta">
      <span class="badge yr">${q.y}</span>
      <span class="badge ${isOX?'ox':'type'}">${q.type}</span>
      <span class="badge">${q.field}</span>
      <span class="qno">${state.idx+1} / ${state.queue.length}（${qlabel(q)}）</span>
    </div>
    ${isOX?'<div class="lead-ox">次の記述は正しい？ 誤り？</div>':''}
    <div class="qtext">${esc(q.q)}</div>${q.qsvg?('<div class="qfig">'+q.qsvg+'</div>'):''}
    <div id="answers"></div>
    <div id="result"></div>
  </div>`;
  const box=document.getElementById('answers');
  if(isOX){
    box.className='oxwrap';
    box.innerHTML=`
      <button class="oxbtn o" data-i="1"><span class="sym">○</span>正しい</button>
      <button class="oxbtn x" data-i="2"><span class="sym">×</span>誤り</button>`;
    box.querySelectorAll('.oxbtn').forEach(b=>b.onclick=()=>answer(+b.dataset.i));
  }else{
    box.className='choices';
    q.c.forEach((txt,i)=>{
      const b=document.createElement('button');b.className='choice';
      b.innerHTML=`<span class="n">${i+1}</span><span>${esc(txt)}</span>`;
      b.onclick=()=>answer(i+1);box.appendChild(b);
    });
  }
  window.scrollTo(0,0);
}

function answer(pick){
  if(state.answered)return;state.answered=true;
  const q=state.queue[state.idx];const ok=(pick===q.a);const isOX=(q.type==='○×');
  const id=qid(q);
  const w=new Set(store.wrong||[]);
  if(ok){state.correct++; if(w.has(id)){w.delete(id);store.wrong=[...w];saveStore();}}
  else{state.wrong.push(id); w.add(id);store.wrong=[...w];saveStore();}
  document.getElementById('sc-n').textContent=state.correct;
  if(isOX){
    document.querySelectorAll('.oxbtn').forEach(b=>{const i=+b.dataset.i;b.disabled=true;
      if(i===q.a)b.classList.add('correct');else if(i===pick)b.classList.add('wrong');else b.classList.add('dim');});
  }else{
    document.querySelectorAll('#answers .choice').forEach((b,i)=>{b.disabled=true;
      if(i+1===q.a)b.classList.add('correct');else if(i+1===pick)b.classList.add('wrong');else b.classList.add('dim');});
  }
  const ansLabel=isOX?(q.a===1?'○ 正しい':'× 誤り'):('選択肢 '+q.a);
  const last=(state.idx===state.queue.length-1);
  document.getElementById('result').innerHTML=`
   <div class="result">
     <div class="verdict ${ok?'ok':'ng'}"><span class="mk">${ok?'○':'×'}</span>${ok?'正解！':'不正解'}　<span style="font-size:13px;color:var(--sub);font-weight:600">正解：${ansLabel}</span></div>
     <div class="exp"><h4>解説</h4><div class="body">${esc(q.exp)}</div></div>
     ${q.fig?`<button class="fig-link" onclick="openFig('${q.fig}')">🖼 図解で理解する（${FIGS[q.fig].title}）</button>`:''}
     <div class="nav">
       <button class="btn ghost" onclick="goHome()">中断</button>
       <button class="btn primary" onclick="next()">${last?'結果を見る':'次の問題へ →'}</button>
     </div>
   </div>`;
  document.getElementById('pfill').style.width=((state.idx+1)/state.queue.length*100)+'%';
}

function next(){ if(state.idx<state.queue.length-1){state.idx++;renderQ();} else showEnd(); }

function showEnd(){
  document.getElementById('screen-quiz').style.display='none';
  document.getElementById('pbar').style.display='none';
  const total=state.queue.length,c=state.correct,pct=Math.round(c/total*100);
  const msg=pct>=80?'すばらしい！合格圏の理解度です。':pct>=60?'あと一歩。間違えた問題を復習しましょう。':'基礎から復習していきましょう。図解解説がおすすめです。';
  const r=54,circ=2*Math.PI*r,off=circ*(1-pct/100);
  const e=document.getElementById('screen-end');e.style.display='block';
  e.innerHTML=`<div class="end">
    <svg class="ring" viewBox="0 0 130 130">
      <circle cx="65" cy="65" r="${r}" fill="none" stroke="#222b3d" stroke-width="12"/>
      <circle cx="65" cy="65" r="${r}" fill="none" stroke="${pct>=60?'#22c55e':'#f59e0b'}" stroke-width="12"
        stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${off}" transform="rotate(-90 65 65)"/>
      <text x="65" y="72" text-anchor="middle" font-size="30" font-weight="800" fill="#e8edf5">${pct}%</text>
    </svg>
    <div class="big">${c}<small> / ${total} 問正解</small></div>
    <div class="msg">${msg}</div>
    <div class="mode-grid">
      ${state.wrong.length?`<button class="mode-btn" onclick="start('review')"><span class="ic">🔁</span><span>間違えた${state.wrong.length}問を復習<small>今回ミスした問題だけ出題</small></span></button>`:''}
      <button class="mode-btn" onclick="goHome()"><span class="ic">🏠</span><span>ホームに戻る<small>分野やモードを選び直す</small></span></button>
    </div></div>`;
  window.scrollTo(0,0);
}

function goHome(){
  document.getElementById('screen-quiz').style.display='none';
  document.getElementById('screen-end').style.display='none';
  document.getElementById('score').style.display='none';
  document.getElementById('pbar').style.display='none';
  document.getElementById('screen-start').style.display='block';
  renderChips();window.scrollTo(0,0);
}

function openFig(key){
  const f=FIGS[key];if(!f)return;
  document.getElementById('fig-title').textContent=f.title;
  document.getElementById('fig-body').innerHTML=f.build();
  document.getElementById('modal').classList.add('on');
  document.body.style.overflow='hidden';
}
function closeFig(){document.getElementById('modal').classList.remove('on');document.body.style.overflow='';}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}

setSection('午前');
</script>
</body>
</html>
