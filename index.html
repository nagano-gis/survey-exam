<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1f6feb">
<title>測量士 午前 一問一答</title>
<style>
:root{
  --bg:#0f1420; --card:#1a2130; --card2:#222b3d; --line:#2e3a52;
  --txt:#e8edf5; --sub:#9fb0c8; --accent:#3b82f6; --accent2:#2563eb;
  --ok:#22c55e; --okbg:#0f3123; --ng:#ef4444; --ngbg:#3a1414;
  --badge:#334155; --shadow:0 6px 20px rgba(0,0,0,.35);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
  background:var(--bg); color:var(--txt); line-height:1.7;
  padding-bottom:env(safe-area-inset-bottom);
}
.wrap{max-width:640px;margin:0 auto;padding:0 14px 40px}
header{
  position:sticky;top:0;z-index:10;background:rgba(15,20,32,.92);
  backdrop-filter:blur(8px);border-bottom:1px solid var(--line);
  padding:10px 14px;
}
.hd-row{display:flex;align-items:center;justify-content:space-between;gap:10px;max-width:640px;margin:0 auto}
.title{font-size:15px;font-weight:700;letter-spacing:.02em}
.title small{color:var(--sub);font-weight:500;font-size:11px;display:block}
.score{font-size:13px;color:var(--sub);white-space:nowrap}
.score b{color:var(--ok);font-size:16px}
.pbar{height:5px;background:var(--card);border-radius:99px;margin-top:8px;overflow:hidden;max-width:640px;margin-left:auto;margin-right:auto}
.pbar>div{height:100%;background:linear-gradient(90deg,var(--accent),#60a5fa);width:0;transition:width .3s}

.start{padding:34px 8px;text-align:center}
.start h1{font-size:26px;margin:.2em 0 .1em}
.start .lead{color:var(--sub);font-size:14px;margin-bottom:26px}
.mode-grid{display:grid;gap:12px}
.mode-btn{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:16px 18px;text-align:left;color:var(--txt);font-size:15px;font-weight:700;
  display:flex;align-items:center;gap:14px;cursor:pointer;box-shadow:var(--shadow)}
.mode-btn:active{transform:scale(.98)}
.mode-btn .ic{font-size:26px;line-height:1}
.mode-btn small{display:block;color:var(--sub);font-weight:500;font-size:12px;margin-top:2px}
.fields{margin-top:22px;text-align:left}
.fields h3{font-size:13px;color:var(--sub);margin:0 0 8px;font-weight:600}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{background:var(--card);border:1px solid var(--line);color:var(--sub);
  border-radius:99px;padding:6px 12px;font-size:12px;cursor:pointer}
.chip.on{background:var(--accent2);border-color:var(--accent);color:#fff}

.card{background:var(--card);border:1px solid var(--line);border-radius:18px;
  padding:16px 15px;margin-top:14px;box-shadow:var(--shadow)}
.meta{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.badge{font-size:11px;padding:3px 9px;border-radius:99px;background:var(--badge);color:#cdd8ea;font-weight:600}
.badge.yr{background:#1e3a5f;color:#8ec5ff}
.badge.type{background:#3b2f5f;color:#c9b5ff}
.badge.ox{background:#123a2a;color:#7dd3a0}
.qno{color:var(--sub);font-size:12px;margin-left:auto;align-self:center}
.lead-ox{font-size:12.5px;color:var(--sub);margin-bottom:6px}
.qtext{font-size:15.5px;font-weight:600;white-space:pre-wrap;margin-bottom:6px}
.choices{display:grid;gap:10px;margin-top:14px}
.choice{display:flex;gap:11px;align-items:flex-start;background:var(--card2);
  border:1.5px solid var(--line);border-radius:13px;padding:12px 13px;cursor:pointer;
  font-size:14.5px;color:var(--txt);text-align:left;transition:.15s;width:100%}
.choice:active{transform:scale(.99)}
.choice .n{flex:0 0 24px;height:24px;border-radius:50%;background:var(--badge);
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#dfe8f5}
.choice.correct{background:var(--okbg);border-color:var(--ok)}
.choice.correct .n{background:var(--ok);color:#04220f}
.choice.wrong{background:var(--ngbg);border-color:var(--ng)}
.choice.wrong .n{background:var(--ng);color:#2a0808}
.choice.dim{opacity:.55}
.choice:disabled{cursor:default}

/* ○× big buttons */
.oxwrap{display:flex;align-items:stretch;gap:12px;margin-top:16px}
.oxbtn{flex:1 1 0;min-width:0;min-height:112px;border:2px solid var(--line);background:var(--card2);border-radius:16px;
  padding:18px 8px;font-size:17px;font-weight:800;color:var(--txt);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;transition:.15s}
.oxbtn:active{transform:scale(.97)}
.oxbtn .sym{font-size:38px;line-height:1;height:42px;display:flex;align-items:center;justify-content:center}
.oxbtn.o .sym{color:#7dd3a0}.oxbtn.x .sym{color:#ff9b9b}
.oxbtn small{font-size:11px;color:var(--sub);font-weight:600}
.oxbtn>span:last-child,.oxbtn{white-space:nowrap}
.oxbtn.correct{background:var(--okbg);border-color:var(--ok)}
.oxbtn.wrong{background:var(--ngbg);border-color:var(--ng)}
.oxbtn.dim{opacity:.5}
.oxbtn:disabled{cursor:default}

.result{margin-top:14px;animation:fade .3s}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.verdict{display:flex;align-items:center;gap:10px;font-size:17px;font-weight:800;margin-bottom:10px;flex-wrap:wrap}
.verdict.ok{color:var(--ok)} .verdict.ng{color:var(--ng)}
.verdict .mk{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px}
.verdict.ok .mk{background:var(--okbg)} .verdict.ng .mk{background:var(--ngbg)}
.exp{background:var(--card2);border-radius:13px;padding:13px 14px;font-size:14px}
.exp h4{margin:0 0 7px;font-size:13px;color:var(--sub);font-weight:700}
.exp .body{white-space:pre-wrap}
.fig-link{margin-top:12px;display:inline-flex;align-items:center;gap:8px;background:var(--accent2);
  color:#fff;border:none;border-radius:12px;padding:11px 16px;font-size:14px;font-weight:700;cursor:pointer;width:100%;justify-content:center}
.fig-link:active{transform:scale(.98)}
.nav{display:flex;gap:10px;margin-top:14px}
.btn{flex:1;border:none;border-radius:13px;padding:14px;font-size:15px;font-weight:700;cursor:pointer}
.btn.primary{background:linear-gradient(90deg,var(--accent2),var(--accent));color:#fff}
.btn.ghost{background:var(--card2);color:var(--sub);border:1px solid var(--line);flex:0 0 96px}
.btn:active{transform:scale(.98)}

.modal{position:fixed;inset:0;z-index:50;background:rgba(6,9,16,.6);backdrop-filter:blur(3px);
  display:none;align-items:flex-end;justify-content:center}
.modal.on{display:flex}
.sheet{background:var(--bg);width:100%;max-width:640px;max-height:92vh;overflow-y:auto;
  border-radius:20px 20px 0 0;border:1px solid var(--line);border-bottom:none;
  padding:8px 16px calc(28px + env(safe-area-inset-bottom));animation:up .28s}
@keyframes up{from{transform:translateY(100%)}to{transform:none}}
.sheet-hd{position:sticky;top:0;background:var(--bg);padding:12px 0 10px;display:flex;
  align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);margin-bottom:14px}
.sheet-hd h2{font-size:17px;margin:0}
.x{background:var(--card2);border:1px solid var(--line);color:var(--txt);border-radius:10px;
  width:38px;height:38px;font-size:18px;cursor:pointer}
.fig{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;margin:12px 0}
.fig svg{width:100%;height:auto;display:block}
.figcap{font-size:12.5px;color:var(--sub);margin-top:8px;text-align:center}
.exbody{font-size:14.5px}
.exbody h3{font-size:15px;margin:18px 0 6px;color:#8ec5ff}
.exbody p{margin:6px 0}
.formula{background:var(--card2);border-radius:10px;padding:10px 12px;margin:10px 0;
  font-size:15px;text-align:center;font-weight:700;letter-spacing:.02em}
.kv{background:var(--card2);border-radius:10px;padding:2px 12px;margin:10px 0}
.kv div{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line);font-size:13.5px;gap:10px}
.kv div:last-child{border:none}
.kv span:first-child{color:var(--sub);white-space:nowrap}

.end{text-align:center;padding:30px 10px}
.end .big{font-size:52px;font-weight:800;margin:6px 0}
.end .big small{font-size:22px;color:var(--sub)}
.end .msg{color:var(--sub);margin-bottom:22px}
.ring{width:150px;height:150px;margin:6px auto 18px}
.footer-note{color:var(--sub);font-size:11px;text-align:center;margin-top:26px;line-height:1.6}
</style>
</head>
<body>
<header>
  <div class="hd-row">
    <div class="title">測量士 午前 一問一答<small id="hd-sub">過去問ベース・○×／選択式</small></div>
    <div class="score" id="score" style="display:none">正解 <b id="sc-n">0</b>/<span id="sc-t">0</span></div>
  </div>
  <div class="pbar" id="pbar" style="display:none"><div id="pfill"></div></div>
</header>

<div class="wrap">
  <section id="screen-start">
    <div class="start">
      <h1>測量士 午前<br>一問一答</h1>
      <div class="lead">過去問（令和4年）をベースにした学習アプリ。<br>○×問題と選択式で、回答するとその場で正誤と解説、重要テーマは図解で確認できます。</div>
      <div class="mode-grid">
        <button class="mode-btn" onclick="start('all')"><span class="ic">📚</span><span>全問に挑戦<small>選択した分野を順番に出題</small></span></button>
        <button class="mode-btn" onclick="start('shuffle')"><span class="ic">🔀</span><span>シャッフル出題<small>ランダムな順で力試し</small></span></button>
        <button class="mode-btn" onclick="start('review')"><span class="ic">🔁</span><span>間違えた問題だけ<small>前回ミスした問題を復習</small></span></button>
      </div>
      <div class="fields">
        <h3>出題する分野（タップで切替）</h3>
        <div class="chips" id="chips"></div>
      </div>
    </div>
  </section>

  <section id="screen-quiz" style="display:none"></section>
  <section id="screen-end" style="display:none"></section>

  <div class="footer-note">
    ※ 本教材は過去問と作業規程の準則等に基づく学習補助です。解説は要点整理であり、正確な規定は原典をご確認ください。
  </div>
</div>

<div class="modal" id="modal" onclick="if(event.target===this)closeFig()">
  <div class="sheet">
    <div class="sheet-hd"><h2 id="fig-title">図解</h2><button class="x" onclick="closeFig()">✕</button></div>
    <div id="fig-body"></div>
  </div>
</div>

<script>
/* ================= 図解ページ ================= */
const FIGS = {
"gnss-height": { title:"標高・楕円体高・ジオイド高", build:()=>`
<div class="fig">
<svg viewBox="0 0 360 220" xmlns="http://www.w3.org/2000/svg">
  <defs><marker id="ar" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#e8edf5"/></marker></defs>
  <path d="M10,55 Q120,35 240,60 T350,50" fill="none" stroke="#7dd3a0" stroke-width="3"/>
  <text x="300" y="44" fill="#7dd3a0" font-size="11">地表面</text>
  <path d="M10,120 Q120,108 240,126 T350,116" fill="none" stroke="#8ec5ff" stroke-width="3"/>
  <text x="288" y="140" fill="#8ec5ff" font-size="11">ジオイド面(N)</text>
  <path d="M10,170 Q180,160 350,168" fill="none" stroke="#ffb86b" stroke-width="3"/>
  <text x="250" y="190" fill="#ffb86b" font-size="11">回転楕円体面</text>
  <line x1="150" y1="46" x2="150" y2="165" stroke="#6b7a94" stroke-dasharray="3 3"/>
  <line x1="150" y1="48" x2="150" y2="114" stroke="#7dd3a0" stroke-width="2" marker-start="url(#ar)" marker-end="url(#ar)"/>
  <text x="156" y="86" fill="#7dd3a0" font-size="13" font-weight="700">H 標高</text>
  <line x1="150" y1="118" x2="150" y2="164" stroke="#8ec5ff" stroke-width="2" marker-start="url(#ar)" marker-end="url(#ar)"/>
  <text x="156" y="146" fill="#8ec5ff" font-size="13" font-weight="700">N</text>
  <line x1="120" y1="50" x2="120" y2="163" stroke="#ffb86b" stroke-width="2" marker-start="url(#ar)" marker-end="url(#ar)"/>
  <text x="76" y="110" fill="#ffb86b" font-size="13" font-weight="700">h 楕円体高</text>
</svg>
<div class="figcap">GNSSで直接求まるのは「楕円体高 h」。標高 H はジオイド高 N を差し引いて求める。</div>
</div>
<div class="exbody">
<div class="formula">標高 H ＝ 楕円体高 h － ジオイド高 N</div>
<p>位置の高さは「平均海面からの高さ＝標高(H)」で表す。GNSSが与える楕円体高(h)とは、ジオイド高(N)の分だけ差がある。</p>
<h3>令和4年 No.10 の解き方</h3>
<div class="formula">N<sub>A</sub> = 366.79 − 328.77 = 38.02 m</div>
<p>ジオイドは A→B へ1,000mあたり−0.04m傾斜、距離8,000mなので：</p>
<div class="formula">ΔN = −0.04 × 8 = −0.32 m → N<sub>B</sub> = 37.70 m</div>
<div class="formula" style="color:#22c55e">H<sub>B</sub> = 51.67 − 37.70 = <b>13.97 m</b></div>
</div>`},

"overlap": { title:"空中写真の重複度", build:()=>`
<div class="fig">
<svg viewBox="0 0 360 210" xmlns="http://www.w3.org/2000/svg">
  <circle cx="110" cy="28" r="6" fill="#8ec5ff"/><circle cx="210" cy="28" r="6" fill="#8ec5ff"/>
  <text x="94" y="18" fill="#8ec5ff" font-size="10">撮影1</text><text x="194" y="18" fill="#8ec5ff" font-size="10">撮影2</text>
  <line x1="110" y1="28" x2="210" y2="28" stroke="#8ec5ff" stroke-dasharray="3 3"/>
  <text x="146" y="24" fill="#8ec5ff" font-size="10">基線長 B</text>
  <line x1="30" y1="150" x2="350" y2="150" stroke="#7dd3a0" stroke-width="2"/>
  <text x="300" y="165" fill="#7dd3a0" font-size="10">地表面</text>
  <rect x="55" y="150" width="150" height="26" fill="#3b82f6" opacity=".35" stroke="#3b82f6"/>
  <rect x="155" y="150" width="150" height="26" fill="#22c55e" opacity=".3" stroke="#22c55e"/>
  <rect x="155" y="150" width="50" height="26" fill="#ffb86b" opacity=".55"/>
  <text x="140" y="192" fill="#ffb86b" font-size="10">重複部(オーバーラップ)</text>
  <line x1="110" y1="34" x2="55" y2="150" stroke="#6b7a94"/><line x1="110" y1="34" x2="205" y2="150" stroke="#6b7a94"/>
  <line x1="210" y1="34" x2="155" y2="150" stroke="#6b7a94"/><line x1="210" y1="34" x2="305" y2="150" stroke="#6b7a94"/>
  <line x1="55" y1="142" x2="205" y2="142" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="105" y="138" fill="#3b82f6" font-size="10">地上カバー L</text>
</svg>
<div class="figcap">重複度 p は隣り合う写真の重なり。基線長 B と地上カバー L で決まる。</div>
</div>
<div class="exbody">
<div class="formula">重複度 p ＝ 1 − B / L</div>
<p>地表が<b>高い</b>ほどカメラに近く、地上カバー L が<b>小さく</b>なるため重複度は下がる。<br>写真地図では倒れ込みを減らすため重複度を大きくとる。</p>
<h3>令和4年 No.19 の考え方</h3>
<div class="formula">対地高度 H = 0.1 × 0.09 ÷ 7×10⁻⁶ ≒ 1,286 m</div>
<p>重複度が最小60%になるのは地表が最も高い標高600m。基線長Bを求め基準面(200m)で換算：</p>
<div class="formula" style="color:#22c55e">基準面での重複度 ≒ <b>72%</b></div>
</div>`},

"projection": { title:"地図投影法のポイント", build:()=>`
<div class="fig">
<svg viewBox="0 0 360 180" xmlns="http://www.w3.org/2000/svg">
  <defs><marker id="ar2" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#6b7a94"/></marker></defs>
  <circle cx="66" cy="66" r="40" fill="none" stroke="#8ec5ff" stroke-width="2"/>
  <text x="40" y="126" fill="#e8edf5" font-size="11">地球(立体)</text>
  <rect x="150" y="30" width="70" height="46" fill="none" stroke="#22c55e" stroke-width="2"/>
  <circle cx="185" cy="53" r="12" fill="none" stroke="#22c55e"/>
  <text x="150" y="92" fill="#22c55e" font-size="11">正角図法</text>
  <text x="150" y="105" fill="#9fb0c8" font-size="9">形○ / 面積×</text>
  <rect x="255" y="30" width="70" height="46" fill="none" stroke="#ffb86b" stroke-width="2"/>
  <ellipse cx="290" cy="53" rx="16" ry="8" fill="none" stroke="#ffb86b"/>
  <text x="255" y="92" fill="#ffb86b" font-size="11">正積図法</text>
  <text x="255" y="105" fill="#9fb0c8" font-size="9">面積○ / 形×</text>
  <line x1="108" y1="58" x2="148" y2="52" stroke="#6b7a94" marker-end="url(#ar2)"/>
  <line x1="108" y1="76" x2="253" y2="54" stroke="#6b7a94" marker-end="url(#ar2)"/>
  <text x="120" y="150" fill="#9fb0c8" font-size="10">※ 正角と正積を同時に満たすことはできない</text>
</svg>
</div>
<div class="exbody">
<h3>覚えておく要点</h3>
<div class="kv">
  <div><span>正角図法</span><span>角度・形が正しい（面積は歪む）</span></div>
  <div><span>正積図法</span><span>面積が正しい（形は歪む）</span></div>
  <div><span>心射図法</span><span>2点の直線が最短経路(大圏)</span></div>
  <div><span>UTM図法</span><span>経度を6°帯に分割した横メルカトル</span></div>
  <div><span>1/25,000地形図</span><span>UTM図法</span></div>
  <div><span>地理院地図(web)</span><span>ウェブメルカトル(UTMではない)</span></div>
</div>
</div>`},

"normal": { title:"正規分布と上側確率", build:()=>`
<div class="fig">
<svg viewBox="0 0 360 180" xmlns="http://www.w3.org/2000/svg">
  <line x1="20" y1="140" x2="345" y2="140" stroke="#6b7a94"/>
  <path d="M20,140 C120,140 130,30 182,30 C234,30 244,140 345,140" fill="#1e3a5f" stroke="#8ec5ff" stroke-width="2"/>
  <path d="M300,140 C312,138 320,128 328,120 L345,140 Z" fill="#ef4444" opacity=".7"/>
  <line x1="182" y1="140" x2="182" y2="34" stroke="#9fb0c8" stroke-dasharray="3 3"/>
  <text x="166" y="156" fill="#9fb0c8" font-size="11">平均60</text>
  <line x1="300" y1="140" x2="300" y2="60" stroke="#ef4444" stroke-dasharray="3 3"/>
  <text x="284" y="156" fill="#ef4444" font-size="11">約79点</text>
  <text x="304" y="110" fill="#ef4444" font-size="11">上位3%</text>
</svg>
<div class="figcap">「上位3%」＝右端の面積(上側確率)が0.03になる点。その点数が最低合格点。</div>
</div>
<div class="exbody">
<h3>令和4年 No.5 の解き方</h3>
<p>上位3% → 上側確率0.03 → 正規分布表より u≒1.88</p>
<div class="formula" style="color:#22c55e">X = 60 + 1.88 × 10 ≒ 78.8 → <b>79点</b></div>
</div>`},
};

/* ================= 問題データ ================= */
/* type:"○×" は c:["正しい","誤り"], a: 1(正しい)/2(誤り) */
const OX=["正しい","誤り"];
const Q = [
/* --- No.1 測量法（○×） --- */
{y:"R4",no:1,sub:"a",field:"測量法",type:"○×",
 q:"「基本測量及び公共測量以外の測量」とは、基本測量又は公共測量の測量成果を使用して実施する測量（局地的測量等を除く）をいう。",
 c:OX,a:1, exp:"正しい。基本・公共測量の成果を使って行う測量から、局地的測量や小縮尺図の調製などを除いたもの。\n⚠️ 「成果を使用しない」局地的測量等は含まない点に注意。"},
{y:"R4",no:1,sub:"b",field:"測量法",type:"○×",
 q:"測量士又は測量士補となる資格を有する者は、なろうとする場合、国土地理院の長に対して登録の申請をしなければならない。",
 c:OX,a:1, exp:"正しい。測量士・測量士補になるには国土地理院の長へ登録申請が必要。\n⚠️ 申請先を「国土交通大臣」と取り違える典型ひっかけ。登録・名簿は“国土地理院の長”。"},
{y:"R4",no:1,sub:"c",field:"測量法",type:"○×",
 q:"測量計画機関は、自ら測量作業機関となることはできない。",
 c:OX,a:2, exp:"誤り。測量計画機関は自ら測量作業機関を兼ねることができる。\n💡 「〜できない」と断定する肢は誤りを疑う。計画と作業を別主体にする決まりはない。"},
{y:"R4",no:1,sub:"d",field:"測量法",type:"○×",
 q:"公共測量の測量成果を使用して測量しようとする者は、あらかじめ当該成果を得た測量作業機関の承認を得なければならない。",
 c:OX,a:2, exp:"誤り。成果使用の承認を得る相手は、成果を得た「測量計画機関」（測量法44条）。\n⚠️ 「測量作業機関」と入れ替えるひっかけが頻出。承認・成果の管理は“計画機関”と覚える。"},
{y:"R4",no:1,sub:"e",field:"測量法",type:"○×",
 q:"測量計画機関は、公共測量の測量成果を得たとき、遅滞なくその写を国土交通大臣に送付しなければならない。",
 c:OX,a:2, exp:"誤り。成果の写しの送付先は「国土地理院の長」（測量法40条）。\n⚠️ 「国土交通大臣」と入れ替えるひっかけ。成果関係の届出先は基本“国土地理院の長”。"},

/* --- No.5 正規分布（計算） --- */
{y:"R4",no:5,field:"正規分布(計算)",type:"計算",
 q:"100点満点の試験で、点数分布が近似的に平均60点・標準偏差10点の正規分布に従う。1,000人が受験し上位3%が合格する。最低合格点はいくらか。\n（正規分布表：上側確率0.03のとき u≒1.88）",
 c:["74点","79点","84点","89点","94点"], a:2,
 exp:"上位3% → 上側確率0.03 → 正規分布表より u≒1.88。\n最低合格点 = 平均 + u×標準偏差 = 60 + 1.88×10 ≒ 78.8 → 79点。\n⚠️ 平均60や、σを足し忘れた値を選ばない。上位ほど点は“高い”＝平均＋uσ。",
 fig:"normal"},

/* --- No.6 測量の基準（○×） --- */
{y:"R4",no:6,sub:"a",field:"測量の基準",type:"○×",
 q:"基本測量・公共測量において、位置は地理学的経緯度及び楕円体高で表示する。",
 c:OX,a:2, exp:"誤り。位置は「地理学的経緯度及び平均海面からの高さ（標高）」で表示する。\n⚠️ 「楕円体高」に置き換える定番ひっかけ。GNSSで直接出るのは楕円体高だが、法で表示するのは“標高”。",
 fig:"gnss-height"},
{y:"R4",no:6,sub:"b",field:"測量の基準",type:"○×",
 q:"世界測地系では、回転楕円体の中心は地球の重心と一致し、短軸は地球の自転軸と一致する。",
 c:OX,a:1, exp:"正しい。世界測地系では回転楕円体の中心＝地球の重心、短軸＝地球の自転軸。"},
{y:"R4",no:6,sub:"c",field:"測量の基準",type:"○×",
 q:"基本測量・公共測量において、土地の距離及び面積は回転楕円体の表面上の値で表示する。",
 c:OX,a:1, exp:"正しい。距離・面積は回転楕円体の表面上の値で表示する。\n⚠️ 「ジオイド面上」と書く肢は誤り。距離・面積は“楕円体面上”と覚える。"},
{y:"R4",no:6,sub:"d",field:"測量の基準",type:"○×",
 q:"2011年東北地方太平洋沖地震の地殻変動に伴い、原点数値を改正するとともに、日本全国の電子基準点の成果を改定した。",
 c:OX,a:2, exp:"誤り。成果改定の対象は地殻変動の大きい“東日本”で、「日本全国」は言い過ぎ。\n💡 「全国」「全て」など“全部”を指す言葉は誤りのサイン。"},
{y:"R4",no:6,sub:"e",field:"測量の基準",type:"○×",
 q:"ジオイドは平均海面を陸地内部まで仮想的に延長した面で、地球の重力の影響により凹凸を持つ複雑な形状となる。",
 c:OX,a:1, exp:"正しい。ジオイドは平均海面を陸域へ延長した重力の等ポテンシャル面で、凹凸を持つ。",

/* --- No.7 TS基準点測量（誤りはどれか・5択） --- */
{y:"R4",no:7,field:"基準点測量",type:"5択(誤り)",
 q:"公共測量におけるトータルステーション（TS）を用いた基準点測量の精度管理について、明らかに間違っているものはどれか。",
 c:["観測機器の点検は観測着手前及び観測期間中に適宜行い、必要に応じ調整する。",
    "距離測定の気象補正の気温・気圧は、TSを整置した測点で測定開始直前又は終了直後に測る。",

/* --- No.9 GNSS測量（誤りはどれか・5択） --- */
{y:"R4",no:9,field:"GNSS測量",type:"5択(誤り)",
 q:"GNSS衛星及びGNSS測量機を用いた基準点測量について、明らかに間違っているものはどれか。",

    "異なる衛星測位システムを組み合わせると、測量できる場所や時間帯を拡大できる。",
    "準天頂衛星の測位信号は、日本以外に東南アジア・オセアニア地域でも受信できる。",

/* --- No.10 GNSS標高（計算） --- */
{y:"R4",no:10,field:"GNSS標高計算",type:"計算",
 q:"既知点A・新点BでGNSS基準点測量を行い、A〜B間の距離8,000.00m、新点Bの楕円体高51.67mを得た。新点Bの標高は幾らか。\n\n・既知点Aの標高328.77m、楕円体高366.79m\n・ジオイドは楕円体面に対し、A→B方向へ1,000mあたり−0.04mの一様な傾斜\n・距離は楕円体面上の距離",
 c:["13.33m","13.65m","13.69m","13.77m","13.97m"], a:5,
 exp:"標高H＝楕円体高h−ジオイド高N。\nA点でN=366.79−328.77=38.02m、ジオイド傾斜−0.04×8=−0.32m→N_B=37.70m、H_B=51.67−37.70=13.97m。\n⚠️ 符号ミス注意：Nは“引く”。傾斜−0.04は距離に比例配分(×8km)。図解も参照。",
 fig:"gnss-height"},

/* --- No.19 空中写真の重複度（計算） --- */
{y:"R4",no:19,field:"空中写真の重複度(計算)",type:"計算",
 q:"デジタル航空カメラで鉛直下方向に空中写真撮影を行う。標高200〜600mの土地全体で、同一コース内の隣接写真の重複度が最小60%となるよう計画した。撮影基準面の標高を200mとするとき、撮影基準面での隣接写真の重複度は何%か。\n\n・画面距離9cm、画面14,000×11,000画素、素子寸法7μm\n・画面短辺が撮影基線と平行、撮影は等高度、撮影基線長は一定\n・撮影基準面での地上画素寸法10cm",
 c:["59%","60%","63%","67%","72%"], a:5,
 exp:"対地高度H=0.1×0.09÷(7×10⁻⁶)≒1,286m。重複度が最小60%になるのは地表が最も高い600m。そこで基線長Bを決め、基準面(200m)で換算すると約72%。\n⚠️ 最小重複度は“最も高い地表”で発生。基準面(低い側)では重複度は大きくなる。図解参照。",
 fig:"overlap"},

 q:"地理空間情報活用推進基本法における基盤地図情報について、明らかに間違っているものはどれか。",
 c:["国が保有する基盤地図情報は、原則インターネットで無償提供される。",
    "基盤地図情報の項目は省令で、基準点・海岸線・道路縁・建築物の外周線など13項目が定められている。",
    "整備更新時に、対象地域と隣接地域の境界部でシームレスに接合される。",
    "数値標高モデルとジオイド・モデルを利用すると、数値表層モデルを作成できる。",
    "都市計画区域外の平面位置の誤差は25m以内、高さの誤差は5.0m以内である。"], a:4,
 exp:"誤りは4。DEM＋ジオイド・モデルから作れるのは標高情報。建物・樹木を含むDSM(数値表層モデル)は別途表層計測が必要で作れない。\n⚠️ DEM(地表)とDSM(表層＝建物・樹木含む)の違いが狙われる。",
 fig:"gnss-height"},

/* --- No.26 用地測量（○×） --- */
{y:"R4",no:26,sub:"a",field:"用地測量",type:"○×",
 q:"公図等転写連続図の作成において、隣接する公図間の境界線が整合しない部分があったため、接合部が合致するように境界線を編集した。",
 c:OX,a:2, exp:"誤り。公図の境界線は勝手に編集不可。記載どおり“そのまま転写”する。\n⚠️ 「合致するよう編集した」は誤りの典型。公図は改変しない。"},
{y:"R4",no:26,sub:"b",field:"用地測量",type:"○×",
 q:"権利者確認調査において、測量計画機関から貸与された資料などに基づき権利者調査表を作成した。",
 c:OX,a:1, exp:"正しい。測量計画機関から貸与された資料等に基づき権利者調査表を作成する。"},
{y:"R4",no:26,sub:"c",field:"用地測量",type:"○×",
 q:"境界測量において、家屋の密集により基準点からの視通を確保できなかったため、補助基準点を設置して作業を行った。",
 c:OX,a:1, exp:"正しい。視通が確保できない場合は補助基準点を設置して境界測量を行える。"},
{y:"R4",no:26,sub:"d",field:"用地測量",type:"○×",
 q:"ネットワーク型RTK法による境界測量で、再初期化して2セット観測し、座標値には1セット目の観測値を採用、2セット目は点検値とした。",
 c:OX,a:2, exp:"誤り。単点観測法は2セット観測し“両セットの平均値”を採用する。\n⚠️ 「1セット目を採用・2セット目は点検」は誤り。2セット平均が原則。"},
{y:"R4",no:26,sub:"e",field:"用地測量",type:"○×",
 q:"境界点間の距離を計算した際に、0.001mの次の位を切り捨てた。",
 c:OX,a:1, exp:"正しい。距離計算は所定の位で丸める(この処理は適切)。"},

/* --- No.28 河川測量（語句・5択） --- */
{y:"R4",no:28,field:"河川測量",type:"5択(語句)",
 q:"公共測量における河川測量について、ア〜オに入る語句・数値の組合せとして最も適当なものはどれか。\n\nア：距離標は近傍の( ア )等から放射法等で設置する。\nイ：定期縦断測量の縦断面図の横縮尺は1,000分の1から( イ )分の1まで。\nウ：定期横断測量の横断面図の横縮尺は100分の1から( ウ )分の1まで。\nエ：水準基標測量で使う機器は1〜2級レベル及び( エ )。\nオ：水深の測定は( オ )を用いて行う。",
 c:["ア:3級基準点 イ:100,000 ウ:1,000 エ:1級標尺 オ:音響測深機",
    "ア:3級基準点 イ:10,000 ウ:10,000 エ:2級標尺 オ:音響測深機",
    "ア:水準基標 イ:10,000 ウ:10,000 エ:2級標尺 オ:電波式水位計",
    "ア:水準基標 イ:100,000 ウ:1,000 エ:2級標尺 オ:音響測深機",
    "ア:3級基準点 イ:100,000 ウ:10,000 エ:1級標尺 オ:電波式水位計"], a:1,
 exp:"正しい組合せは1（ア:3級基準点／イ:100,000／ウ:1,000／エ:1級標尺／オ:音響測深機）。\n💡 縦断は横縮尺1,000〜100,000、横断は100〜1,000（縦断のほうが広範囲＝大きい数字）。水深は音響測深機、基標は1級標尺。\n⚠️ 「電波式水位計」「2級標尺」へ差し替える肢に注意。"},
/* ===== 令和8年 午前 ===== */
{y:"R8",no:1,sub:"a",field:"測量法",type:"○×",q:"「測量」とは土地の測量をいい、地図の調製及び測量用写真の撮影を含む。",c:["正しい","誤り"],a:1,exp:"正しい。測量法の「測量」の定義そのもの。地図の調製・測量用写真の撮影も含む。"},
{y:"R8",no:1,sub:"b",field:"測量法",type:"○×",q:"「公共測量」とは費用の全部又は一部を国又は公共団体が負担して行う測量をいい、国又は公共団体が費用を補助して行う測量は含まない。",c:["正しい","誤り"],a:2,exp:"誤り。公共測量は費用を「負担し、又は補助して」行う測量。補助して行う測量も含む。\n⚠️「補助は含まない」と限定する肢はひっかけ。"},
{y:"R8",no:1,sub:"c",field:"測量法",type:"○×",q:"公共測量は、基本測量又は公共測量の測量成果に基いて実施しなければならない。",c:["正しい","誤り"],a:1,exp:"正しい。公共測量は基本測量等の成果に基づいて行う。"},
{y:"R8",no:1,sub:"d",field:"測量法",type:"○×",q:"「基本測量及び公共測量以外の測量」とは、基本測量及び公共測量の測量成果を使用せずに実施する測量をいう。",c:["正しい","誤り"],a:2,exp:"誤り。定義は成果を「使用して」実施する測量。\n⚠️「使用せず」と逆にするひっかけ。R4でも同型が出題。"},
{y:"R8",no:1,sub:"e",field:"測量法",type:"○×",q:"何人も、国土地理院の長の承諾を得ないで、基本測量の測量標を移転し、汚損し、その他その効用を害する行為をしてはならない。",c:["正しい","誤り"],a:1,exp:"正しい。測量標の保護に関する規定どおり。"},
{y:"R8",no:2,sub:"a",field:"ITRF・座標系",type:"○×",q:"我が国の測地系であるJGD2024は、ITRFに基づいている。",c:["正しい","誤り"],a:1,exp:"正しい。日本の測地系はITRF（国際地球基準座標系）に基づく。"},
{y:"R8",no:2,sub:"b",field:"ITRF・座標系",type:"○×",q:"測量法において測量の基準として規定する回転楕円体は、WGS84である。",c:["正しい","誤り"],a:2,exp:"誤り。規定する回転楕円体は「GRS80」。\n⚠️ GRS80とWGS84の取り違えが定番。測量法はGRS80。"},
{y:"R8",no:2,sub:"c",field:"ITRF・座標系",type:"○×",q:"北海道と九州の位置をITRFで表すと、Y座標の値は北海道の方が大きい。",c:["正しい","誤り"],a:2,exp:"誤り。ITRFのY軸は東経90°方向。経度の小さい九州の方がY座標は大きくなる。\n💡 Y∝cos(緯度)×sin(経度)で比較すると九州＞北海道。"},
{y:"R8",no:2,sub:"d",field:"ITRF・座標系",type:"○×",q:"我が国の位置をITRFで表すと、X座標の符号は正である。",c:["正しい","誤り"],a:2,exp:"誤り。X軸は経度0°(グリニッジ)方向。東経約135°の日本ではX座標は負。\n💡 cos(135°)<0 → Xは負。"},
{y:"R8",no:2,sub:"e",field:"ITRF・座標系",type:"○×",q:"ITRFのX,Y,Zの座標値が全て0になる点は、地球の重心である。",c:["正しい","誤り"],a:1,exp:"正しい。ITRFは地心座標系で、原点は地球の重心。"},
{y:"R8",no:3,sub:"a",field:"測量計画・作業機関",type:"○×",q:"測量作業機関は、精度管理を行わなければならず、作業終了後速やかに点検測量を行わなければならない。",c:["正しい","誤り"],a:1,exp:"正しい。精度確保のため点検測量を行う。"},
{y:"R8",no:3,sub:"b",field:"測量計画・作業機関",type:"○×",q:"1級基準点測量の点検測量を、作業規程の準則に定められた標準の点検測量率10%で実施した。",c:["正しい","誤り"],a:1,exp:"正しい。点検測量率の標準は10%。"},
{y:"R8",no:3,sub:"c",field:"測量計画・作業機関",type:"○×",q:"「作業規程の準則」を準用した作業規程に従う場合、JPGISに準拠した製品仕様書を定めることを省略できる。",c:["正しい","誤り"],a:2,exp:"誤り。製品仕様書の作成は省略できない。\n⚠️「省略できる」は誤りを疑うキーワード。"},
{y:"R8",no:3,sub:"d",field:"測量計画・作業機関",type:"○×",q:"検定を受けるよう指定された測量成果について、自社で当該測量を担当していない測量士により検定を行い、検定証明書等を作成して提出した。",c:["正しい","誤り"],a:2,exp:"誤り。検定は第三者(検定機関)が行うもので、自社内の測量士による検定は認められない。"},
{y:"R8",no:3,sub:"e",field:"測量計画・作業機関",type:"○×",q:"主任技術者は、測量士でなくとも高度な技術と十分な実務経験を有する者であれば良い。",c:["正しい","誤り"],a:2,exp:"誤り。主任技術者は「測量士」でなければならない。\n⚠️「測量士でなくてもよい」は典型の誤り。"},
{y:"R8",no:4,sub:"a",field:"測量作業機関の対応",type:"○×",q:"社用車で現場に向かうに当たり、目視とアルコール検知器で出発前に酒気帯びでないことを確認し、運転終了時にも同様の確認を行った。",c:["正しい","誤り"],a:1,exp:"正しい。運転前後のアルコールチェックは適切な対応。"},
{y:"R8",no:4,sub:"b",field:"測量作業機関の対応",type:"○×",q:"私有地の樹木が観測の支障になり、占有者に連絡がつかなかったため作業員の判断で伐採し、後日連絡した。",c:["正しい","誤り"],a:2,exp:"誤り。他人の土地の樹木を無断で伐採してはならない。占有者の承諾が必要。"},
{y:"R8",no:4,sub:"c",field:"測量作業機関の対応",type:"○×",q:"UAVレーザ測量で飛行中に機体が制御不能で墜落したため、航空法に基づき事態の詳細を国土交通大臣へ速やかに報告した。",c:["正しい","誤り"],a:1,exp:"正しい。事故は航空法に基づき報告する。"},
{y:"R8",no:4,sub:"d",field:"測量作業機関の対応",type:"○×",q:"私有地への立入りが必要なため、占有者への事前通知と、測量計画機関が発行する身分証明書の携帯を作業員に指示した。",c:["正しい","誤り"],a:1,exp:"正しい。立入りには事前通知と身分証明書の携帯が必要。"},
{y:"R8",no:4,sub:"e",field:"測量作業機関の対応",type:"○×",q:"屋外作業中に大雨特別警報が発表されたが、ハザードマップで浸水想定区域外と確認できていたため作業を継続した。",c:["正しい","誤り"],a:2,exp:"誤り。大雨特別警報など重大な警報時は安全確保のため作業を中止すべき。"},
{y:"R8",no:5,field:"回転移動(計算)",type:"計算",q:"二次元座標で、点P(1.08, 0.91)を原点Oを中心に反時計回りに30°回転させたときの点P'(x',y')の座標値はどれか。\n（x'=x cosθ−y sinθ, y'=x sinθ+y cosθ）",c:["x'=0.43, y'=1.33","x'=0.43, y'=1.34","x'=0.48, y'=1.33","x'=0.48, y'=1.73","x'=1.39, y'=0.25"],a:3,exp:"x'=1.08×cos30°−0.91×sin30°=1.08×0.866−0.91×0.5=0.935−0.455≒0.48。\ny'=1.08×sin30°+0.91×cos30°=0.54+0.788≒1.33。\n⚠️ 符号ミス注意：x'は「−y sinθ」。cos30°=0.866, sin30°=0.5を正確に。"},
{y:"R8",no:6,field:"測量の基準",type:"5択(誤り)",q:"測量法における測量の基準について、明らかに間違っているものはどれか。",c:["世界測地系では、回転楕円体の短軸は地球の自転軸と一致している。","距離及び面積は、測量法で規定する回転楕円体の表面上の値で表示する。","位置は、地理学的経緯度及び平均海面からの高さで表示する（場合により直角座標等も可）。","国土地理院は、基本測量で設置された基準点の標高成果を令和7年4月1日に改定した。","ジオイドは、重力の大きさが常に等しい面である。"],a:5,exp:"誤りは5。ジオイドは重力の「ポテンシャルが等しい面（等ポテンシャル面）」であり、重力の“大きさ”が等しい面ではない。\n⚠️「重力の大きさが等しい」は典型のひっかけ。正しくは“ポテンシャル”。",fig:"gnss-height"},
{y:"R8",no:8,field:"基準点測量",type:"5択(語句)",q:"公共測量におけるトータルステーションを用いた基準点測量について、ア〜エに入る組合せはどれか。\nア：偏心点を設置する場合、偏心距離は測点間距離の（ ア ）分の1以下を標準\nイ：水平角観測の対回内の観測方向数は（ イ ）以下\nウ：厳密水平網平均計算による新点水平位置の標準偏差の許容範囲（ ウ ）\nエ：厳密高低網平均計算による新点標高の標準偏差の許容範囲（ エ ）",c:["ア:6 イ:6方向 ウ:100mm エ:200mm","ア:4 イ:5方向 ウ:100mm エ:100mm","ア:4 イ:6方向 ウ:200mm エ:100mm","ア:6 イ:6方向 ウ:200mm エ:200mm","ア:6 イ:5方向 ウ:100mm エ:200mm"],a:5,exp:"正しい組合せは5（ア:6／イ:5方向／ウ:100mm／エ:200mm）。\n💡 対回内の観測方向数は5方向以下。水平位置100mm・標高200mmの許容範囲はセットで覚える。"},
{y:"R8",no:9,sub:"a",field:"GNSS測量",type:"○×",q:"GNSS観測において、準天頂衛星はGPS衛星と同等の衛星として扱うことができる。",c:["正しい","誤り"],a:1,exp:"正しい。準天頂衛星はGPSと同等に扱える。"},
{y:"R8",no:9,sub:"b",field:"GNSS測量",type:"○×",q:"スタティック法で観測距離10km以上の観測でGLONASS衛星も用いる場合、これらの衛星を5衛星以上使用する。",c:["正しい","誤り"],a:2,exp:"誤り。GLONASSを併用する場合はGPS・準天頂で5衛星以上に加え、GLONASSを2衛星以上使用する等の条件がある。“合計5衛星”では不足。"},
{y:"R8",no:9,sub:"c",field:"GNSS測量",type:"○×",q:"対流圏における電波の伝搬遅延に起因する誤差は、2周波の観測により軽減することができる。",c:["正しい","誤り"],a:2,exp:"誤り。2周波で軽減できるのは「電離層」遅延。対流圏遅延は2周波では消去できない。\n⚠️ 電離層⇔対流圏の取り違えが超頻出。2周波＝電離層。"},
{y:"R8",no:9,sub:"d",field:"GNSS測量",type:"○×",q:"GNSS観測の基線解析では、GNSS衛星の軌道情報は放送暦を標準とする。",c:["正しい","誤り"],a:1,exp:"正しい。基線解析の軌道情報は放送暦が標準。"},
{y:"R8",no:9,sub:"e",field:"GNSS測量",type:"○×",q:"アンテナ位相特性が異なるアンテナ間のGNSS測量では、PCV補正を適用することにより異機種間観測での精度が向上する。",c:["正しい","誤り"],a:1,exp:"正しい。PCV補正で異機種間の精度を確保できる。"},
{y:"R8",no:10,field:"GNSS標高計算",type:"計算",q:"GNSS基準点測量で、既知点A〜新点Bの基準面上の距離6,000.00m、新点Bの楕円体高105.98mを得た。新点Bの標高は幾らか。\n・既知点Aの標高135.66m、楕円体高176.75m\n・ジオイドは楕円体面に対しA→B方向へ基準面上1,000mあたり−0.02mの一様な傾斜",c:["64.77m","64.89m","64.91m","65.01m","65.13m"],a:4,exp:"標高H＝楕円体高h−ジオイド高N。\nA点でN=176.75−135.66=41.09m、ジオイド傾斜−0.02×6=−0.12m→N_B=40.97m。\nH_B=105.98−40.97=65.01m。\n⚠️ Nは“引く”。傾斜は距離に比例配分(×6km)。",fig:"gnss-height"},
{y:"R8",no:11,field:"水準測量",type:"5択(誤り)",q:"公共測量における水準測量について、明らかに間違っているものはどれか。",c:["観測方程式で水準網の平均計算を行う場合、求点の仮定標高は任意の値でよい。","直接水準測量の平均計算で、重量は観測距離の逆数とする。","1級水準測量で標尺目盛を後視・前視・前視・後視の順に読定するのは、鉛直軸誤差を小さくすることが目的である。","1級水準測量では標尺補正計算及び正規正標高補正計算を行う。","新点の観測は、永久標識の設置後24時間以上経過してから行う。"],a:3,exp:"誤りは3。後視・前視・前視・後視の読定順は、観測中の“レベルの沈下”等の影響を軽減するためで、目的が違う（鉛直軸誤差の軽減ではない）。\n💡 読定順＝時間経過に伴う沈下対策、と覚える。"},
{y:"R8",no:12,field:"GNSS標高測量",type:"5択(誤り)",q:"公共測量におけるGNSS標高測量について、明らかに間違っているものはどれか。",c:["GNSS標高測量とは、GNSS測量機で新設水準点の標高を定める作業をいい、2級水準測量に区分される。","基線解析の固定点の楕円体高は、ジオイド高及び成果表の標高から求めた値とする。","令和7年4月時点の最新ジオイド・モデルは「ジオイド2024日本とその周辺」である。","ジオイド高は国土地理院提供の最新ジオイド・モデルから求めた値とする。","既知点とする電子基準点と新点間の距離は6,000m以上を標準とする。"],a:1,exp:"誤りは1。GNSS標高測量の精度区分の記述が誤り（2級水準測量に区分されるという記述が不適当）。他は正しい規定。\n⚠️ 精度区分（何級相当か）の数値すり替えに注意。"},
{y:"R8",no:14,field:"現地測量",type:"5択(誤り)",q:"公共測量における現地測量について、明らかに間違っているものはどれか。",c:["使用する測量機は2級GNSS測量機又はこれと同等以上を標準とする。","ネットワーク型RTK法によるTS点設置で単点観測法を用いた場合、1点の既知点を使用し整合確認を行う。","観測値を点検する場合のセット間較差の許容範囲は、水平面の南北・東西成分20mm、高さ成分30mm。","TSを用いる地形・地物の測定における標高測定は、必要に応じて水準測量により行うことができる。","キネマティック法・RTK法ではGPS・準天頂・GLONASS衛星を組み合わせて使用できる。"],a:2,exp:"誤りは2。単点観測法の点検方法の記述が誤り（1点の既知点による整合確認ではなく、2回の観測較差等で点検する）。\n⚠️ 「単点観測法＝既知点1点で整合確認」というもっともらしい記述に注意。"},
{y:"R8",no:16,field:"地上レーザ測量",type:"5択(語句)",q:"公共測量における地上レーザ測量について、ア〜ウに入る組合せはどれか。\nア：距離計測方法は、タイム・オブ・フライト方式又は（ ア ）方式\nイ：平面直角座標系で計測する場合の計測方法は（ イ ）を原則\nウ：同一箇所から複数回計測する場合、器械高は（ ウ ）ことを原則",c:["ア:位相差 イ:器械点・後視点法 ウ:変える","ア:結合多角 イ:相似変換法又は後方交会法 ウ:変えない","ア:結合多角 イ:器械点・後視点法 ウ:変える","ア:位相差 イ:相似変換法又は後方交会法 ウ:変えない","ア:位相差 イ:相似変換法又は後方交会法 ウ:変える"],a:1,exp:"正しい組合せは1（ア:位相差／イ:器械点・後視点法／ウ:変える）。\n💡 距離計測はTOF方式か“位相差”方式。複数回計測は器械高を“変える”のが原則。"},
{y:"R8",no:17,field:"空中写真の重複度(計算)",type:"計算",q:"標高300〜700mの土地を、デジタル航空カメラ鉛直下で撮影。全体で隣接コースの重複度が最小35%となるよう計画。撮影基準面300mでの隣接コース重複度は最大で何%か。\n・画面距離10cm、素子寸法10μm、画面26,000×17,000画素、画面短辺が撮影基線と平行\n・等高度・コース間隔一定、撮影基準面の地上画素寸法20cm",c:["44%","48%","52%","56%","58%"],a:2,exp:"重複度が最小35%になるのは地表が最も高い700m。そこでのコース間隔をもとに、基準面(300m)では地上カバーが広くなり重複度は最大に。計算すると約48%。\n⚠️ 最小重複度は“最も高い地表”で発生。基準面(低い側)では重複度が大きくなる。",fig:"overlap"},

{y:"R8",no:22,field:"地図投影法",type:"5択(誤り)",q:"地図投影法について、明らかに間違っているものはどれか。",c:["平面の地図で正積と正角の性質を同時に満たすことは理論上不可能である。","球面上の図形の面積比が地図上で正しく表示される投影法を正積図法という。","正積図法は、世界全体のような広範囲の植生分布・人口密度などを示すのに適している。","正角図法は、ごく狭い範囲での形状が地球上と地図上で相似となる図法である。","メルカトル図法は正角円筒図法の一種であり、任意の2地点間の最短経路は直線で表される。"],a:5,exp:"誤りは5。メルカトル図法で直線として表されるのは「等角航路」。最短経路（大圏コース）は曲線になる。\n⚠️ メルカトルの直線＝等角航路であって最短経路ではない、が定番。",fig:"projection"},

{y:"R8",no:24,field:"地図編集の作業順序",type:"5択(順序)",q:"公共測量における地図編集の標準的な作業順序として最も適当なものはどれか。\n（a:編集原稿データの作成／b:資料収集及び整理／c:成果等の整理／d:数値地形図データファイルの作成／e:数値編集／f:品質評価／g:作業計画）",c:["b→g→a→e→d→f→c","b→g→a→d→e→f→c","g→b→a→e→d→f→c","g→b→e→a→d→f→c","g→b→e→d→a→f→c"],a:3,exp:"正しい順序は3：g作業計画→b資料収集整理→a編集原稿データ作成→e数値編集→d数値地形図データファイル作成→f品質評価→c成果等の整理。\n💡 どの測量も“作業計画→資料収集→…→品質評価→成果整理”の骨格は共通。"},
{y:"R8",no:25,field:"クロソイド(計算)",type:"計算",q:"基本型クロソイド(対称型)の道路で、円曲線部の半径R=270m、交角τ=60°、クロソイドパラメータA=150m、π=3.142とするとき、始点P〜終点Qの路線長は幾らか。",c:["167m","199m","283m","366m","408m"],a:4,exp:"クロソイド長 L=A²/R=150²/270≒83.33m(片側)。クロソイドの接線角 τ0=L/2R=83.33/540≒0.154rad。\n円曲線の中心角=60°(1.047rad)−2×0.154=0.738rad → 円弧長=270×0.738≒199m。\n路線長=83.33×2+199≒366m。"},

{y:"R8",no:28,field:"河川測量",type:"5択(誤り)",q:"公共測量における河川測量について、明らかに間違っているものはどれか。",c:["法線測量とは、築造物の新設・改修などで現地の法線上に杭を設置し線形図データファイルを作成する作業をいう。","距離標は、河心線の接線に対して直角方向の右岸又は左岸のいずれかの堤防法肩に設置することを標準とする。","定期縦断測量は、観測の基準を水準基標とし、水準基標から出発して他の水準基標に結合する。","定期縦断測量は、平地では3級水準測量、山地では原則として4級水準測量により行う。","定期横断測量では、航空レーザ測深で得た水底・陸上の三次元点群データを用いて横断面図データを作成できる。"],a:2,exp:"誤りは2。距離標は右岸・左岸の“両岸”に設置するのが標準で、「いずれか一方」は誤り。\n⚠️「いずれか」「一方のみ」は誤りを疑う。"},

/* ================= アプリ ================= */
const LS='sokuryo_am_v2';
let state={queue:[],idx:0,correct:0,answered:false,fields:new Set(),wrong:[]};
let store=loadStore();
function loadStore(){try{return JSON.parse(localStorage.getItem(LS))||{wrong:[]}}catch(e){return {wrong:[]}}}
function saveStore(){try{localStorage.setItem(LS,JSON.stringify(store))}catch(e){}}
function qid(q){return q.y+'-'+q.no+(q.sub?('-'+q.sub):'')}
function qlabel(q){return 'No.'+q.no+(q.sub?('-'+q.sub):'')}

const allFields=[...new Set(Q.map(q=>q.field))];
function renderChips(){
  const el=document.getElementById('chips');el.innerHTML='';
  const all=document.createElement('div');all.className='chip'+(state.fields.size===allFields.length?' on':'');
  all.textContent='すべて';all.onclick=()=>{state.fields=state.fields.size===allFields.length?new Set():new Set(allFields);renderChips();};
  el.appendChild(all);
  allFields.forEach(f=>{const c=document.createElement('div');c.className='chip'+(state.fields.has(f)?' on':'');
    c.textContent=f;c.onclick=()=>{state.fields.has(f)?state.fields.delete(f):state.fields.add(f);renderChips();};el.appendChild(c);});
}

function start(mode){
  let pool=Q.filter(q=>state.fields.has(q.field));
  if(mode==='review'){
    const w=new Set(store.wrong||[]);
    pool=Q.filter(q=>w.has(qid(q)));
    if(pool.length===0){alert('復習する問題がありません。まずは全問に挑戦してみましょう。');return;}
  }
  if(pool.length===0){alert('分野を1つ以上選んでください。');return;}
  if(mode==='shuffle'||mode==='review'){pool=[...pool].sort(()=>Math.random()-0.5);}
  state.queue=pool;state.idx=0;state.correct=0;state.wrong=[];
  document.getElementById('screen-start').style.display='none';
  document.getElementById('screen-end').style.display='none';
  document.getElementById('screen-quiz').style.display='block';
  document.getElementById('score').style.display='block';
  document.getElementById('pbar').style.display='block';
  document.getElementById('sc-t').textContent=state.queue.length;
  renderQ();
}

function renderQ(){
  const q=state.queue[state.idx];state.answered=false;
  document.getElementById('sc-n').textContent=state.correct;
  document.getElementById('pfill').style.width=(state.idx/state.queue.length*100)+'%';
  const isOX=(q.type==='○×');
  const s=document.getElementById('screen-quiz');
  s.innerHTML=`
  <div class="card">
    <div class="meta">
      <span class="badge yr">${q.y}</span>
      <span class="badge ${isOX?'ox':'type'}">${q.type}</span>
      <span class="badge">${q.field}</span>
      <span class="qno">${state.idx+1} / ${state.queue.length}（${qlabel(q)}）</span>
    </div>
    ${isOX?'<div class="lead-ox">次の記述は正しい？ 誤り？</div>':''}
    <div class="qtext">${esc(q.q)}</div>
    <div id="answers"></div>
    <div id="result"></div>
  </div>`;
  const box=document.getElementById('answers');
  if(isOX){
    box.className='oxwrap';
    box.innerHTML=`
      <button class="oxbtn o" data-i="1"><span class="sym">○</span>正しい</button>
      <button class="oxbtn x" data-i="2"><span class="sym">×</span>誤り</button>`;
    box.querySelectorAll('.oxbtn').forEach(b=>b.onclick=()=>answer(+b.dataset.i));
  }else{
    box.className='choices';
    q.c.forEach((txt,i)=>{
      const b=document.createElement('button');b.className='choice';
      b.innerHTML=`<span class="n">${i+1}</span><span>${esc(txt)}</span>`;
      b.onclick=()=>answer(i+1);box.appendChild(b);
    });
  }
  window.scrollTo(0,0);
}

function answer(pick){
  if(state.answered)return;state.answered=true;
  const q=state.queue[state.idx];const ok=(pick===q.a);const isOX=(q.type==='○×');
  const id=qid(q);
  const w=new Set(store.wrong||[]);
  if(ok){state.correct++; if(w.has(id)){w.delete(id);store.wrong=[...w];saveStore();}}
  else{state.wrong.push(id); w.add(id);store.wrong=[...w];saveStore();}
  document.getElementById('sc-n').textContent=state.correct;
  if(isOX){
    document.querySelectorAll('.oxbtn').forEach(b=>{const i=+b.dataset.i;b.disabled=true;
      if(i===q.a)b.classList.add('correct');else if(i===pick)b.classList.add('wrong');else b.classList.add('dim');});
  }else{
    document.querySelectorAll('#answers .choice').forEach((b,i)=>{b.disabled=true;
      if(i+1===q.a)b.classList.add('correct');else if(i+1===pick)b.classList.add('wrong');else b.classList.add('dim');});
  }
  const ansLabel=isOX?(q.a===1?'○ 正しい':'× 誤り'):('選択肢 '+q.a);
  const last=(state.idx===state.queue.length-1);
  document.getElementById('result').innerHTML=`
   <div class="result">
     <div class="verdict ${ok?'ok':'ng'}"><span class="mk">${ok?'○':'×'}</span>${ok?'正解！':'不正解'}　<span style="font-size:13px;color:var(--sub);font-weight:600">正解：${ansLabel}</span></div>
     <div class="exp"><h4>解説</h4><div class="body">${esc(q.exp)}</div></div>
     ${q.fig?`<button class="fig-link" onclick="openFig('${q.fig}')">🖼 図解で理解する（${FIGS[q.fig].title}）</button>`:''}
     <div class="nav">
       <button class="btn ghost" onclick="goHome()">中断</button>
       <button class="btn primary" onclick="next()">${last?'結果を見る':'次の問題へ →'}</button>
     </div>
   </div>`;
  document.getElementById('pfill').style.width=((state.idx+1)/state.queue.length*100)+'%';
}

function next(){ if(state.idx<state.queue.length-1){state.idx++;renderQ();} else showEnd(); }

function showEnd(){
  document.getElementById('screen-quiz').style.display='none';
  document.getElementById('pbar').style.display='none';
  const total=state.queue.length,c=state.correct,pct=Math.round(c/total*100);
  const msg=pct>=80?'すばらしい！合格圏の理解度です。':pct>=60?'あと一歩。間違えた問題を復習しましょう。':'基礎から復習していきましょう。図解解説がおすすめです。';
  const r=54,circ=2*Math.PI*r,off=circ*(1-pct/100);
  const e=document.getElementById('screen-end');e.style.display='block';
  e.innerHTML=`<div class="end">
    <svg class="ring" viewBox="0 0 130 130">
      <circle cx="65" cy="65" r="${r}" fill="none" stroke="#222b3d" stroke-width="12"/>
      <circle cx="65" cy="65" r="${r}" fill="none" stroke="${pct>=60?'#22c55e':'#f59e0b'}" stroke-width="12"
        stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${off}" transform="rotate(-90 65 65)"/>
      <text x="65" y="72" text-anchor="middle" font-size="30" font-weight="800" fill="#e8edf5">${pct}%</text>
    </svg>
    <div class="big">${c}<small> / ${total} 問正解</small></div>
    <div class="msg">${msg}</div>
    <div class="mode-grid">
      ${state.wrong.length?`<button class="mode-btn" onclick="start('review')"><span class="ic">🔁</span><span>間違えた${state.wrong.length}問を復習<small>今回ミスした問題だけ出題</small></span></button>`:''}
      <button class="mode-btn" onclick="goHome()"><span class="ic">🏠</span><span>ホームに戻る<small>分野やモードを選び直す</small></span></button>
    </div></div>`;
  window.scrollTo(0,0);
}

function goHome(){
  document.getElementById('screen-quiz').style.display='none';
  document.getElementById('screen-end').style.display='none';
  document.getElementById('score').style.display='none';
  document.getElementById('pbar').style.display='none';
  document.getElementById('screen-start').style.display='block';
  renderChips();window.scrollTo(0,0);
}

function openFig(key){
  const f=FIGS[key];if(!f)return;
  document.getElementById('fig-title').textContent=f.title;
  document.getElementById('fig-body').innerHTML=f.build();
  document.getElementById('modal').classList.add('on');
  document.body.style.overflow='hidden';
}
function closeFig(){document.getElementById('modal').classList.remove('on');document.body.style.overflow='';}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}

state.fields=new Set(allFields);
renderChips();
</script>
</body>
</html>
